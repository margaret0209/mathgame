<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>象形圖互動學習遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0fdf4; /* Light green background */
        }
        
        @keyframes popIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .emoji-pop {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            display: inline-block;
        }

        /* Custom scrollbar for smaller screens */
        .chart-scroll-container::-webkit-scrollbar {
            height: 8px;
        }
        .chart-scroll-container::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen pb-10">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        
        <!-- Header & Controls -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-8 border-t-8 border-green-500">
            <h1 class="text-3xl md:text-4xl font-black text-center text-green-700 mb-6">📊 製作象形圖學習遊戲</h1>
            
            <div class="flex flex-col md:flex-row justify-center items-center gap-4 md:gap-8">
                <div class="flex items-center gap-2 text-lg">
                    <label for="chartType" class="font-bold text-gray-700">選擇類型：</label>
                    <select id="chartType" class="border-2 border-gray-300 rounded-lg p-2 bg-gray-50 focus:outline-none focus:border-green-500 font-semibold cursor-pointer text-gray-700">
                        <option value="horizontal">橫向象形圖</option>
                        <option value="vertical">縱向象形圖</option>
                    </select>
                </div>
                
                <div class="flex items-center gap-2 text-lg">
                    <label for="chartCategory" class="font-bold text-gray-700">選擇統計類別：</label>
                    <select id="chartCategory" class="border-2 border-gray-300 rounded-lg p-2 bg-gray-50 focus:outline-none focus:border-green-500 font-semibold cursor-pointer text-gray-700">
                        <option value="水果">水果</option>
                        <option value="玩具">玩具</option>
                        <option value="卡通人物">卡通人物</option>
                    </select>
                </div>

                <button id="generateBtn" class="bg-green-500 hover:bg-green-600 text-white text-lg font-bold py-2 px-8 rounded-full shadow-md transform transition active:scale-95">
                    🎲 隨機生成題目
                </button>
            </div>
        </div>

        <!-- Game Area -->
        <div id="gameArea" class="hidden">
            
            <!-- Statistics Table -->
            <div class="bg-white rounded-2xl shadow-lg p-6 mb-8 overflow-x-auto border border-gray-100">
                <h2 class="text-xl font-bold text-gray-700 mb-3 flex items-center gap-2">
                    <span class="text-2xl">📝</span> 統計記錄表格
                </h2>
                <table class="w-full text-center border-collapse border-2 border-gray-800 min-w-[600px]">
                    <tr id="tableHeadRow">
                        <!-- Populated by JS -->
                    </tr>
                    <tr id="tableBodyRow">
                        <!-- Populated by JS -->
                    </tr>
                </table>
            </div>

            <!-- Pictogram Chart Area -->
            <div class="bg-white rounded-2xl shadow-lg p-6 md:p-10 border border-gray-100">
                
                <!-- Chart Header -->
                <div class="mb-6">
                    <h2 id="chartTitle" class="text-3xl font-black text-center text-gray-800 tracking-wide mb-2">最喜愛的項目</h2>
                    <p class="text-right text-gray-600 font-bold text-lg">一個 <span class="text-2xl inline-block align-middle">🙂</span> 代表 1</p>
                </div>

                <!-- Interactive Grid Container -->
                <div class="chart-scroll-container overflow-x-auto flex justify-center py-4">
                    <div id="chartGrid" class="select-none">
                        <!-- Grid will be generated here -->
                    </div>
                </div>

                <!-- Submit Button -->
                <div id="submitBtnContainer" class="mt-10 flex justify-center">
                    <button id="submitBtn" class="bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold py-4 px-12 rounded-full shadow-[0_6px_0_#2563eb] hover:shadow-[0_4px_0_#2563eb] hover:translate-y-1 transform transition-all flex items-center gap-3">
                        <span>✨ 確認提交答案 ✨</span>
                    </button>
                </div>

                <!-- Follow-up Questions Area -->
                <div id="followUpQuestionsArea" class="hidden mt-10 bg-purple-50 rounded-2xl p-6 md:p-8 border-4 border-purple-200">
                    <h3 class="text-2xl md:text-3xl font-bold text-purple-800 mb-6 flex items-center gap-2">
                        <span>🧠</span> 進階挑戰：根據象形圖回答問題
                    </h3>
                    
                    <!-- 使用 Flexbox 讓題目與數字盤左右並排 -->
                    <div class="flex flex-col md:flex-row gap-8">
                        <!-- 左側：問題列表 -->
                        <div class="flex-1 space-y-5 text-lg md:text-xl font-semibold text-gray-700 leading-relaxed">
                            <div>1. 最喜歡 <span id="q1-item" class="text-purple-700 font-black px-1 border-b-2 border-purple-400"></span> 的有 <input type="text" readonly id="ans-q1" class="keypad-input w-20 border-2 border-gray-400 rounded-lg p-1 text-center text-purple-700 font-bold focus:outline-none bg-white shadow-inner cursor-pointer transition-all hover:bg-indigo-50" onclick="openKeypad('ans-q1')" placeholder="?"> 人。</div>
                            
                            <div>2. 最喜歡 <span id="q2-itemA" class="text-purple-700 font-black px-1 border-b-2 border-purple-400"></span> 的比 <span id="q2-itemB" class="text-purple-700 font-black px-1 border-b-2 border-purple-400"></span> 的多 <input type="text" readonly id="ans-q2" class="keypad-input w-20 border-2 border-gray-400 rounded-lg p-1 text-center text-purple-700 font-bold focus:outline-none bg-white shadow-inner cursor-pointer transition-all hover:bg-indigo-50" onclick="openKeypad('ans-q2')" placeholder="?"> 人。</div>
                            
                            <div>3. 最喜歡 <span id="q3-itemC" class="text-purple-700 font-black px-1 border-b-2 border-purple-400"></span> 的比 <span id="q3-itemD" class="text-purple-700 font-black px-1 border-b-2 border-purple-400"></span> 的少 <input type="text" readonly id="ans-q3" class="keypad-input w-20 border-2 border-gray-400 rounded-lg p-1 text-center text-purple-700 font-bold focus:outline-none bg-white shadow-inner cursor-pointer transition-all hover:bg-indigo-50" onclick="openKeypad('ans-q3')" placeholder="?"> 人。</div>
                            
                            <div>4. 最多人喜歡的是 <select id="ans-q4" class="border-2 border-gray-400 rounded-lg p-1 px-2 text-purple-700 font-bold focus:border-purple-500 focus:outline-none bg-white shadow-inner cursor-pointer"><option value="">請選擇</option></select>。</div>
                            
                            <div>5. 共有 <input type="text" readonly id="ans-q5" class="keypad-input w-24 border-2 border-gray-400 rounded-lg p-1 text-center text-purple-700 font-bold focus:outline-none bg-white shadow-inner cursor-pointer transition-all hover:bg-indigo-50" onclick="openKeypad('ans-q5')" placeholder="?"> 人接受訪問。</div>
                        </div>

                        <!-- 右側：九宮格數字盤 -->
                        <div id="virtualKeypad" class="hidden md:flex flex-col items-center bg-indigo-50 border-4 border-indigo-200 rounded-3xl shadow-lg p-5 w-full md:w-72 lg:w-80 shrink-0 h-fit transition-all duration-300">
                            <div class="w-full">
                                <div class="flex justify-between items-center mb-3 px-1">
                                    <span class="text-indigo-800 font-bold text-lg">🔢 數字鍵盤</span>
                                    <button onclick="closeKeypad()" class="text-gray-500 hover:text-gray-700 font-bold text-sm bg-gray-200 hover:bg-gray-300 py-1 px-3 rounded-full transition-colors">✕ 關閉</button>
                                </div>
                                <div class="grid grid-cols-3 gap-2 text-2xl font-black">
                                    <button onclick="keypadPress('1')" class="bg-white py-3 rounded-xl shadow border-b-4 border-gray-200 active:border-b-0 active:translate-y-1 text-gray-800">1</button>
                                    <button onclick="keypadPress('2')" class="bg-white py-3 rounded-xl shadow border-b-4 border-gray-200 active:border-b-0 active:translate-y-1 text-gray-800">2</button>
                                    <button onclick="keypadPress('3')" class="bg-white py-3 rounded-xl shadow border-b-4 border-gray-200 active:border-b-0 active:translate-y-1 text-gray-800">3</button>
                                    <button onclick="keypadPress('4')" class="bg-white py-3 rounded-xl shadow border-b-4 border-gray-200 active:border-b-0 active:translate-y-1 text-gray-800">4</button>
                                    <button onclick="keypadPress('5')" class="bg-white py-3 rounded-xl shadow border-b-4 border-gray-200 active:border-b-0 active:translate-y-1 text-gray-800">5</button>
                                    <button onclick="keypadPress('6')" class="bg-white py-3 rounded-xl shadow border-b-4 border-gray-200 active:border-b-0 active:translate-y-1 text-gray-800">6</button>
                                    <button onclick="keypadPress('7')" class="bg-white py-3 rounded-xl shadow border-b-4 border-gray-200 active:border-b-0 active:translate-y-1 text-gray-800">7</button>
                                    <button onclick="keypadPress('8')" class="bg-white py-3 rounded-xl shadow border-b-4 border-gray-200 active:border-b-0 active:translate-y-1 text-gray-800">8</button>
                                    <button onclick="keypadPress('9')" class="bg-white py-3 rounded-xl shadow border-b-4 border-gray-200 active:border-b-0 active:translate-y-1 text-gray-800">9</button>
                                    <button onclick="keypadDelete()" class="bg-red-100 py-3 rounded-xl shadow border-b-4 border-red-200 active:border-b-0 active:translate-y-1 text-red-600 text-xl">刪除</button>
                                    <button onclick="keypadPress('0')" class="bg-white py-3 rounded-xl shadow border-b-4 border-gray-200 active:border-b-0 active:translate-y-1 text-gray-800">0</button>
                                    <button onclick="closeKeypad()" class="bg-green-100 py-3 rounded-xl shadow border-b-4 border-green-200 active:border-b-0 active:translate-y-1 text-green-700 text-xl">確認</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-8 flex justify-center">
                         <button id="submitFollowUpBtn" class="bg-purple-600 hover:bg-purple-700 text-white text-xl md:text-2xl font-bold py-3 px-10 rounded-full shadow-[0_5px_0_#581c87] hover:shadow-[0_3px_0_#581c87] hover:translate-y-1 transform transition-all">
                             🚀 提交進階挑戰
                         </button>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- Result Modal -->
    <div id="resultModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center hidden z-50 px-4">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full text-center shadow-2xl transform transition-all scale-100">
            <div id="modalIcon" class="text-7xl mb-4">🌟</div>
            <h3 id="modalTitle" class="text-3xl font-bold text-green-600 mb-4">太棒了！</h3>
            <p id="modalMessage" class="text-xl text-gray-700 font-semibold mb-8 leading-relaxed">你成功製作了正確的象形圖！</p>
            <button id="modalBtn" onclick="closeModal()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-xl transition-colors text-lg">
                返回遊戲
            </button>
        </div>
    </div>

    <script>
        // Data Dictionary
        const itemsDict = {
            '水果': ['蘋果', '香蕉', '橙', '葡萄', '西瓜', '草莓', '芒果', '梨', '蜜瓜', '菠蘿', '櫻桃', '桃', '奇異果', '木瓜', '檸檬', '藍莓', '柚子', '哈密瓜', '石榴', '柿子'],
            '玩具': ['汽車', '積木', '洋娃娃', '皮球', '機械人', '拼圖', '恐龍', '飛機', '火車', '熊仔', '陀螺', '風箏', '黏土', '水槍', '撲克牌', '樂高', '變形金剛', '魔術方塊', '遙控車'],
            '卡通人物': ['多啦A夢', '米奇老鼠', '皮卡超', '小熊維尼', '吉蒂貓', '海綿寶寶', '蠟筆小新', '龍貓', '可羅米', '櫻桃小丸子', '麵包超人', '史努比', 'Melody', '布甸狗', '巴斯光年', '史迪仔', '胡迪', 'Elsa', '巧虎', '角落小夥伴']
        };

        let currentData = {
            type: 'horizontal',
            category: '',
            items: [],
            quantities: [],
            gridState: [],
            isChartLocked: false // 用於在進入問題環節時鎖定圖表
        };

        let followUpAnswers = {};
        let modalState = '';

        // Initialize event listeners
        document.getElementById('generateBtn').addEventListener('click', startGame);
        document.getElementById('submitBtn').addEventListener('click', checkAnswer);
        document.getElementById('submitFollowUpBtn').addEventListener('click', checkFollowUpAnswers);

        // Start game initially
        window.onload = () => {
            startGame();
        };

        function startGame() {
            const typeSelect = document.getElementById('chartType').value;
            const catSelect = document.getElementById('chartCategory').value;

            currentData.type = typeSelect;
            currentData.category = catSelect;
            currentData.isChartLocked = false;

            // Pick 5 random items
            let shuffled = [...itemsDict[catSelect]].sort(() => 0.5 - Math.random());
            currentData.items = shuffled.slice(0, 5);

            // Pick 5 random quantities (1 to 12)
            currentData.quantities = Array.from({length: 5}, () => Math.floor(Math.random() * 12) + 1);

            // Reset grid state (5 groups, 12 cells each)
            currentData.gridState = Array.from({length: 5}, () => Array(12).fill(false));

            renderTable();
            renderChart();
            
            document.getElementById('gameArea').classList.remove('hidden');
            document.getElementById('submitBtnContainer').classList.remove('hidden');
            document.getElementById('followUpQuestionsArea').classList.add('hidden');
            
            // Clear follow-up inputs
            document.getElementById('ans-q1').value = '';
            document.getElementById('ans-q2').value = '';
            document.getElementById('ans-q3').value = '';
            document.getElementById('ans-q4').value = '';
            document.getElementById('ans-q5').value = '';
        }

        function renderTable() {
            const theadRow = document.getElementById('tableHeadRow');
            const tbodyRow = document.getElementById('tableBodyRow');
            
            theadRow.innerHTML = '<td class="border-2 border-gray-800 bg-blue-100 font-bold p-3 md:p-4 w-32 md:w-48 text-gray-800 text-lg md:text-xl">統計項目類別</td>';
            tbodyRow.innerHTML = '<td class="border-2 border-gray-800 bg-green-100 font-bold p-3 md:p-4 w-32 md:w-48 text-gray-800 text-lg md:text-xl">人數</td>';
            
            for (let i = 0; i < 5; i++) {
                const th = document.createElement('td');
                th.className = 'border-2 border-gray-800 bg-blue-50 p-3 md:p-4 font-semibold text-gray-700 text-lg';
                th.textContent = currentData.items[i];
                theadRow.appendChild(th);
                
                const td = document.createElement('td');
            td.className = 'border-2 border-gray-800 bg-white p-3 md:p-4 font-black text-gray-800 text-2xl text-blue-600';
            td.textContent = currentData.quantities[i];
            tbodyRow.appendChild(td);
        }
    }

    function renderChart() {
        // Update Title
        document.getElementById('chartTitle').textContent = `最喜愛的${currentData.category}`;

        const chartContainer = document.getElementById('chartGrid');
        chartContainer.innerHTML = '';
        
        if (currentData.type === 'horizontal') {
            const wrapper = document.createElement('div');
            wrapper.className = 'inline-flex flex-row bg-white relative pb-8 pr-4';

            const labelsCol = document.createElement('div');
            labelsCol.className = 'flex flex-col justify-start pt-4 pr-4';

            const gridCol = document.createElement('div');
            gridCol.className = 'border-l-4 border-gray-800 pt-4 pl-4 pr-2 pb-4 relative';

            currentData.items.forEach((item, itemIdx) => {
                const rowHeightClass = 'h-10 md:h-12';
                const marginClass = itemIdx < currentData.items.length - 1 ? 'mb-4 md:mb-5' : '';

                const label = document.createElement('div');
                label.className = `w-24 md:w-32 text-right flex items-center justify-end font-bold text-lg md:text-xl text-gray-800 ${rowHeightClass} ${marginClass}`;
                label.textContent = item;
                labelsCol.appendChild(label);

                const cellsContainer = document.createElement('div');
                cellsContainer.className = `flex flex-row gap-1 md:gap-2 ${rowHeightClass} ${marginClass}`;
                
                for (let cellIdx = 0; cellIdx < 12; cellIdx++) {
                    const cell = document.createElement('div');
                    cell.className = 'w-10 h-10 md:w-12 md:h-12 border-2 border-gray-300 bg-gray-50 flex items-center justify-center cursor-pointer hover:bg-yellow-50 transition-colors rounded shadow-sm flex-shrink-0';
                    cell.onclick = () => toggleCell(itemIdx, cellIdx, cell);
                    
                    if (currentData.gridState[itemIdx][cellIdx]) {
                        cell.innerHTML = '<span class="text-3xl emoji-pop">🙂</span>';
                        cell.classList.replace('border-gray-300', 'border-yellow-400');
                        cell.classList.replace('bg-gray-50', 'bg-yellow-100');
                    }
                    cellsContainer.appendChild(cell);
                }
                gridCol.appendChild(cellsContainer);
            });

            wrapper.appendChild(labelsCol);
            wrapper.appendChild(gridCol);
            chartContainer.appendChild(wrapper);

        } else {
            // Vertical
            const wrapper = document.createElement('div');
            wrapper.className = 'inline-flex flex-col bg-white relative pl-8 mt-6 pb-6';

            const gridRow = document.createElement('div');
            gridRow.className = 'border-b-4 border-gray-800 flex flex-row items-end pb-4 pl-4 pr-4 pt-4 relative';

            const labelsRow = document.createElement('div');
            // 透過精確的 padding 讓標籤列與方格完美對齊
            labelsRow.className = 'flex flex-row pt-4 pl-4'; 

            currentData.items.forEach((item, itemIdx) => {
                const marginClass = itemIdx < currentData.items.length - 1 ? 'mr-4 md:mr-6' : '';

                const gridCol = document.createElement('div');
                gridCol.className = `flex flex-col-reverse gap-1 md:gap-2 w-10 md:w-12 ${marginClass}`;
                
                for (let cellIdx = 0; cellIdx < 12; cellIdx++) {
                    const cell = document.createElement('div');
                    cell.className = 'w-10 h-10 md:w-12 md:h-12 border-2 border-gray-300 bg-gray-50 flex items-center justify-center cursor-pointer hover:bg-yellow-50 transition-colors rounded shadow-sm flex-shrink-0';
                    cell.onclick = () => toggleCell(itemIdx, cellIdx, cell);
                    
                    if (currentData.gridState[itemIdx][cellIdx]) {
                        cell.innerHTML = '<span class="text-3xl emoji-pop">🙂</span>';
                        cell.classList.replace('border-gray-300', 'border-yellow-400');
                        cell.classList.replace('bg-gray-50', 'bg-yellow-100');
                    }
                    gridCol.appendChild(cell);
                }
                gridRow.appendChild(gridCol);
                
                const labelContainer = document.createElement('div');
                labelContainer.className = `flex justify-center w-10 md:w-12 ${marginClass}`;
                
                const label = document.createElement('div');
                label.className = 'text-center font-bold text-lg md:text-xl text-gray-800 writing-vertical';
                label.style.writingMode = 'vertical-rl';
                label.style.textOrientation = 'upright';
                label.textContent = item;
                
                labelContainer.appendChild(label);
                labelsRow.appendChild(labelContainer);
            });

            wrapper.appendChild(gridRow);
            wrapper.appendChild(labelsRow);
            chartContainer.appendChild(wrapper);
        }
    }

    function toggleCell(itemIdx, cellIdx, cellElement) {
            // 如果圖表已被鎖定，禁止修改
            if (currentData.isChartLocked) return;

            const isCurrentlyActive = currentData.gridState[itemIdx][cellIdx];
            currentData.gridState[itemIdx][cellIdx] = !isCurrentlyActive;
            
            if (!isCurrentlyActive) {
                // Activating
                cellElement.innerHTML = '<span class="text-3xl emoji-pop">🙂</span>';
                cellElement.classList.remove('border-gray-300', 'bg-gray-50');
                cellElement.classList.add('border-yellow-400', 'bg-yellow-100');
            } else {
                // Deactivating
                cellElement.innerHTML = '';
                cellElement.classList.remove('border-yellow-400', 'bg-yellow-100');
                cellElement.classList.add('border-gray-300', 'bg-gray-50');
            }
        }

        function checkAnswer() {
            let isCountCorrect = true;
            let isStructureCorrect = true; // Checks for gaps (empty spaces before filled spaces)
            
            for (let i = 0; i < 5; i++) {
                let currentItemCount = currentData.gridState[i].filter(v => v).length;
                let expectedCount = currentData.quantities[i];
                
                if (currentItemCount !== expectedCount) {
                    isCountCorrect = false;
                }
                
                // Check if they skipped cells (e.g. filled cell 3 but cell 1 is empty)
                for (let j = 0; j < 12; j++) {
                    if (j < currentItemCount && !currentData.gridState[i][j]) {
                        isStructureCorrect = false;
                    }
                }
            }
            
            if (isCountCorrect && isStructureCorrect) {
                showModal('chart_success', '🎉 完美解答！ 🎉', '你成功且標準地製作了正確的象形圖，做得非常好！接下來請回答下方的進階問題吧！', '🏆', '挑戰進階問題');
            } else if (isCountCorrect && !isStructureCorrect) {
                showModal('chart_warning', '數量正確，但是...', '畫象形圖時，要記得從頭（左邊或最下面）開始連續畫，中間不可以留空位喔！請修改一下。', '💡', '返回修改');
            } else {
                showModal('chart_error', '再試一次！', '有些項目的數量不對喔，請仔細對照上方的統計表格再數一次看看。', '🤔', '返回修改');
            }
        }

        function showModal(type, titleText, msgText, iconHTML, btnText) {
            modalState = type;
            const modal = document.getElementById('resultModal');
            const titleEl = document.getElementById('modalTitle');
            
            titleEl.textContent = titleText;
            document.getElementById('modalMessage').textContent = msgText;
            document.getElementById('modalIcon').innerHTML = iconHTML;
            document.getElementById('modalBtn').textContent = btnText;
            
            if (type.includes('success')) {
                titleEl.className = 'text-3xl md:text-4xl font-black text-green-600 mb-4';
            } else if (type.includes('warning')) {
                titleEl.className = 'text-3xl font-bold text-yellow-600 mb-4';
            } else {
                titleEl.className = 'text-3xl font-bold text-red-500 mb-4';
            }
            
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('resultModal').classList.add('hidden');
            
            if (modalState === 'chart_success') {
                // 隱藏圖表提交按鈕，鎖定圖表，並顯示問答區
                document.getElementById('submitBtnContainer').classList.add('hidden');
                currentData.isChartLocked = true;
                generateFollowUpQuestions();
                
                const followUpArea = document.getElementById('followUpQuestionsArea');
                followUpArea.classList.remove('hidden');
                
                // 平滑滾動到問題區
                setTimeout(() => {
                    followUpArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            } else if (modalState === 'followup_success') {
                // 通關後點擊重來
                startGame();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function generateFollowUpQuestions() {
            // 第一題：隨機物件數量
            const q1Idx = Math.floor(Math.random() * 5);
            document.getElementById('q1-item').textContent = currentData.items[q1Idx];
            followUpAnswers.q1 = currentData.quantities[q1Idx];

            // 尋找第二題(多)與第三題(少)的配對，並盡量確保物件不重複
            let greaterPairs = [];
            let lessPairs = [];
            for (let i = 0; i < 5; i++) {
                for (let j = 0; j < 5; j++) {
                    if (currentData.quantities[i] > currentData.quantities[j]) greaterPairs.push([i, j]);
                    if (currentData.quantities[i] < currentData.quantities[j]) lessPairs.push([i, j]);
                }
            }
            
            // 將配對打亂增加隨機性
            greaterPairs.sort(() => 0.5 - Math.random());
            lessPairs.sort(() => 0.5 - Math.random());
            
            let selectedGreater = null;
            let selectedLess = null;
            let foundDistinct = false;
            
            // 尋找兩題四個物件完全不重複的組合
            for (let gPair of greaterPairs) {
                for (let lPair of lessPairs) {
                    if (gPair[0] !== lPair[0] && gPair[0] !== lPair[1] &&
                        gPair[1] !== lPair[0] && gPair[1] !== lPair[1]) {
                        selectedGreater = gPair;
                        selectedLess = lPair;
                        foundDistinct = true;
                        break;
                    }
                }
                if (foundDistinct) break;
            }
            
            // 如果因為隨機數據極端導致無法找到完全不重複的組合，則降級使用任意組合
            if (!foundDistinct) {
                selectedGreater = greaterPairs.length > 0 ? greaterPairs[0] : [0, 1];
                selectedLess = lessPairs.length > 0 ? lessPairs[0] : [1, 0];
            }

            // 第二題：A 比 B 多
            const [aIdx, bIdx] = selectedGreater;
            document.getElementById('q2-itemA').textContent = currentData.items[aIdx];
            document.getElementById('q2-itemB').textContent = currentData.items[bIdx];
            followUpAnswers.q2 = currentData.quantities[aIdx] - currentData.quantities[bIdx];

            // 第三題：C 比 D 少
            const [cIdx, dIdx] = selectedLess;
            document.getElementById('q3-itemC').textContent = currentData.items[cIdx];
            document.getElementById('q3-itemD').textContent = currentData.items[dIdx];
            followUpAnswers.q3 = currentData.quantities[dIdx] - currentData.quantities[cIdx];

            // 第四題：最多人喜歡的是 (可能有並列第一)
            const maxQty = Math.max(...currentData.quantities);
            followUpAnswers.q4_max = maxQty;
            
            const q4Select = document.getElementById('ans-q4');
            q4Select.innerHTML = '<option value="">請選擇</option>';
            currentData.items.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item;
                opt.textContent = item;
                q4Select.appendChild(opt);
            });

            // 第五題：總人數
            followUpAnswers.q5 = currentData.quantities.reduce((a, b) => a + b, 0);
        }

        function checkFollowUpAnswers() {
            if(typeof closeKeypad === 'function') closeKeypad(); // 提交時自動關閉小鍵盤

            const a1 = parseInt(document.getElementById('ans-q1').value);
            const a2 = parseInt(document.getElementById('ans-q2').value);
            const a3 = parseInt(document.getElementById('ans-q3').value);
            const a4Val = document.getElementById('ans-q4').value;
            const a5 = parseInt(document.getElementById('ans-q5').value);

            let allCorrect = true;
            let errorMsg = [];

            // 驗證答案 (加入 isNaN 防呆，防止空白提交)
            if (isNaN(a1) || a1 !== followUpAnswers.q1) { allCorrect = false; errorMsg.push('第一題'); }
            if (isNaN(a2) || a2 !== followUpAnswers.q2) { allCorrect = false; errorMsg.push('第二題'); }
            if (isNaN(a3) || a3 !== followUpAnswers.q3) { allCorrect = false; errorMsg.push('第三題'); }
            
            // 驗證第四題下拉選單
            if (!a4Val) { 
                allCorrect = false; 
                if (!errorMsg.includes('第四題')) errorMsg.push('第四題');
            } else {
                const selectedIdx = currentData.items.indexOf(a4Val);
                if (currentData.quantities[selectedIdx] !== followUpAnswers.q4_max) {
                    allCorrect = false;
                    errorMsg.push('第四題');
                }
            }

            if (isNaN(a5) || a5 !== followUpAnswers.q5) { allCorrect = false; errorMsg.push('第五題'); }

            if (allCorrect) {
                showModal('followup_success', '🌟 完美通關！ 🌟', '你不但做出了正確的象形圖，還全部答對了進階問題！你是統計小大師！', '🎓', '再玩一次');
            } else {
                showModal('followup_error', '有些小錯誤喔', `下列題目的答案不太對喔：${errorMsg.join('、')}。請再仔細看看象形圖算算看！`, '🔍', '返回修改');
            }
        }

        // --- Virtual Keypad Logic ---
        let activeInputId = null;

        function openKeypad(inputId) {
            // 重置所有輸入框的外框高亮效果
            document.querySelectorAll('.keypad-input').forEach(el => {
                el.classList.remove('border-indigo-500', 'ring-4', 'ring-indigo-200');
            });
            
            // 標記目前啟用的輸入框，並給予高亮顯示
            activeInputId = inputId;
            const inputEl = document.getElementById(inputId);
            inputEl.classList.add('border-indigo-500', 'ring-4', 'ring-indigo-200');
            
            // 顯示九宮格數字盤（移除 hidden class）
            const keypad = document.getElementById('virtualKeypad');
            keypad.classList.remove('hidden');
            keypad.classList.add('flex'); // 確保使用 flexbox
            
            // 如果在手機版（視窗小於768px），畫面稍微滾動確保數字盤可見
            if(window.innerWidth < 768) {
                setTimeout(() => {
                    keypad.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 100);
            }
        }

        function closeKeypad() {
            // 移除輸入框的高亮效果
            if(activeInputId) {
                const inputEl = document.getElementById(activeInputId);
                if(inputEl) {
                    inputEl.classList.remove('border-indigo-500', 'ring-4', 'ring-indigo-200');
                }
            }
            activeInputId = null;
            
            // 隱藏九宮格數字盤
            const keypad = document.getElementById('virtualKeypad');
            if(keypad) {
                keypad.classList.add('hidden');
                keypad.classList.remove('flex');
            }
        }

        function keypadPress(num) {
            if(!activeInputId) return;
            const input = document.getElementById(activeInputId);
            // 限制最多只能輸入3位數 (防止亂按)
            if(input.value.length < 3) {
                input.value += num;
            }
        }

        function keypadDelete() {
            if(!activeInputId) return;
            const input = document.getElementById(activeInputId);
            input.value = input.value.slice(0, -1);
        }
    </script>
</body>
