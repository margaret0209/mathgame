<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比較應用題遊戲</title>
    
    <!-- 引入 Firebase 相容版 SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Noto Sans HK', sans-serif;
            background-color: #f0fdf4;
            user-select: none;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 0.6s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }
        .error-shake {
            animation: shake 0.4s ease-in-out;
            border-color: #ef4444 !important;
            background-color: #fee2e2 !important;
        }

        /* 慶祝彩色碎紙飄落動畫 */
        @keyframes confetti-fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        .confetti {
            position: absolute;
            width: 15px;
            height: 15px;
            pointer-events: none;
            z-index: 999;
            animation: confetti-fall 4s linear infinite;
        }

        .num-box {
            display: inline-block;
            min-width: 80px;
            height: 60px;
            border: 4px solid rgba(203, 213, 225, 0.8);
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.8);
            text-align: center;
            line-height: 52px;
            font-size: 2rem;
            font-weight: bold;
            vertical-align: middle;
            transition: all 0.2s;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }
        .num-box.active {
            border-color: #eab308;
            background-color: rgba(254, 252, 232, 0.9);
            box-shadow: 0 0 0 4px rgba(254, 240, 138, 0.5);
        }
        .num-box.correct {
            border-color: #22c55e;
            background-color: rgba(240, 253, 244, 0.9);
            color: #166534;
        }

        .choice-btn {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px 20px;
            border: 4px solid rgba(203, 213, 225, 0.8);
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.8);
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 100px;
            backdrop-filter: blur(4px);
        }
        .choice-btn .sub-text {
            font-size: 0.9rem;
            font-weight: normal;
            color: #64748b;
            text-transform: lowercase;
            line-height: 1;
            margin-bottom: 2px;
        }
        .choice-btn:active {
            transform: scale(0.95);
        }
        .choice-btn.active-choice {
            border-color: #eab308;
            background-color: rgba(254, 252, 232, 0.9);
            box-shadow: 0 0 0 4px rgba(254, 240, 138, 0.5);
        }
        .choice-btn.correct {
            border-color: #22c55e;
            background-color: rgba(34, 197, 94, 0.9);
            color: white;
        }
        .choice-btn.correct .sub-text {
            color: rgba(255, 255, 255, 0.9);
        }

        ruby rt {
            font-size: 0.45em;
            font-weight: normal;
            color: #64748b;
            text-transform: lowercase;
        }

        /* 縮小九宮格按鈕與鍵盤樣式 */
        .numpad-btn {
            background-color: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(226, 232, 240, 0.8);
            border-radius: 12px;
            font-size: 1.8rem;
            font-weight: 900;
            color: #334155;
            padding: 8px 0;
            box-shadow: 0 3px 4px -1px rgba(0, 0, 0, 0.08);
            transition: all 0.1s;
            backdrop-filter: blur(4px);
        }
        .numpad-btn:active {
            background-color: rgba(241, 245, 249, 0.9);
            transform: translateY(2px);
        }
        .numpad-action {
            font-size: 1.3rem;
            background-color: rgba(248, 250, 252, 0.9);
        }
        .numpad-submit {
            background-color: rgba(59, 130, 246, 0.9);
            color: white;
            border-color: rgba(37, 99, 235, 0.8);
        }
        .numpad-submit:active {
            background-color: rgba(29, 78, 216, 0.9);
        }
    </style>
</head>
<body class="min-h-screen py-6 px-4 bg-green-50 relative overflow-x-hidden">

    <!-- 用於飄落特效的容器 -->
    <div id="celebrationContainer" class="absolute inset-0 pointer-events-none z-50"></div>

    <div class="max-w-7xl mx-auto">
        <!-- 頂部面板：模式切換與參數設定 -->
        <div class="w-full bg-white/60 backdrop-blur-xl rounded-3xl shadow-lg border-4 border-green-200/50 p-6 mb-6 animate-fade-in">
            <div class="flex flex-col md:flex-row gap-6 items-center justify-between mb-4 border-b-2 border-white/40 pb-4">
                
                <!-- 模式切換器 -->
                <div class="flex bg-slate-100/60 p-1.5 rounded-2xl border-2 border-slate-200/50">
                    <button id="modeTimeBtn" onclick="switchMode('time')" class="text-lg md:text-xl font-black px-6 py-2.5 rounded-xl transition duration-200 bg-white/90 text-green-700 shadow-md">
                        ⏱️ 60秒挑戰
                    </button>
                    <button id="modeStoryBtn" onclick="switchMode('story')" class="text-lg md:text-xl font-black px-6 py-2.5 rounded-xl transition duration-200 text-slate-600 hover:text-slate-800">
                        ⭐ 故事闖關
                    </button>
                </div>
                
                <!-- 計分與計時 UI -->
                <div class="flex gap-4 items-center">
                    <div id="timerDisplay" class="text-xl md:text-2xl font-black text-blue-700 bg-blue-100/80 border-2 border-blue-200 px-4 py-2 rounded-xl shadow-sm backdrop-blur-sm w-32 text-center">
                        ⏱️ 00:00
                    </div>
                    <div id="scoreDisplay" class="text-xl md:text-2xl font-black text-orange-600 bg-orange-100/80 border-2 border-orange-200 px-4 py-2 rounded-xl shadow-sm backdrop-blur-sm min-w-[140px] text-center">
                        🌟 分數: 0
                    </div>
                    <button onclick="showLeaderboardModal()" class="text-xl font-bold text-purple-700 bg-purple-100/90 hover:bg-purple-200/90 border-2 border-purple-300 px-4 py-2 rounded-xl transition shadow-sm backdrop-blur-sm">
                        🏆 排行榜
                    </button>
                </div>
            </div>

            <!-- 設定下拉選單 -->
            <div class="flex flex-wrap gap-4 items-center justify-center">
                <div class="flex items-center gap-2">
                    <label class="text-xl font-bold text-gray-800">主題：</label>
                    <select id="themeSelect" onchange="onSettingChange()" class="text-xl p-2.5 rounded-xl border-2 border-green-400/70 focus:outline-none bg-white/80 font-bold text-gray-800 shadow-sm backdrop-blur-sm">
                        <option value="Sanrio">Sanrio</option>
                        <option value="吉卜力">吉卜力</option>
                        <option value="Disney">Disney</option>
                        <option value="Marvel">Marvel</option>
                        <option value="Pixar">Pixar</option>
                        <option value="日本動漫">日本動漫</option>
                    </select>
                </div>
                <div class="flex items-center gap-2">
                    <label class="text-xl font-bold text-gray-800">難度：</label>
                    <select id="diffSelect" onchange="onSettingChange()" class="text-xl p-2.5 rounded-xl border-2 border-green-400/70 focus:outline-none bg-white/80 font-bold text-gray-800 shadow-sm backdrop-blur-sm">
                        <option value="易">易</option>
                        <option value="難">難</option>
                    </select>
                </div>
                <!-- 提示切換開關 (Toggle) -->
                <div class="flex items-center gap-2">
                    <span class="text-xl font-bold text-gray-800">提示：</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="hintToggle" class="sr-only peer" checked onchange="updateHintLabel(); onSettingChange()">
                        <div class="w-16 h-8 bg-slate-300/80 rounded-full peer peer-checked:bg-green-400/90 border-2 border-slate-200/50 peer-checked:border-green-400/50 transition-colors shadow-inner backdrop-blur-sm"></div>
                        <div class="absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition-transform peer-checked:translate-x-8 shadow-md"></div>
                    </label>
                    <span id="hintStatusText" class="text-xl font-bold text-green-700 ml-1 w-12 text-shadow-sm">開啟</span>
                </div>
                <button onclick="initGame()" class="bg-gradient-to-r from-orange-400/90 to-amber-500/90 hover:from-orange-500 hover:to-amber-600 text-white text-xl font-black py-2.5 px-8 rounded-xl shadow-md transform active:scale-95 transition backdrop-blur-sm border border-white/20">
                    開始遊戲 🚀
                </button>
            </div>

            <!-- 故事模式進度顯示條 -->
            <div id="storyProgressContainer" class="mt-6 pt-4 border-t-2 border-white/50 hidden">
                <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                    <div class="text-2xl font-black text-amber-600 flex items-center gap-2 drop-shadow-sm">
                        <span>🏆 闖關大挑戰</span>
                        <span id="progressText" class="bg-amber-100/90 text-amber-800 px-3 py-1 rounded-full text-lg shadow-sm">第 1 / 10 關</span>
                    </div>
                    <!-- 星星進度條 -->
                    <div id="starsProgress" class="flex gap-2 text-3xl">
                        <!-- 由 JS 動態繪製 10 顆星星 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 主要作答區域：左右佈局 -->
        <div class="flex flex-col lg:flex-row gap-6 items-start">
            
            <!-- 左側：故事背景、題目與步驟 -->
            <div class="w-full lg:flex-1 bg-white/60 backdrop-blur-xl rounded-3xl shadow-xl border-4 border-white/50 p-6 md:p-8 min-h-[500px] relative">
                
                <!-- 1. 溫馨故事導讀卡片 (僅故事模式顯示) -->
                <div id="storyCard" class="bg-gradient-to-r from-amber-50/80 to-orange-50/80 border-4 border-amber-200/60 rounded-2xl p-5 mb-6 text-xl md:text-2xl font-bold text-amber-900 shadow-inner flex items-start gap-3 backdrop-blur-sm hidden">
                    <span class="text-3xl leading-none">📖</span>
                    <div>
                        <div class="text-sm text-amber-600 font-extrabold tracking-widest uppercase mb-1">故事背景</div>
                        <div id="storyText">故事加載中...</div>
                    </div>
                </div>

                <!-- 2. 題目顯示區域 -->
                <div id="questionArea" class="bg-blue-50/80 border-4 border-blue-200/60 rounded-2xl p-6 mb-8 text-2xl md:text-3xl leading-loose font-bold text-gray-800 shadow-inner backdrop-blur-sm hidden">
                    <div id="qText"></div>
                </div>

                <!-- 3. 下方步驟作答區域 -->
                <div id="interactionArea" class="space-y-8 hidden">
                    <!-- 步驟 1: A 的數量 -->
                    <div id="step1" class="flex flex-wrap items-center gap-4 text-2xl md:text-3xl font-bold hidden whitespace-nowrap">
                        <span id="iCharA_Step1" class="text-red-600 drop-shadow-sm"></span>有
                        <div id="box_valA_S1" class="num-box"></div>
                        <span class="drop-shadow-sm"><span class="iObjUnit"></span><span class="iObjName"></span>，</span>
                        <span id="mark_s1" class="text-green-500 text-4xl hidden drop-shadow-sm">✅</span>
                    </div>

                    <!-- 步驟 2: B 比 A 的關係 -->
                    <div id="step2" class="flex flex-wrap items-center gap-4 text-2xl md:text-3xl font-bold hidden whitespace-nowrap">
                        <span id="iCharB_Step2" class="text-blue-600 drop-shadow-sm"></span>比 
                        <span id="iCharA_Step2" class="text-red-600 drop-shadow-sm"></span>
                        <div id="btnGroup_moreless" class="flex gap-3">
                            <button class="choice-btn" onclick="handleChoice('多')"><span class="sub-text">more</span>多</button>
                            <button class="choice-btn" onclick="handleChoice('少')"><span class="sub-text">less</span>少</button>
                        </div>
                        <div id="box_diff_S2_container" class="hidden flex items-center gap-4">
                            <div id="box_diff_S2" class="num-box"></div>
                            <span class="drop-shadow-sm"><span class="iObjUnit"></span><span class="iObjName"></span>。</span>
                            <span id="mark_s2" class="text-green-500 text-4xl hidden drop-shadow-sm">✅</span>
                        </div>
                    </div>

                    <!-- 步驟 3: 計算 B 的算式 -->
                    <div id="step3" class="flex flex-wrap items-center gap-4 text-2xl md:text-3xl font-bold hidden whitespace-nowrap">
                        <span id="iCharB_Step3" class="text-blue-600 font-black drop-shadow-sm"></span>：
                        <div id="box_valA_S3" class="num-box"></div>
                        <div id="btnGroup_op" class="flex gap-3">
                            <button class="choice-btn text-2xl h-16" onclick="handleChoice('+')">+</button>
                            <button class="choice-btn text-2xl h-16" onclick="handleChoice('-')">-</button>
                        </div>
                        <div id="box_valDiff_S3" class="num-box"></div>
                        <span class="drop-shadow-sm">=</span>
                        <span id="text_ans" class="text-4xl text-green-600 hidden drop-shadow-sm"></span>
                        <div id="box_ans" class="num-box hidden"></div>
                        <span id="mark_ans" class="text-green-500 text-4xl hidden drop-shadow-sm">✅</span>
                    </div>

                    <!-- 單關完成：下一步按鈕 (故事模式用) -->
                    <div id="nextLevelContainer" class="text-center pt-4 hidden">
                        <button onclick="goToNextLevel()" class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white text-3xl font-black py-4 px-12 rounded-2xl shadow-lg transform hover:scale-105 active:scale-95 transition">
                            進入下一關 ✨ 👉
                        </button>
                    </div>

                    <!-- 時間挑戰模式單題完成提示 -->
                    <div id="successMessage" class="text-center text-3xl font-bold text-orange-500 mt-8 hidden animate-bounce drop-shadow-md">
                        🎉 答對了！準備下一題... 🎉
                    </div>
                </div>
            </div>

            <!-- 右側：縮小版九宮格鍵盤 -->
            <div id="numpad" class="w-full lg:w-72 bg-white/60 backdrop-blur-xl rounded-3xl p-4 border-4 border-white/50 sticky top-6 hidden shrink-0 shadow-xl opacity-50 pointer-events-none transition-opacity duration-300">
                <div class="text-center mb-3 text-gray-600 font-bold uppercase tracking-widest text-xs drop-shadow-sm">數字輸入 <span class="text-[10px] lowercase text-green-600">(自動送出)</span></div>
                <div class="grid grid-cols-3 gap-2">
                    <button class="numpad-btn" onclick="inputNum('1')">1</button>
                    <button class="numpad-btn" onclick="inputNum('2')">2</button>
                    <button class="numpad-btn" onclick="inputNum('3')">3</button>
                    <button class="numpad-btn" onclick="inputNum('4')">4</button>
                    <button class="numpad-btn" onclick="inputNum('5')">5</button>
                    <button class="numpad-btn" onclick="inputNum('6')">6</button>
                    <button class="numpad-btn" onclick="inputNum('7')">7</button>
                    <button class="numpad-btn" onclick="inputNum('8')">8</button>
                    <button class="numpad-btn" onclick="inputNum('9')">9</button>
                    <button class="numpad-btn numpad-action text-red-500" onclick="clearNum()">清除</button>
                    <button class="numpad-btn" onclick="inputNum('0')">0</button>
                    <button class="numpad-btn numpad-submit bg-slate-300 border-slate-400 opacity-80" onclick="submitNum()" title="輸入正確會自動送出">確定</button>
                </div>
            </div>

        </div>
    </div>

    <!-- 答對關卡鼓勵視窗 (故事模式用) -->
    <div id="levelClearModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 hidden backdrop-blur-sm">
        <div class="bg-white/95 backdrop-blur-xl rounded-3xl p-8 max-w-md w-full border-8 border-green-300 shadow-2xl text-center transform scale-95 transition-all">
            <span class="text-7xl block mb-4">⭐</span>
            <h3 class="text-3xl font-black text-green-600 mb-2">答對了！好棒！</h3>
            <p id="modalEncourageText" class="text-xl font-bold text-gray-600 mb-6">你獲得了一顆星星！</p>
            <button onclick="closeClearModal()" class="w-full bg-green-500 hover:bg-green-600 text-white text-2xl font-black py-4 rounded-2xl shadow-md active:scale-95 transition">
                太棒了！ 🥳
            </button>
        </div>
    </div>

    <!-- 遊戲結束/結算視窗 -->
    <div id="gameOverModal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 hidden backdrop-blur-sm">
        <div class="bg-white/95 backdrop-blur-xl rounded-3xl p-8 max-w-lg w-full border-8 border-amber-300 shadow-2xl text-center transform transition-all">
            <span class="text-7xl block mb-4" id="endIcon">🏆</span>
            <h3 class="text-4xl font-black text-amber-600 mb-2" id="endTitle">遊戲結束！</h3>
            <div class="my-6 bg-amber-50 p-4 rounded-2xl border-2 border-amber-100">
                <p class="text-xl font-bold text-gray-600 mb-2">你的最終分數</p>
                <p class="text-5xl font-black text-orange-500" id="finalScoreText">0</p>
            </div>
            
            <div class="mb-6 text-left">
                <label class="block text-gray-700 font-bold mb-2 text-lg">留下你的大名：</label>
                <input type="text" id="playerNameInput" placeholder="例如：數學小勇士 (最多8字)" maxlength="8" class="w-full p-3 border-4 border-slate-200 rounded-xl text-xl font-bold focus:border-amber-400 focus:outline-none text-center">
            </div>

            <button onclick="submitScoreAndShowLB()" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white text-2xl font-black py-4 rounded-2xl shadow-md active:scale-95 transition">
                提交並查看排行榜 🥇
            </button>
        </div>
    </div>

    <!-- 排行榜視窗 -->
    <div id="leaderboardModal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 hidden backdrop-blur-sm">
        <div class="bg-white/95 backdrop-blur-xl rounded-3xl p-6 max-w-lg w-full border-4 border-purple-300 shadow-2xl flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center mb-4">
                <h3 id="lbTitle" class="text-3xl font-black text-purple-700">🏆 榮譽排行榜</h3>
                <button onclick="closeLeaderboardModal()" class="text-gray-400 hover:text-red-500 text-4xl font-bold leading-none">&times;</button>
            </div>
            
            <!-- 排行榜頁籤 -->
            <div class="flex bg-slate-100 p-1 rounded-xl mb-4">
                <button id="tabTimeLB" onclick="renderLeaderboard('time')" class="flex-1 py-2 text-lg font-bold rounded-lg bg-white shadow text-purple-700 transition">60秒挑戰</button>
                <button id="tabStoryLB" onclick="renderLeaderboard('story')" class="flex-1 py-2 text-lg font-bold rounded-lg text-slate-500 hover:text-slate-800 transition">故事闖關</button>
            </div>

            <!-- 名單區 -->
            <div class="overflow-y-auto flex-1 pr-2 custom-scrollbar">
                <ul id="leaderboardList" class="space-y-2">
                    <!-- JS 動態填入 -->
                </ul>
            </div>
            
            <div class="mt-4 pt-4 border-t-2 border-slate-100 text-center">
                <button onclick="closeLeaderboardModal()" class="bg-purple-500 hover:bg-purple-600 text-white text-xl font-black py-3 px-8 rounded-xl shadow-md active:scale-95 transition">
                    關閉
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 你的個人 Firebase 資料庫初始化 ---
        const firebaseConfig = {
            apiKey: "AIzaSyDb--vpnEkOGFBF8clfbmt6ufBxDDvIU0Y",
            authDomain: "margaret0209.firebaseapp.com",
            projectId: "margaret0209",
            storageBucket: "margaret0209.firebasestorage.app",
            messagingSenderId: "1057757105089",
            appId: "1:1057757105089:web:57591ca6c5853a468cfd40",
            measurementId: "G-RY56208R0P"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- 音效管理器 ---
        const SoundManager = {
            ctx: null,
            init: function() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            playTone: function(freq, type, duration, startTimeOffset = 0, vol = 0.1) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime + startTimeOffset);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime + startTimeOffset);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + startTimeOffset + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(this.ctx.currentTime + startTimeOffset);
                osc.stop(this.ctx.currentTime + startTimeOffset + duration);
            },
            click: function() { this.init(); this.playTone(600, 'sine', 0.1, 0, 0.05); },
            correct: function() { 
                this.init(); this.playTone(523.25, 'sine', 0.1, 0, 0.1); 
                this.playTone(659.25, 'sine', 0.1, 0.1, 0.1); 
                this.playTone(783.99, 'sine', 0.3, 0.2, 0.15); 
            },
            wrong: function() { 
                this.init(); this.playTone(150, 'sawtooth', 0.2, 0, 0.1); 
                this.playTone(100, 'sawtooth', 0.2, 0.15, 0.1); 
            },
            clear: function() { 
                this.init(); this.playTone(440, 'square', 0.1, 0, 0.05); 
                this.playTone(554.37, 'square', 0.1, 0.15, 0.05);

            if (currentMode === 'time' && timer <= 10) {
                document.getElementById('timerDisplay').classList.add('text-red-600', 'animate-pulse');
            } else {
                document.getElementById('timerDisplay').classList.remove('text-red-600', 'animate-pulse');
            }

                    valAns = valX + valY; correctMoreLess = "多"; correctOp = "+"; break;
                case 2:
                    questionHTML = `<span class="text-red-600">${charA}</span>有 ${valX} ${unit} ${obj}，<br><span class="text-blue-600">${charB}</span>比 <span class="text-red-600">${charA}</span>${moreLabel} ${valY} ${unit}，<br><span class="text-blue-600">${charB}</span>有多少${unit} ${obj}？`;
                    valAns = valX + valY; correctMoreLess = "多"; correctOp = "+"; break;
                case 3:
                    questionHTML = `<span class="text-red-600">${charA}</span>有 ${valX} ${unit} ${obj}，<br><span class="text-blue-600">${charB}</span>比 <span class="text-red-600">${charA}</span>${lessLabel} ${valY} ${unit}，<br><span class="text-blue-600">${charB}</span>有多少${unit} ${obj}？`;
                    valAns = valX - valY; correctMoreLess = "少"; correctOp = "-"; break;
            }

            document.getElementById("qText").innerHTML = questionHTML;
            
            if (currentMode === 'story') {
                document.getElementById("storyText").innerHTML = generateStoryText(themeKey, charA, charB, obj);
                document.getElementById("storyCard").classList.remove("hidden");
                updateStoryProgressUI();
            } else {
                document.getElementById("storyCard").classList.add("hidden");
            }

            document.getElementById("iCharA_Step1").innerText = charA;
            document.getElementById("iCharB_Step2").innerText = charB;
            document.getElementById("iCharA_Step2").innerText = charA;
            document.getElementById("iCharB_Step3").innerText = charB;
            
            document.querySelectorAll(".iObjName").forEach(el => el.innerText = obj);
            document.querySelectorAll(".iObjUnit").forEach(el => el.innerText = unit);

            resetUI();
            buildSequence();
            activateStep();
            
            document.getElementById("questionArea").classList.remove("hidden");
            document.getElementById("interactionArea").classList.remove("hidden");
            document.getElementById("numpad").classList.remove("hidden");
        }

        function updateStoryProgressUI() {
            document.getElementById("progressText").innerText = `第 ${currentLevel} / 10 關`;
            const starsContainer = document.getElementById("starsProgress");
            starsContainer.innerHTML = "";
            for (let i = 0; i < 10; i++) {
                const star = document.createElement("span");
                star.className = "transition-all duration-300 transform";
                if (i < currentLevel - 1 || storyProgress[i]) {
                    star.innerText = "⭐";
                    star.style.filter = "drop-shadow(0 2px 4px rgba(245,158,11,0.5))";
                    star.classList.add("scale-110", "inline-block");
                } else {
                    star.innerText = "⭐";
                    star.style.opacity = "0.2";
                    star.style.filter = "grayscale(100%)";
                }
                starsContainer.appendChild(star);
            }
        }

        function buildSequence() {
            let hintOn = document.getElementById("hintToggle").checked;
            sequence = [];

            if (hintOn) {
                sequence.push({ id: 'box_valA_S1', type: 'num', target: valX, showId: 'step1' });
                sequence.push({ id: 'btnGroup_moreless', type: 'choice', target: correctMoreLess, showId: 'step2' });
                sequence.push({ id: 'box_diff_S2', type: 'num', target: valY, showId: 'box_diff_S2_container' });
            }

            sequence.push({ id: 'box_valA_S3', type: 'num', target: valX, showId: 'step3' });
            sequence.push({ id: 'btnGroup_op', type: 'choice', target: correctOp, showId: 'step3' });
            sequence.push({ id: 'box_valDiff_S3', type: 'num', target: valY, showId: 'step3' });

            if (difficulty === '難') {
                sequence.push({ id: 'box_ans', type: 'num', target: valAns, showId: 'step3', isLast: true });
            } else {
                sequence[sequence.length - 1].isLast = true;
            }
        }

        function activateStep() {
            if (currentStepIndex >= sequence.length) return;
            let step = sequence[currentStepIndex];
            let container = document.getElementById(step.showId);
            if (container) container.classList.remove("hidden");

            const numpad = document.getElementById("numpad");
            if (step.type === 'num') {
                numpad.style.opacity = "1";
                numpad.style.pointerEvents = "auto";
                let box = document.getElementById(step.id);
                document.querySelectorAll('.num-box').forEach(b => b.classList.remove('active'));
                box.classList.remove("hidden");
                box.classList.add("active");
                currentInputVal = "";
            } else {
                numpad.style.opacity = "0.5";
                numpad.style.pointerEvents = "none";
                if (step.id === 'btnGroup_moreless' || step.id === 'btnGroup_op') {
                    document.getElementById(step.id).classList.add("active-choice");
                }
            }
        }

        // 改良版 inputNum: 加入智能自動送出邏輯
        function inputNum(n) {
            if (isSubmitting) return; // 避免連點引發多次送出
            let step = sequence[currentStepIndex];
            if (!step || step.type !== 'num') return;
            
            SoundManager.click();
            let targetStr = step.target.toString();

            if (currentInputVal.length < targetStr.length) {
                currentInputVal += n;
                document.getElementById(step.id).innerText = currentInputVal;
            }

            // 判斷是否需要自動送出 (1. 答案完全正確, 或 2. 長度達標但不正確，讓它自動判定錯誤)
            if (currentInputVal === targetStr) {
                isSubmitting = true;
                setTimeout(() => { isSubmitting = false; submitNum(); }, 150);
            } else if (currentInputVal.length >= targetStr.length) {
                isSubmitting = true;
                setTimeout(() => { isSubmitting = false; submitNum(); }, 150);
            }
        }

        function clearNum() {
            let step = sequence[currentStepIndex];
            if (!step || step.type !== 'num') return;
            SoundManager.click();
            currentInputVal = "";
            document.getElementById(step.id).innerText = "";
        }

        // submitNum 現可由自動偵測觸發，或手動點擊「確定」
        function submitNum() {
            let step = sequence[currentStepIndex];
            if (!step || step.type !== 'num') return;

            let box = document.getElementById(step.id);
            let inputNumVal = parseInt(currentInputVal, 10);

            if (inputNumVal === step.target) {
                SoundManager.correct();
                addScore(10); // 答對一個步驟加 10 分
                box.classList.remove("active");
                box.classList.add("correct");
                
                if (step.id === 'box_valA_S1') document.getElementById('mark_s1').classList.remove('hidden');
                if (step.id === 'box_diff_S2') document.getElementById('mark_s2').classList.remove('hidden');
                if (step.id === 'box_ans') document.getElementById('mark_ans').classList.remove('hidden');
                
                nextStep(step);
            } else {
                SoundManager.wrong();
                box.classList.add("error-shake");
                setTimeout(() => box.classList.remove("error-shake"), 400);
                clearNum();
            }
        }

        function handleChoice(val) {
            let step = sequence[currentStepIndex];
            if (!step || step.type !== 'choice') return;
            let container = document.getElementById(step.id);
            let buttons = Array.from(container.querySelectorAll('button'));

            if (val === step.target) {
                SoundManager.correct();
                addScore(10); // 答對選擇題加 10 分
                container.classList.remove("active-choice");
                buttons.forEach(btn => {
                    if (btn.innerText.includes(val) || btn.innerText === val) {
                        btn.classList.add("correct");
                    } else {
                        btn.classList.add("hidden");
                    }
                    btn.disabled = true;
                });
                nextStep(step);
            } else {
                SoundManager.wrong();
                let wrongBtn = buttons.find(b => b.innerText.includes(val) || b.innerText === val);
                if (wrongBtn) {
                    wrongBtn.classList.add("error-shake");
                    setTimeout(() => wrongBtn.classList.remove("error-shake"), 400);
                }
            }
        }

        function nextStep(currentStep) {
            currentStepIndex++;
            if (currentStep.isLast) {
                document.getElementById("numpad").style.opacity = "0.5";
                document.getElementById("numpad").style.pointerEvents = "none";
                
                if (difficulty === '易') {
                    let ansText = document.getElementById("text_ans");
                    ansText.innerText = valAns;
                    ansText.classList.remove("hidden");
                    document.getElementById('mark_ans').classList.remove('hidden');
                }

                // 答對整題加 100 分
                addScore(100);

                if (currentMode === 'time') {
                    document.getElementById("successMessage").classList.remove("hidden");
                    // 計時挑戰：1秒後自動進下一題，爭取時間
                    setTimeout(() => {
                        if (timer > 0) startGame();
                    }, 1000);
                } else {
                    storyProgress[currentLevel - 1] = true;
                    updateStoryProgressUI();
                    if (currentLevel < 10) {
                        showClearModal();
                    } else {
                        endGame(); // 故事通關
                    }
                }
            } else {
                activateStep();
            }
        }

        function showClearModal() {
            SoundManager.clear();
            const modal = document.getElementById("levelClearModal");
            const txt = document.getElementById("modalEncourageText");
            const encourages = ["好棒喔！成功挑戰第 " + currentLevel + " 關！", "你太厲害了！離通關又近了一步！", "真聰明！繼續保持！加油！", "卡通夥伴們都為你歡呼呢！", "答題速度真快！你是數學小天才！"];
            txt.innerText = getRandom(encourages);
            modal.classList.remove("hidden");
            triggerConfettiEffect(25);
        }

        function closeClearModal() {
            SoundManager.click();
            document.getElementById("levelClearModal").classList.add("hidden");
            if (currentLevel < 10) {
                document.getElementById("nextLevelContainer").classList.remove("hidden");
            }
        }

        function goToNextLevel() {
            SoundManager.click();
            document.getElementById("nextLevelContainer").classList.add("hidden");
            currentLevel++;
            startGame();
        }

        // --- 遊戲結束與結算 ---
        function endGame() {
            clearInterval(timerInterval);
            SoundManager.champion();
            
            // 故事模式通關有時間獎勵 (越快越高分，每秒扣 5 分，滿分 3000)
            if (currentMode === 'story') {
                let timeBonus = Math.max(0, 3000 - (timer * 5));
                addScore(timeBonus);
                document.getElementById("endTitle").innerText = "恭喜完成 10 關大挑戰！";
                document.getElementById("endIcon").innerText = "🏆";
                triggerConfettiEffect(150);
                setTimeout(() => triggerConfettiEffect(100), 1500);
            } else {
                document.getElementById("endTitle").innerText = "時間到！";
                document.getElementById("endIcon").innerText = "⏱️";
            }
            
            document.getElementById("finalScoreText").innerText = score;
            document.getElementById("gameOverModal").classList.remove("hidden");
        }

        // --- 排行榜儲存與顯示 (整合 Firebase) ---
        async function submitScoreAndShowLB() {
            SoundManager.click();
            let name = document.getElementById("playerNameInput").value.trim();
            if (!name) name = "無名英雄";
            
            // 將不同難度分開儲存，確保排行榜公平
            difficulty = document.getElementById("diffSelect").value;
            let storageKey = `leaderboard_${currentMode}_${difficulty === '難' ? 'hard' : 'easy'}`;
            
            // 替換原本的 localStorage，改為儲存到個人的 Firebase 資料庫
            try {
                // 將成績加入對應的 collection，不處理排序，讓讀取端以 JavaScript 統一處理（避免建立索引報錯）
                await db.collection(storageKey).add({
                    name: name,
                    score: score,
                    date: new Date().toLocaleDateString(),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch (error) {
                console.error("寫入 Firebase 失敗：", error);
            }
            
            document.getElementById("gameOverModal").classList.add("hidden");
            
            // 清空輸入框
            document.getElementById("playerNameInput").value = "";
            
            showLeaderboardModal(currentMode);
        }

        function showLeaderboardModal(activeTab = 'time') {
            SoundManager.click();
            document.getElementById("leaderboardModal").classList.remove("hidden");
            renderLeaderboard(activeTab);
        }

        function closeLeaderboardModal() {
            SoundManager.click();
            document.getElementById("leaderboardModal").classList.add("hidden");
        }

        async function renderLeaderboard(tab) {
            SoundManager.click();
            
            // 獲取當前難度來更新頁籤文字與標題
            difficulty = document.getElementById("diffSelect").value;
            const timeStr = difficulty === '難' ? '180秒挑戰' : '60秒挑戰';
            const tabTimeLB = document.getElementById("tabTimeLB");
            const tabStoryLB = document.getElementById("tabStoryLB");
            
            document.getElementById("lbTitle").innerText = `🏆 榮譽排行榜 (${difficulty})`;
            tabTimeLB.innerText = timeStr;

            // 切換頁籤視覺
            if (tab === 'time') {
                tabTimeLB.className = "flex-1 py-2 text-lg font-bold rounded-lg bg-white shadow text-purple-700 transition";
                tabStoryLB.className = "flex-1 py-2 text-lg font-bold rounded-lg text-slate-500 hover:text-slate-800 transition";
            } else {
                tabStoryLB.className = "flex-1 py-2 text-lg font-bold rounded-lg bg-white shadow text-purple-700 transition";
                tabTimeLB.className = "flex-1 py-2 text-lg font-bold rounded-lg text-slate-500 hover:text-slate-800 transition";
            }

            const listEl = document.getElementById("leaderboardList");
            listEl.innerHTML = "<li class='text-center py-6 text-gray-500 font-bold'>正在從雲端載入數據...</li>";

            // 讀取數據：依據不同難度從個人的 Firebase 資料庫讀取
            let storageKey = `leaderboard_${tab}_${difficulty === '難' ? 'hard' : 'easy'}`;
            let lb = [];
            
            try {
                // 取出該集合內的所有資料
                const snapshot = await db.collection(storageKey).get();
                snapshot.forEach(doc => {
                    lb.push(doc.data());
                });

                // 取出後，在前端 JavaScript 進行分數由高到低的排序（避免未設置 Firebase 複合索引而報錯）
                lb.sort((a, b) => b.score - a.score);
                lb = lb.slice(0, 10); // 只保留前 10 名
                
            } catch (error) {
                console.error("從 Firebase 讀取失敗：", error);
                listEl.innerHTML = "<li class='text-center py-6 text-red-500 font-bold'>載入失敗，請檢查網絡。</li>";
                return;
            }

            listEl.innerHTML = "";

            if (lb.length === 0) {
                listEl.innerHTML = "<li class='text-center py-6 text-gray-500 font-bold'>目前尚無紀錄，快來挑戰吧！</li>";
                return;
            }

            // 渲染前 10 名
            lb.forEach((entry, index) => {
                let badge = "";
                if (index === 0) badge = "🥇";
                else if (index === 1) badge = "🥈";
                else if (index === 2) badge = "🥉";
                else badge = `<span class="inline-block w-6 text-center text-gray-400">${index + 1}</span>`;

                const li = document.createElement("li");
                li.className = "flex items-center justify-between bg-slate-50 p-3 rounded-xl border border-slate-200";
                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">${badge}</span>
                        <span class="font-bold text-gray-800 text-lg">${entry.name}</span>
                    </div>
                    <div class="text-right">
                        <span class="font-black text-orange-500 text-xl">${entry.score} 分</span>
                        <div class="text-xs text-gray-400">${entry.date}</div>
                    </div>
                `;
                listEl.appendChild(li);
            });
        }

        // 煙火特效
        function triggerConfettiEffect(count) {
            const container = document.getElementById("celebrationContainer");
            const colors = ['#f43f5e', '#ec4899', '#d946ef', '#a855f7', '#8b5cf6', '#6366f1', '#3b82f6', '#0ea5e9', '#10b981', '#f59e0b', '#f97316'];
            for (let i = 0; i < count; i++) {
                const conf = document.createElement("div");
                conf.className = "confetti";
                conf.style.backgroundColor = getRandom(colors);
                conf.style.left = Math.random() * 100 + "vw";
                conf.style.animationDelay = Math.random() * 2 + "s";
                conf.style.animationDuration = (Math.random() * 2 + 2) + "s";
                conf.style.borderRadius = Math.random() > 0.5 ? "50%" : "0";
                container.appendChild(conf);
                setTimeout(() => conf.remove(), 4000);
            }
        }

        function resetUI() {
            currentStepIndex = 0;
            currentInputVal = "";
            document.getElementById("successMessage").classList.add("hidden");
            document.getElementById("nextLevelContainer").classList.add("hidden");

            const elementsToHide = ['step1', 'step2', 'step3', 'box_diff_S2_container', 'mark_s1', 'mark_s2', 'mark_ans', 'text_ans', 'box_ans'];
            for (let i = 0; i < elementsToHide.length; i++) {
                const el = document.getElementById(elementsToHide[i]);
                if (el) el.classList.add("hidden");
            }

            document.querySelectorAll(".num-box").forEach(box => {
                box.innerText = "";
                box.classList.remove("active", "correct", "error-shake", "hidden");
                const defaultHiddenBoxes = ['box_ans', 'box_valA_S3', 'box_valDiff_S3'];
                if (defaultHiddenBoxes.indexOf(box.id) !== -1) {
                    box.classList.add('hidden');
                }
            });

            document.querySelectorAll(".choice-btn").forEach(btn => {
                btn.classList.remove("correct", "active-choice", "hidden", "error-shake");
                btn.disabled = false;
            });
        }

        window.onload = () => {
            switchMode('time'); // 預設進來是60秒挑戰
        };
    </script>
</body>
</html>
