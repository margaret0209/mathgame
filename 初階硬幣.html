<!DOCTYPE html>
<html lang="zh-Hant">
<head>

  <title>硬幣總值互動遊戲 - 清新可愛風</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Noto Sans TC & Quicksand for a cute rounded look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <!-- Confetti.js for celebration -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <style>
    body {
      font-family: 'Quicksand', 'Noto Sans TC', sans-serif;
      background-color: #FFFDF9; /* 極柔和溫暖的馬卡龍底色 */
      touch-action: manipulation; /* 優化雙擊縮放 */
    }
    .cute-shadow {
      box-shadow: 0 6px 0px 0px #F9EBE0;
    }
    .cute-card {
      border: 3px solid #FFD3BA; /* 柔和粉橘邊框 */
      border-radius: 24px;
      background: #FFFFFF;
      transition: all 0.2s ease;
    }
    
    /* 馬卡龍色系按鈕定義 */
    .btn-macaron-yellow {
      background-color: #FFF9E6;
      border: 3px solid #F5CBA7;
      box-shadow: 0 4px 0px 0px #F5CBA7;
      color: #7E5109;
      transition: all 0.1s ease;
    }
    .btn-macaron-yellow:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0px 0px #F5CBA7;
    }
    
    .btn-macaron-green {
      background-color: #E8F8F5;
      border: 3px solid #A2D9CE;
      box-shadow: 0 4px 0px 0px #A2D9CE;
      color: #117864;
      transition: all 0.1s ease;
    }
    .btn-macaron-green:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0px 0px #A2D9CE;
    }

    .btn-macaron-purple {
      background-color: #F5EEF8;
      border: 3px solid #D7BDE2;
      box-shadow: 0 4px 0px 0px #D7BDE2;
      color: #512E5F;
      transition: all 0.1s ease;
    }
    .btn-macaron-purple:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0px 0px #D7BDE2;
    }

    .btn-macaron-pink {
      background-color: #FDEDEC;
      border: 3px solid #F5B7B1;
      box-shadow: 0 4px 0px 0px #F5B7B1;
      color: #78281F;
      transition: all 0.1s ease;
    }
    .btn-macaron-pink:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0px 0px #F5B7B1;
    }

    .btn-macaron-cyan {
      background-color: #EBF5FB;
      border: 3px solid #AED6F1;
      box-shadow: 0 4px 0px 0px #AED6F1;
      color: #1B4F72;
      transition: all 0.1s ease;
    }
    .btn-macaron-cyan:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0px 0px #AED6F1;
    }

    .coin-img {
      transition: transform 0.2s ease, filter 0.2s ease;
    }
    .coin-img:not(.dragging):hover {
      transform: scale(1.1) rotate(5deg);
    }
    /* 拖曳時的樣式 */
    .dragging {
      opacity: 0.4 !important;
      transform: scale(0.9) !important;
    }
    /* 分類框與置放區閃爍效果 */
    .drop-zone-active {
      border-color: #FFB37C !important;
      background-color: #FFF5EE !important;
      transform: scale(1.02);
    }
    /* 正確答案的閃亮發光外框特效 */
    .glow-correct {
      box-shadow: 0 0 0 3px #FFFFFF, 0 0 0 6px #4ade80, 0 6px 12px 6px rgba(74, 222, 128, 0.4) !important;
      border-color: #4ade80 !important;
      transform: scale(1.03) !important;
      z-index: 10;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    /* 行動裝置拖拉中的實體殘影 style */
    .touch-drag-clone {
      pointer-events: none !important;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
      transform: scale(1.1);
    }
  </style>
</head>
<body class="h-screen flex flex-col justify-between bg-[#FFFDF9] select-none overflow-hidden pb-4">

  <!-- 頂部導覽列與模式切換 (縮減 py 以爭取高度) -->
  <header class="bg-[#FFF2E6] border-b-4 border-[#FFE0CC] py-2 px-6 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-2 md:gap-4">
      <!-- 標題 -->
      <div class="flex items-center gap-2">
        <span class="text-3xl">💰</span>
        <h1 class="text-xl md:text-2xl font-bold text-[#8C5D3A] tracking-wider">硬幣大冒險！</h1>
      </div>

      <!-- 控制面板：模式與提示 -->
      <div class="flex flex-wrap items-center justify-center gap-3">
        <!-- 選擇模式 -->
        <div class="flex items-center gap-2">
          <label for="modeSelect" class="font-bold text-[#8C5D3A] text-xs md:text-sm">選擇關卡：</label>
          <select id="modeSelect" onchange="switchMode()" class="bg-white border-2 border-[#FFD3BA] rounded-full px-3 py-1 text-[#8C5D3A] font-bold focus:outline-none focus:ring-2 focus:ring-[#FFB37C] cursor-pointer text-xs md:text-sm shadow-sm">
            <option value="match">🧩 配對模式</option>
            <option value="match_advanced">🧩 進階配對模式</option>
            <option value="classify">🧺 分類模式</option>
            <option value="value">📝 幣值模式</option>
            <option value="total">🔢 總值模式</option>
            <option value="pay_easy">🛒 簡易付款</option>
            <option value="pay_medium">🛒 中階付款</option>
            <option value="pay_hard">🛒 進階付款</option>
          </select>
        </div>

        <!-- 提示開關 -->
        <div class="flex items-center gap-2 bg-white px-3 py-1 rounded-full border-2 border-[#FFD3BA]">
          <span class="text-xs font-bold text-[#8C5D3A]">💡 提示</span>
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="hintToggle" onchange="toggleHint()" class="sr-only peer" checked>
            <div class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-[#FFB37C]"></div>
          </label>
        </div>

        <!-- 得分板 -->
        <div class="bg-[#FF9E79] text-white font-bold px-3 py-1 rounded-full shadow-md text-xs md:text-sm">
          得分: <span id="scoreText">0</span> 分
        </div>
      </div>
    </div>
  </header>

  <!-- 主遊戲視窗 (使用 flex-grow 與 overflow-hidden 確保絕不溢出) -->
  <main class="max-w-6xl mx-auto px-4 mt-2 mb-1 flex-grow flex flex-col justify-center overflow-hidden w-full">
    
    <!-- 答對與提示反饋橫幅 (縮小 padding 及 margin) -->
    <div id="feedbackContainer" class="hidden cute-card bg-[#FFFDF5] border-[#FFEAA7] p-2 mb-2 text-center text-[#B7950B] font-bold text-sm md:text-base transition-all relative">
      <span id="feedbackText">做得好！</span>
    </div>

    <!-- 遊戲工作區 (調整 min-h 與 padding) -->
    <div class="cute-card bg-white p-4 md:p-6 cute-shadow flex-grow flex flex-col justify-between overflow-hidden">
      
      <!-- 關卡標題與動態說明 (精簡字體大小) -->
      <div class="mb-2 text-center">
        <h2 id="gameTitle" class="text-lg md:text-xl font-bold text-[#FF8552]">關卡載入中...</h2>
        <p id="gameDesc" class="text-gray-500 font-bold text-xs md:text-sm"></p>
      </div>

      <!-- 核心互動區 (利用 flex-grow 與 overflow-hidden 達到完全貼合) -->
      <div id="interactionArea" class="flex-grow flex flex-col items-center justify-center gap-2 md:gap-4 py-1 overflow-hidden">
        <!-- 內容由 JS 動態生成 -->
      </div>

      <!-- 重來 / 下一題按鈕 -->
      <div class="mt-2 flex justify-center gap-3">
        <button onclick="resetCurrentGame()" class="btn-macaron-yellow text-xs md:text-sm font-bold py-2 px-5 rounded-full flex items-center gap-1">
          🔄 重新挑戰
        </button>
        <button id="nextBtn" onclick="nextQuestion()" class="btn-macaron-green text-xs md:text-sm font-bold py-2 px-6 rounded-full flex items-center gap-1 hidden">
          🌟 下一題 ✨
        </button>
      </div>

    </div>

  </main>

  <script>
    const COIN_IMAGES = {

      0.5: "https://raw.githubusercontent.com/margaret0209/mathgame/refs/heads/main/5角正面.png",

    }

      { name: "泰迪熊玩偶", emoji: "🧸" },

      { name: "哈士奇玩偶", emoji: "🐶" },

      { name: "小豬公仔", emoji: "🐷" },

      { name: "蝙蝠模型", emoji: "🦇" },
      { name: "狐狸布偶", emoji: "🦊" },
      { name: "浣熊玩偶", emoji: "🦝" },
      { name: "夢幻獨角獸", emoji: "🦄" },

      { name: "長頸鹿玩偶", emoji: "🦒" },
      { name: "駱駝模型", emoji: "🐫" },
      { name: "綿羊絨毛玩具", emoji: "🐑" },

      { name: "山羊模型", emoji: "🐐" },
      { name: "牛牛抱枕", emoji: "🐮" },
      { name: "小馬騎乘玩具", emoji: "🐴" },

      { name: "鯊魚牙齒玩具", emoji: "🦈" },
      { name: "彩色積木", emoji: "🧱" },
      { name: "發光小汽車", emoji: "🚗" },
      { name: "小飛機模型", emoji: "✈️" }
    ];

    let currentMode = 'match';
    let score = 0;
    let hintEnabled = true;
    let isAnsweredCorrectly = false; 

    let currentQuestionData = {};
    let wrongOptions = []; 
    let paidAmount = 0;    
    let selectedCount = 0; 
    
    let lastMatchVal = null;
    let lastValueVal = null;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, duration) {
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }

    function playSuccessSound() {
      playTone(523.25, 'triangle', 0.1); 
      setTimeout(() => playTone(659.25, 'triangle', 0.15), 100); 
      setTimeout(() => playTone(783.99, 'triangle', 0.2), 200); 
    }

    // 答錯音效
    function playWrongSound() {
      playTone(220, 'sawtooth', 0.2); 
    }

    // 金屬硬幣音效
    function playCoinSound() {
      playTone(987.77, 'sine', 0.05); 
    }

    window.onload = function() {
      switchMode();
    };

    function toggleHint() {
      hintEnabled = document.getElementById('hintToggle').checked;
      renderHint();
      renderGame();
      
      if (hintEnabled && ['pay_medium', 'pay_hard'].includes(currentMode)) {
        if (paidAmount === currentQuestionData.targetValue && !isAnsweredCorrectly) {
          handleSuccess();
        } else if (paidAmount > currentQuestionData.targetValue && !isAnsweredCorrectly) {
          paidAmount = 0;
          if (currentQuestionData.insertedCoins) currentQuestionData.insertedCoins = [];
          renderGame();
        }
      }
    }

    function renderHint() {
      const feedback = document.getElementById('feedbackContainer');
      const textSpan = document.getElementById('feedbackText');
      
      if (!hintEnabled) {
        if (feedback) feedback.classList.add('hidden');
        return;
      }

      if (feedback) feedback.classList.remove('hidden');
      if (!textSpan) return;
      
      if (currentMode === 'match' || currentMode === 'match_advanced') {
        textSpan.innerHTML = `💡 提示：這個硬幣是 <b>${getCoinName(currentQuestionData.targetValue)}</b> 喔！請把它拖曳配對到下面一樣的硬幣。`;
      } else if (currentMode === 'classify') {
        textSpan.innerHTML = `💡 提示：請動動手指，把硬幣一個個拖曳放到對應的小籃子裡！`;
      } else if (currentMode === 'value') {
        textSpan.innerHTML = `💡 提示：這個硬幣的幣值是 <b>${currentQuestionData.targetValue}元</b>，選出對應的文字吧。`;
      } else if (currentMode === 'total') {
        textSpan.innerHTML = `💡 提示：用手指點點看硬幣，數一數這裡總共有幾枚 1 元呢？一共有 <b>${currentQuestionData.targetValue}元</b> 喔！`;
      } else if (currentMode === 'pay_easy') {
        textSpan.innerHTML = `💡 提示：貨品需要 <b>$${currentQuestionData.targetValue}</b>，正好有一枚硬幣是這個面額喔，請把它拖拉到上方的付款區！`;
      } else if (currentMode === 'pay_medium') {
        const remaining = currentQuestionData.targetValue - paidAmount;
        textSpan.innerHTML = `💡 提示：還需要 <b>$${remaining}</b>。請重覆把下方的 1 元拖拉到上方的籃子裡付款！`;
      } else if (currentMode === 'pay_hard') {
        const remaining = currentQuestionData.targetValue - paidAmount;
        textSpan.innerHTML = `💡 提示：還差 <b>$${remaining}元</b>。你可以自由搭配並拖曳 1元、2元、5元 或 10元 喔！`;
      }
    }

    function switchMode() {
      currentMode = document.getElementById('modeSelect').value;
      wrongOptions = [];
      document.getElementById('nextBtn').classList.add('hidden');
      resetCurrentGame();
    }

    function resetCurrentGame() {
      wrongOptions = [];
      paidAmount = 0;
      selectedCount = 0;
      isAnsweredCorrectly = false; 
      
      const interactionArea = document.getElementById('interactionArea');
      if (interactionArea) {
        interactionArea.style.pointerEvents = 'auto';
      }
      
      document.getElementById('nextBtn').classList.add('hidden');

      if (currentMode === 'match' || currentMode === 'match_advanced') {
        const activePool = currentMode === 'match_advanced' ? ADVANCED_COIN_VALUES : COIN_VALUES;
        let val;
        do { val = activePool[Math.floor(Math.random() * activePool.length)]; } while (val === lastMatchVal && activePool.length > 1);
        lastMatchVal = val;
        currentQuestionData = { targetValue: val };
      } else if (currentMode === 'value') {
        let val;
        do { val = COIN_VALUES[Math.floor(Math.random() * COIN_VALUES.length)]; } while (val === lastValueVal && COIN_VALUES.length > 1);
        lastValueVal = val;
        currentQuestionData = { targetValue: val };
      } else if (currentMode === 'classify') {
        let pool = [];
        COIN_VALUES.forEach(val => {
          const count = Math.floor(Math.random() * 2) + 2;
          for (let i = 0; i < count; i++) pool.push(val);
        });
        pool.sort(() => Math.random() - 0.5);
        currentQuestionData = { coinPool: pool, totalCount: pool.length, classified: {} };
      } else if (currentMode === 'total') {
        const count = Math.floor(Math.random() * 10) + 1;
        currentQuestionData = { targetValue: count };
      } else if (currentMode === 'pay_easy') {
        const val = COIN_VALUES[Math.floor(Math.random() * COIN_VALUES.length)];
        const randomItem = TOY_DATABASE[Math.floor(Math.random() * TOY_DATABASE.length)];
        currentQuestionData = { 
          targetValue: val, 
          itemName: randomItem.name, 
          itemEmoji: randomItem.emoji 
        };
      } else if (currentMode === 'pay_medium' || currentMode === 'pay_hard') {
        const price = Math.floor(Math.random() * 10) + 1;
        const randomItem = TOY_DATABASE[Math.floor(Math.random() * TOY_DATABASE.length)];
        currentQuestionData = { 
          targetValue: price, 
          itemName: randomItem.name, 
          itemEmoji: randomItem.emoji 
        };
      }

      renderGame();
      renderHint();
    }

    function makeElementTouchDraggable(el, getDragData, getDropZones, onDropSuccess) {
      let activeClone = null;
      let startX, startY;
      let initialRect;

      el.addEventListener('touchstart', function(e) {
        if (isAnsweredCorrectly) return; 
        e.preventDefault();
        const touch = e.touches[0];
        startX = touch.clientX;
        startY = touch.clientY;
        initialRect = el.getBoundingClientRect();

        activeClone = el.cloneNode(true);
        activeClone.classList.add('touch-drag-clone');
        activeClone.style.position = 'fixed';
        activeClone.style.left = `${initialRect.left}px`;
        activeClone.style.top = `${initialRect.top}px`;
        activeClone.style.width = `${initialRect.width}px`;
        activeClone.style.height = `${initialRect.height}px`;
        activeClone.style.opacity = '0.9';
        activeClone.style.zIndex = '9999';
        activeClone.style.pointerEvents = 'none';
        document.body.appendChild(activeClone);
        
        el.classList.add('dragging');
      }, { passive: false });

      el.addEventListener('touchmove', function(e) {
        if (!activeClone) return;
        e.preventDefault();
        const touch = e.touches[0];
        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;
        
        activeClone.style.left = `${initialRect.left + dx}px`;
        activeClone.style.top = `${initialRect.top + dy}px`;

        const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
        const dropZones = getDropZones();
        dropZones.forEach(zone => {
          if (zone.el && (zone.el === targetEl || zone.el.contains(targetEl))) {
            zone.el.classList.add('drop-zone-active');
          } else if (zone.el) {
            zone.el.classList.remove('drop-zone-active');
          }
        });
      }, { passive: false });

      el.addEventListener('touchend', function(e) {
        if (!activeClone) return;
        e.preventDefault();
        el.classList.remove('dragging');
        
        const touch = e.changedTouches[0];
        const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
        
        document.body.removeChild(activeClone);
        activeClone = null;

        const dropZones = getDropZones();
        dropZones.forEach(zone => { if (zone.el) zone.el.classList.remove('drop-zone-active'); });

        if (!targetEl) return;

        const dragData = getDragData();
        for (let zone of dropZones) {
          if (zone.el && (zone.el === targetEl || zone.el.contains(targetEl))) {
            onDropSuccess(dragData, zone.value);
            return;
          }
        }
      }, { passive: false });
    }

          <span class="font-bold text-xs md:text-sm text-gray-700">${getCoinName(val)}</span>

          optionCard.classList.add('drop-zone-active');
        };
        optionCard.ondragleave = () => {
          optionCard.classList.remove('drop-zone-active');
        };

          checkMatchAnswer(zoneVal);
        }

    function checkMatchAnswer(chosenValue) {
      if (isAnsweredCorrectly) return;
      if (chosenValue === currentQuestionData.targetValue) {
        const cards = document.querySelectorAll('[data-val]');
        cards.forEach(card => {
          if (parseFloat(card.getAttribute('data-val')) === chosenValue) {
            card.classList.add('glow-correct');
          }
        });
        handleSuccess();
      } else {
        handleWrong(chosenValue);
        renderGame();
      }
    }

          coinImg.id = `classify-coin-${idx}`;
          
          coinImg.ondragstart = (e) => {
            if (isAnsweredCorrectly) {

        const coinHintHtml = hintEnabled 
          ? `<img src="${COIN_IMAGES[val]}" class="w-8 h-8 md:w-9 md:h-9 mb-1 filter drop-shadow-sm pointer-events-none" alt="${val}元硬幣提示" />`

        };

          basket.classList.remove('drop-zone-active');
        };
        basket.ondrop = (e) => {
          if (isAnsweredCorrectly) return;
          e.preventDefault();
          basket.classList.remove('drop-zone-active');
          try {
            const data = JSON.parse(e.dataTransfer.getData('text/plain'));
            processClassify(data.val, data.idx, val);
          } catch (err) {}
        };

        basketsContainer.appendChild(basket);
      });

      container.appendChild(basketsContainer);
    }

    function processClassify(coinVal, poolIndex, targetBasketVal) {
      if (isAnsweredCorrectly) return;
      if (coinVal === targetBasketVal) {
        playCoinSound();
        currentQuestionData.coinPool.splice(poolIndex, 1);
        currentQuestionData.classified[coinVal] = (currentQuestionData.classified[coinVal] || 0) + 1;
        
        if (currentQuestionData.coinPool.length === 0) {
          renderGame(); 
          setTimeout(() => {
            handleSuccess(false);
            document.getElementById('nextBtn').classList.remove('hidden');
          }, 300);
        } else {
          renderGame();
        }
      } else {
        playWrongSound();
        const feedback = document.getElementById('feedbackContainer');
        feedback.classList.remove('hidden');
        document.getElementById('feedbackText').innerHTML = `❌ 哎呀！那是 <b>${coinVal}元</b> 喔，不能放進 <b>${targetBasketVal}元籃子</b> 裡。`;
        setTimeout(() => renderHint(), 2500);
      }
    }

    // -------------------------------------------------------------
    // 4. 總值模式渲染 (修正：每次 render 時將計數歸零，允許錯誤後點選)
    // -------------------------------------------------------------
    function renderTotalMode(container) {
      selectedCount = 0; // 重置點算數量，讓錯誤重新渲染後能重新順暢點算！
      
      const coinsArea = document.createElement('div');
      coinsArea.className = "flex flex-wrap justify-center gap-2 p-4 bg-yellow-50/50 border-2 border-dashed border-yellow-200 rounded-2xl w-full max-w-2xl min-h-[90px] md:min-h-[110px]";
      
      for (let i = 0; i < currentQuestionData.targetValue; i++) {
        const coinWrapper = document.createElement('div');
        coinWrapper.className = "relative flex flex-col items-center";

        const img = document.createElement('img');
        img.src = COIN_IMAGES[1];
        img.className = "w-10 h-10 md:w-11 md:h-11 cursor-pointer filter drop-shadow-sm transition-all active:scale-95";
        img.setAttribute('data-counted', 'false');

        const countTag = document.createElement('span');
        countTag.className = "absolute -top-5 bg-[#FF9E79] text-white text-[10px] font-bold rounded-full px-1.5 py-0.5 opacity-0 transition-all pointer-events-none scale-0";
        countTag.id = `count-tag-${i}`;

        img.onclick = () => {
          if (isAnsweredCorrectly) return;
          
          if (img.getAttribute('data-counted') === 'false') {
            if (i !== selectedCount) return;

            playCoinSound();
            img.setAttribute('data-counted', 'true');
            img.classList.add('ring-4', 'ring-rose-200', 'rounded-full');
            selectedCount++;
            countTag.textContent = `${selectedCount}元`;
            countTag.classList.remove('opacity-0', 'scale-0');
            countTag.classList.add('opacity-100', 'scale-100');
          } else {
            if (i !== selectedCount - 1) return;

            playCoinSound();
            img.setAttribute('data-counted', 'false');
            img.classList.remove('ring-4', 'ring-rose-200', 'rounded-full');
            countTag.classList.add('opacity-0', 'scale-0');
            countTag.classList.remove('opacity-100', 'scale-100');
            selectedCount--; 
          }
        };

        coinWrapper.appendChild(countTag);
        coinWrapper.appendChild(img);
        coinsArea.appendChild(coinWrapper);
      }

      container.appendChild(coinsArea);

      const optionsContainer = document.createElement('div');
      optionsContainer.className = "grid grid-cols-5 gap-2 w-full max-w-2xl mt-3";

      for (let v = 1; v <= 10; v++) {
        if (wrongOptions.includes(v)) {
          const empty = document.createElement('div');
          optionsContainer.appendChild(empty);
          continue;
        }

        const btn = document.createElement('button');
        btn.className = "btn-macaron-cyan text-xs md:text-sm font-bold py-2 px-1 rounded-lg transition-all relative";
        btn.textContent = `${v}元`;
        btn.onclick = () => {
          if (isAnsweredCorrectly) return;
          if (v === currentQuestionData.targetValue) {
            btn.classList.add('glow-correct'); 
            handleSuccess();
          } else {
            handleWrong(v);
            renderGame();
          }
        };

        optionsContainer.appendChild(btn);
      }

      container.appendChild(optionsContainer);
    }

      };

      const topSection = document.createElement('div');
      topSection.className = "flex flex-col md:flex-row items-center justify-center gap-6 md:gap-12 w-full";
      
      const payZoneWrapper = document.createElement('div');
      payZoneWrapper.className = "flex flex-col items-center gap-2 w-56";
      payZoneWrapper.appendChild(payZone);
      
      if (!hintEnabled) {
        const confirmBtn = document.createElement('button');
        confirmBtn.className = "btn-macaron-green text-2xs md:text-xs font-bold py-1.5 px-6 rounded-full shadow-md transition-all";
        confirmBtn.innerHTML = "✅ 確認付款";
        confirmBtn.onclick = confirmPayment;
        payZoneWrapper.appendChild(confirmBtn);
      }

      topSection.appendChild(showcase);
      topSection.appendChild(payZoneWrapper);
      container.appendChild(topSection);

      const generatorArea = document.createElement('div');
      generatorArea.className = "flex flex-col items-center mt-4 p-3 bg-purple-50/50 rounded-2xl border border-purple-100 w-full max-w-md";
      generatorArea.innerHTML = `
        <div class="flex gap-4 items-center">
          <img src="${COIN_IMAGES[1]}" 
               id="unlimitedCoin" 
               draggable="true" 
               class="w-12 h-12 md:w-14 md:h-14 cursor-grab active:cursor-grabbing filter drop-shadow-md coin-img" 
               alt="1元" />
        </div>
        <p class="text-xs font-bold text-purple-600 mt-1">👈 請拖曳 1 元進上方籃子付款</p>
      `;

      container.appendChild(generatorArea);

      const dragCoin = document.getElementById('unlimitedCoin');
      dragCoin.ondragstart = (e) => {
        if (isAnsweredCorrectly) {
          e.preventDefault();
          return;
        }
        e.dataTransfer.setData('text/plain', 1);
        dragCoin.classList.add('dragging');
      };
      dragCoin.ondragend = () => {
        dragCoin.classList.remove('dragging');
      };

      makeElementTouchDraggable(
        dragCoin,
        () => 1,
        () => [{ el: document.getElementById('payZone'), value: 'pay' }],
        (draggedVal, zoneVal) => {
          processMediumPay(draggedVal);
        }
      );
    }

    function processMediumPay(coinVal) {
      if (isAnsweredCorrectly) return;
      if (coinVal !== 1) return;

      playCoinSound();
      paidAmount += 1;
      
      if (!hintEnabled) {
        renderGame();
        return;
      }
      
      if (paidAmount === currentQuestionData.targetValue) {
        renderGame();
        setTimeout(() => {
          handleSuccess();
        }, 300);
      } else if (paidAmount > currentQuestionData.targetValue) {
        playWrongSound();
        const feedback = document.getElementById('feedbackContainer');
        const textSpan = document.getElementById('feedbackText');
        if (feedback) feedback.classList.remove('hidden');
        if (textSpan) {
          textSpan.innerHTML = `⚠️ 哎呀！放太多了，總共只需要 $${currentQuestionData.targetValue} 喔。重來一次吧！`;
        }
        setTimeout(() => resetCurrentGame(), 2000);
      } else {
        renderGame();
        renderHint();
      }
    }

    // -------------------------------------------------------------
    // 7. 進階付款模式渲染 (高度壓縮，保證全畫面顯示)
    // -------------------------------------------------------------
    function renderPayHardMode(container) {
      const showcase = document.createElement('div');
      showcase.className = "flex flex-col items-center justify-center p-3 border-2 border-indigo-200 bg-indigo-50/50 rounded-2xl w-56 shadow-sm";
      showcase.innerHTML = `
        <div class="text-5xl mb-1">${currentQuestionData.itemEmoji}</div>
        <div class="font-bold text-gray-800 text-xs md:text-sm mb-1">${currentQuestionData.itemName}</div>
        <div class="bg-[#FF9E79] text-white font-extrabold text-base md:text-lg px-4 py-1 rounded-full shadow-md border-2 border-white">
          $${currentQuestionData.targetValue}
        </div>
      `;

      if (!currentQuestionData.insertedCoins) {
        currentQuestionData.insertedCoins = [];
      }

      const payZone = document.createElement('div');
      payZone.className = "cute-card border-dashed border-4 border-indigo-300 p-2 w-56 min-h-[120px] md:min-h-[140px] flex flex-col items-center justify-center bg-white relative";
      payZone.id = "payZone";

      let coinsHtml = currentQuestionData.insertedCoins.map(val => {
        return `<img src="${COIN_IMAGES[val]}" class="w-6 h-6 md:w-7 md:h-7 filter drop-shadow-sm -m-0.5 animate-ping-once" style="animation-duration: 0.3s" />`;
      }).join('');

      const progressPercent = (paidAmount / currentQuestionData.targetValue) * 100;
      
      const progressHtml = hintEnabled ? `
        <div class="w-full bg-indigo-50 rounded-full h-2 overflow-hidden border border-indigo-100 mt-1">
          <div id="inlineProgressBar" class="bg-[#FFD3BA] h-full transition-all duration-300" style="width: ${progressPercent}%"></div>
        </div>
      ` : '';

      const accumulatedHtml = hintEnabled ? `
        <div class="text-[10px] font-bold text-indigo-700 bg-indigo-50 px-2 py-0.5 rounded-full border border-indigo-100">
          累計放入: $${paidAmount} / $${currentQuestionData.targetValue}
        </div>
      ` : '';

      payZone.innerHTML = `
        <div class="flex flex-wrap justify-center gap-0.5 mb-1">
          ${coinsHtml || '<span class="text-indigo-600 font-bold text-[10px] text-center">👛 請拖曳硬幣到這裡付款</span>'}
        </div>
        <div class="flex flex-col items-center w-full">
          ${accumulatedHtml}
          ${progressHtml}
        </div>
      `;

      payZone.ondragover = (e) => {
        if (isAnsweredCorrectly) return;
        e.preventDefault();
        payZone.classList.add('drop-zone-active');
      };
      payZone.ondragleave = () => {
        payZone.classList.remove('drop-zone-active');
      };
      payZone.ondrop = (e) => {
        if (isAnsweredCorrectly) return;
        e.preventDefault();
        payZone.classList.remove('drop-zone-active');
        try {
          const coinVal = parseFloat(e.dataTransfer.getData('text/plain'));
          processHardPay(coinVal);
        } catch(err) {}
      };

      const topSection = document.createElement('div');
      topSection.className = "flex flex-col md:flex-row items-center justify-center gap-6 md:gap-12 w-full";
      
      const payZoneWrapper = document.createElement('div');
      payZoneWrapper.className = "flex flex-col items-center gap-2 w-56";
      payZoneWrapper.appendChild(payZone);
      
      if (!hintEnabled) {
        const confirmBtn = document.createElement('button');
        confirmBtn.className = "btn-macaron-green text-2xs md:text-xs font-bold py-1.5 px-6 rounded-full shadow-md transition-all";
        confirmBtn.innerHTML = "✅ 確認付款";
        confirmBtn.onclick = confirmPayment;
        payZoneWrapper.appendChild(confirmBtn);
      }

      topSection.appendChild(showcase);
      topSection.appendChild(payZoneWrapper);
      container.appendChild(topSection);

      const optionsContainer = document.createElement('div');
      optionsContainer.className = "grid grid-cols-4 gap-4 w-full max-w-xl mt-4 bg-indigo-50/30 p-3 rounded-xl border border-indigo-100";

      COIN_VALUES.forEach(val => {
        const coinContainer = document.createElement('div');
        coinContainer.className = "flex flex-col items-center justify-center";
        
        const coinImg = document.createElement('img');
        coinImg.src = COIN_IMAGES[val];
        coinImg.className = "w-11 h-11 md:w-12 md:h-12 cursor-grab active:cursor-grabbing filter drop-shadow-sm coin-img";
        coinImg.draggable = true;
        coinImg.id = `hard-coin-${val}`;

        coinImg.ondragstart = (e) => {
          if (isAnsweredCorrectly) {
            e.preventDefault();
            return;
          }
          e.dataTransfer.setData('text/plain', val);
          coinImg.classList.add('dragging');
        };
        coinImg.ondragend = () => {
          coinImg.classList.remove('dragging');
        };

        coinContainer.appendChild(coinImg);
        coinContainer.innerHTML += `<span class="text-[10px] font-bold text-indigo-700 mt-0.5">${val}元</span>`;
        
        const imgEl = coinContainer.querySelector('img');
        imgEl.ondragstart = (e) => {
          if (isAnsweredCorrectly) {
            e.preventDefault();
            return;
          }
          e.dataTransfer.setData('text/plain', val);
          imgEl.classList.add('dragging');
        };
        imgEl.ondragend = () => {
          imgEl.classList.remove('dragging');
        };

        optionsContainer.appendChild(coinContainer);

        makeElementTouchDraggable(
          imgEl,
          () => val,
          () => [{ el: document.getElementById('payZone'), value: 'pay' }],
          (draggedVal, zoneVal) => {
            processHardPay(draggedVal);
          }
        );
      });

      container.appendChild(optionsContainer);
    }

    function processHardPay(coinVal) {
      if (isAnsweredCorrectly) return;
      
      if (!hintEnabled) {
        playCoinSound();
        paidAmount += coinVal;
        if (!currentQuestionData.insertedCoins) {
          currentQuestionData.insertedCoins = [];
        }
        currentQuestionData.insertedCoins.push(coinVal);
        renderGame();
        return;
      }

      const testAmount = paidAmount + coinVal;
      
      if (testAmount <= currentQuestionData.targetValue) {
        playCoinSound();
        paidAmount += coinVal;
        if (!currentQuestionData.insertedCoins) {
          currentQuestionData.insertedCoins = [];
        }
        currentQuestionData.insertedCoins.push(coinVal);

        if (paidAmount === currentQuestionData.targetValue) {
          renderGame();
          setTimeout(() => {
            handleSuccess();
          }, 300);
        } else {
          renderGame();
          renderHint();
        }
      } else {
        playWrongSound();
        const feedback = document.getElementById('feedbackContainer');
        const textSpan = document.getElementById('feedbackText');
        if (feedback) feedback.classList.remove('hidden');
        if (textSpan) {
          textSpan.innerHTML = `⚠️ 哎呀！如果放 <b>${coinVal}元</b> 就總共 $${testAmount}元，超過需要的 $${currentQuestionData.targetValue}元 囉！換別的硬幣試試看。`;
        }
        setTimeout(() => renderHint(), 3000);
      }
    }

    // -------------------------------------------------------------
    // 共用遊戲反饋與得分邏輯
    // -------------------------------------------------------------
    function updateProgress(percent) {
      const progressBar = document.getElementById('inlineProgressBar');
      if (progressBar) {
        progressBar.style.width = `${Math.min(percent, 100)}%`;
      }
    }

    function handleSuccess(autoNext = true) {
      playSuccessSound();
      isAnsweredCorrectly = true; 

      const interactionArea = document.getElementById('interactionArea');
      if (interactionArea) {
        interactionArea.style.pointerEvents = 'none';
      }
      
      confetti({
        particleCount: 100,
        spread: 70,
        origin: { y: 0.6 }
      });

      score += 10;
      document.getElementById('scoreText').textContent = score;

      const feedback = document.getElementById('feedbackContainer');
      const textSpan = document.getElementById('feedbackText');
      if (feedback) {
        feedback.classList.remove('hidden');
        feedback.className = "cute-card bg-emerald-50 border-emerald-200 p-2 mb-2 text-center text-emerald-700 font-bold text-sm md:text-base animate-bounce relative";
      }
      if (textSpan) {
        textSpan.innerHTML = `🎉 太厲害了！你答對了！ ✨ <b>獲得 10 分</b>`;
      }

      if (autoNext) {
        document.getElementById('nextBtn').classList.remove('hidden');
      }
    }

    function handleWrong(wrongVal) {
      playWrongSound();
      
      const forceEliminate = (currentMode === 'match' || currentMode === 'match_advanced');
      if ((forceEliminate || hintEnabled) && wrongVal !== undefined && !wrongOptions.includes(wrongVal)) {
        wrongOptions.push(wrongVal);
      }

      const feedback = document.getElementById('feedbackContainer');
      const textSpan = document.getElementById('feedbackText');
      if (feedback) {
        feedback.classList.remove('hidden');
        feedback.className = "cute-card bg-rose-50 border-rose-100 p-2 mb-2 text-center text-rose-600 font-bold text-sm md:text-base relative";
      }
      if (textSpan) {
        if (forceEliminate || hintEnabled) {
          textSpan.innerHTML = `💪 沒關係，再試一次！已經幫你拿掉不對的選項囉！`;
        } else {
          textSpan.innerHTML = `❌ 哎呀，不對喔！請仔細再試一次！`;
        }
      }
      
      setTimeout(() => {
        renderHint();
      }, 2000);
    }

    function nextQuestion() {
      const feedback = document.getElementById('feedbackContainer');
      if (feedback) {
        feedback.className = "hidden cute-card bg-[#FFFDF5] border-[#FFEAA7] p-2 mb-2 text-center text-[#B7950B] font-bold text-sm transition-all relative";
      }
      resetCurrentGame();
    }

    function confirmPayment() {
      if (isAnsweredCorrectly) return;
      if (paidAmount === currentQuestionData.targetValue) {
        handleSuccess();
      } else {
        playWrongSound();
        const feedback = document.getElementById('feedbackContainer');
        const textSpan = document.getElementById('feedbackText');
        if (feedback) {
          feedback.classList.remove('hidden');
          feedback.className = "cute-card bg-rose-50 border-rose-100 p-2 mb-2 text-center text-rose-600 font-bold text-sm md:text-base relative";
        }
        if (textSpan) {
          if (paidAmount > currentQuestionData.targetValue) {
            textSpan.innerHTML = `❌ 付太多錢囉！請重新計算一下再付款。`;
          } else {
            textSpan.innerHTML = `❌ 錢不夠喔！請再確認一下金額。`;
          }
        }
        
        setTimeout(() => {
          paidAmount = 0;
          if (currentQuestionData.insertedCoins) {
            currentQuestionData.insertedCoins = [];
          }
          renderGame();
          renderHint();
        }, 2000);
      }
    }
  </script>
</body>
</html>
