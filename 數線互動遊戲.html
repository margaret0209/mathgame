<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數線互動遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 避免在觸控設備上發生原生拖曳或滾動 */
        body {
            touch-action: pan-x pan-y;
            overflow-x: hidden;
        }

        /* 隱藏拖曳時的滾動，保證流暢 */
        .touch-none {
            touch-action: none;
        }

        /* 錯誤時的震動動畫 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .animate-shake {
            animation: shake 0.4s ease-in-out;
        }

        /* 彩紙動畫用到的類別 */
        .confetti {
            position: fixed;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-sky-50 min-h-screen font-sans select-none flex flex-col">

    <div class="w-full px-2 md:px-8 lg:px-16 py-2 md:py-6 flex flex-col flex-1">
        
        <!-- ================= 上方區域 (設定) ================= -->
        <div class="bg-white rounded-2xl shadow-md p-4 mb-4 flex flex-wrap items-center justify-center gap-4 md:gap-8 z-10 relative">
            <h1 class="text-2xl md:text-3xl font-bold text-blue-600 flex items-center gap-2">
                <span>📏</span> 數線挑戰
            </h1>
            
            <div class="flex items-center gap-2">
                <label class="font-bold text-gray-700 text-lg">數字範圍:</label>
                <select id="rangeSelect" class="border-2 border-blue-200 rounded-xl p-2 md:px-4 text-lg md:text-xl bg-blue-50 outline-none focus:border-blue-500 text-blue-800 font-bold cursor-pointer">
                    <option value="100">1 - 100</option>
                    <option value="1000">100 - 1000</option>
                    <option value="10000">1000 - 10000</option>
                </select>
            </div>

            <div class="flex items-center gap-2">
                <label class="font-bold text-gray-700 text-lg">數量:</label>
                <select id="qtySelect" class="border-2 border-blue-200 rounded-xl p-2 md:px-4 text-lg md:text-xl bg-blue-50 outline-none focus:border-blue-500 text-blue-800 font-bold cursor-pointer">
                    <!-- 透過JS自動生成 1-14 -->
                </select>
            </div>

            <button onclick="startGame()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 md:py-3 px-6 md:px-8 rounded-xl shadow-md transition-transform hover:scale-105 active:scale-95 text-lg md:text-xl flex items-center gap-2">
                <span>重新生成</span>
            </button>
        </div>

        <!-- ================= 中間區域 (數字庫) ================= -->
        <div class="bg-white rounded-2xl shadow-md p-4 md:p-8 mb-4 flex flex-col z-10 relative">
            <div class="flex items-center justify-center gap-2 mb-4">
                <span class="text-2xl">👆</span>
                <h2 class="text-xl md:text-2xl font-bold text-gray-700 text-center">請把黃色卡片拖拉到正確的空格內</h2>
            </div>
            <!-- 數字放置區 -->
            <div id="number-bank" class="flex flex-wrap items-center justify-center gap-4 md:gap-6 min-h-[140px] bg-sky-100 rounded-2xl p-6 border-4 border-sky-200 shadow-inner">
                <!-- 數字卡片會透過 JS 注入這裡 -->
            </div>
        </div>

        <!-- ================= 下方區域 (數線) ================= -->
        <div class="bg-white rounded-2xl shadow-md p-4 pt-20 md:pt-36 pb-16 flex-1 flex flex-col justify-end overflow-visible">
            <div class="w-full px-12 md:px-24 relative">
                <!-- 數線主體 -->
                <div class="w-full h-5 md:h-6 bg-gray-400 rounded-full relative shadow-inner flex items-center">
                    
                    <!-- 最小值標籤 -->
                    <div class="absolute -left-12 md:-left-20 text-center w-24 md:w-32 flex flex-col items-center">
                        <div class="w-1 h-6 bg-gray-600 mb-1"></div>
                        <span id="label-min" class="text-xl md:text-3xl font-extrabold text-blue-700">1</span>
                    </div>

                    <!-- 最大值標籤 -->
                    <div class="absolute -right-12 md:-right-20 text-center w-24 md:w-32 flex flex-col items-center">
                        <div class="w-1 h-6 bg-gray-600 mb-1"></div>
                        <span id="label-max" class="text-xl md:text-3xl font-extrabold text-blue-700">100</span>
                    </div>
                    
                    <!-- 答案框及垂直線容器 -->
                    <div id="dropzones" class="absolute top-0 left-0 w-full h-full">
                        <!-- 透過 JS 注入 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= 成功提示視窗 ================= -->
    <div id="success-modal" class="fixed inset-0 bg-black/60 z-50 flex flex-col items-center justify-center hidden opacity-0 transition-opacity duration-500 backdrop-blur-sm">
        <div class="bg-white rounded-[2rem] p-10 md:p-16 shadow-2xl flex flex-col items-center transform scale-90 transition-transform duration-500" id="success-box">
            <div class="text-7xl mb-4 animate-bounce">🌟</div>
            <h2 class="text-4xl md:text-5xl font-extrabold text-green-500 mb-4 tracking-wider text-center">太棒了！</h2>
            <p class="text-2xl md:text-3xl text-gray-600 mb-10 font-bold text-center">你排對了所有的數字！</p>
            <button onclick="hideModal(); startGame()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-12 rounded-2xl shadow-xl transition-transform hover:scale-105 active:scale-95 text-2xl">
                再玩一次
            </button>
        </div>
    </div>

    <!-- ================= 遊戲邏輯 ================= -->
    <script>
        let currentNumbers = [];
        let totalItems = 0;
        let placedCount = 0;

        // ================= 音效管理器 (Web Audio API) =================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        // 初始化音效 (需要使用者互動後才能解鎖瀏覽器音效限制)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 產生基礎音頻
        function playTone(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = type;
            oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        // 定義遊戲內的各種音效
        const sounds = {
            pickup: () => { initAudio(); playTone(600, 'sine', 0.1, 0.05); },
            correct: () => {
                initAudio();
                playTone(523.25, 'sine', 0.1, 0.1); // C5
                setTimeout(() => playTone(659.25, 'sine', 0.2, 0.1), 100); // E5
            },
            wrong: () => { initAudio(); playTone(200, 'triangle', 0.3, 0.1); },
            win: () => {
                initAudio();
                playTone(523.25, 'sine', 0.1, 0.1);
                setTimeout(() => playTone(659.25, 'sine', 0.1, 0.1), 150);
                setTimeout(() => playTone(783.99, 'sine', 0.1, 0.1), 300);
                setTimeout(() => playTone(1046.50, 'sine', 0.4, 0.1), 450);
            }
        };

        // 初始化數量下拉選單
        document.addEventListener('DOMContentLoaded', () => {
            const qtySelect = document.getElementById('qtySelect');
            for (let i = 1; i <= 14; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i;
                if (i === 5) option.selected = true; // 預設 5 個
                qtySelect.appendChild(option);
            }
            
            // 綁定全域的觸控與滑鼠事件 (自製流暢拖曳)
            document.addEventListener('pointermove', onPointerMove, { passive: false });
            document.addEventListener('pointerup', onPointerUp);
            document.addEventListener('pointercancel', onPointerUp);
            
            // 開始初始遊戲
            startGame();
        });

        // 解析當前範圍
        function getRange() {
            const val = document.getElementById('rangeSelect').value;
            if (val === '100') return { min: 1, max: 100 };
            if (val === '1000') return { min: 100, max: 1000 };
            if (val === '10000') return { min: 1000, max: 10000 };
            return { min: 1, max: 100 };
        }

        // 生成具備良好間距的隨機數字
        function generateNumbers(min, max, qty) {
            const numbers = [];
            const range = max - min;
            const segment = range / qty;

            for (let i = 0; i < qty; i++) {
                // 將範圍分成 qty 個區塊，確保數字均勻分佈且不會過度重疊
                let segMin = min + i * segment;
                let segMax = min + (i + 1) * segment;

                // 增加 10% 內縮，避免剛好在邊界
                const padding = Math.max(1, segment * 0.1);
                segMin += padding;
                segMax -= padding;

                if (segMin > segMax) {
                    segMin = min + i * segment;
                    segMax = segMin;
                }

                let val = Math.round(segMin + Math.random() * (segMax - segMin));
                
                // 確保不超出絕對邊界
                if (val <= min) val = min + 1;
                if (val >= max) val = max - 1;

                // 防止重複
                while (numbers.some(n => n.value === val)) {
                    val++;
                    if (val >= max) val = min + 1;
                }

                numbers.push({
                    id: 'num-' + i,
                    value: val,
                    percentage: ((val - min) / (max - min)) * 100
                });
            }
            return numbers;
        }

        // 重新開始遊戲
        function startGame() {
            const range = getRange();
            const qty = parseInt(document.getElementById('qtySelect').value, 10);
            
            document.getElementById('label-min').textContent = range.min;
            document.getElementById('label-max').textContent = range.max;

            currentNumbers = generateNumbers(range.min, range.max, qty);
            totalItems = qty;
            placedCount = 0;

            renderBoard();
        }

        // 渲染遊戲介面
        function renderBoard() {
            const dropzonesContainer = document.getElementById('dropzones');
            const bankContainer = document.getElementById('number-bank');
            
            dropzonesContainer.innerHTML = '';
            bankContainer.innerHTML = '';

            // 渲染下方數線上的答案框 (高低交錯排列，避免重疊)
            currentNumbers.forEach((num, index) => {
                const isHigh = index % 2 === 0;
                // 交錯高度
                const lineH = isHigh ? 65 : 25; 

                const wrap = document.createElement('div');
                wrap.className = 'absolute flex flex-col items-center justify-end';
                wrap.style.left = `${num.percentage}%`;
                wrap.style.transform = 'translateX(-50%)';
                wrap.style.bottom = '50%'; // 從數線中央開始往上長

                // HTML 結構：上方是框，下方是垂直線
                wrap.innerHTML = `
                    <div class="dropzone w-16 md:w-20 h-12 md:h-14 border-4 border-dashed border-gray-400 bg-white/90 rounded-xl shadow-sm flex items-center justify-center transition-all duration-300 z-10 mb-[-2px]" data-value="${num.value}"></div>
                    <div class="w-1 bg-gray-500 rounded-t-sm" style="height: ${lineH}px;"></div>
                `;
                dropzonesContainer.appendChild(wrap);
            });

            // 渲染中間的數字卡片 (打亂順序)
            const shuffled = [...currentNumbers].sort(() => Math.random() - 0.5);
            shuffled.forEach(num => {
                const card = document.createElement('div');
                // touch-none 是為了防止在手機上按住拖曳時引發畫面捲動
                card.className = 'draggable touch-none w-16 md:w-20 h-12 md:h-14 bg-yellow-300 border-[3px] border-yellow-500 rounded-xl shadow-md flex items-center justify-center text-xl md:text-2xl font-extrabold text-gray-800 cursor-grab hover:scale-110 hover:shadow-lg transition-transform';
                card.dataset.value = num.value;
                card.textContent = num.value;
                bankContainer.appendChild(card);
                
                // 綁定點擊/觸摸開始事件
                card.addEventListener('pointerdown', onPointerDown);
            });
        }

        /* ================= 拖拉 (Drag & Drop) 邏輯 ================= */
        let currentDrag = null;

        function onPointerDown(e) {
            const el = e.target.closest('.draggable');
            if (!el || el.dataset.placed === "true") return;

            // 播放拿起卡片的音效
            sounds.pickup();

            // 阻止預設行為，避免觸控時選取文字或滾動
            e.preventDefault(); 
            
            const rect = el.getBoundingClientRect();
            const offsetX = e.clientX - rect.left;
            const offsetY = e.clientY - rect.top;

            // 創建佔位符 (Placeholder)，保持原來的排版不塌陷
            const placeholder = document.createElement('div');
            placeholder.className = el.className;
            placeholder.style.opacity = '0.15';
            placeholder.style.border = '3px dashed #888';
            placeholder.style.background = 'transparent';
            placeholder.style.boxShadow = 'none';
            placeholder.textContent = '';
            el.parentNode.insertBefore(placeholder, el.nextSibling);

            // 將原本的元素設為 fixed 浮動，跟隨滑鼠/手指
            el.style.position = 'fixed';
            el.style.left = e.clientX - offsetX + 'px';
            el.style.top = e.clientY - offsetY + 'px';
            el.style.width = rect.width + 'px';
            el.style.height = rect.height + 'px';
            el.style.zIndex = '1000';
            el.style.margin = '0';
            
            // 視覺放大與旋轉
            el.classList.add('scale-110', 'shadow-2xl', 'rotate-3', 'cursor-grabbing');
            el.classList.remove('cursor-grab', 'hover:scale-110');
            el.style.transition = 'none'; // 拖曳時取消動畫，跟隨更即時

            currentDrag = {
                element: el,
                offsetX: offsetX,
                offsetY: offsetY,
                placeholder: placeholder
            };
        }

        function onPointerMove(e) {
            if (!currentDrag) return;
            e.preventDefault();
            const { element, offsetX, offsetY } = currentDrag;
            element.style.left = e.clientX - offsetX + 'px';
            element.style.top = e.clientY - offsetY + 'px';
        }

        function onPointerUp(e) {
            if (!currentDrag) return;
            const { element, placeholder } = currentDrag;
            
            // 暫時隱藏拖曳物，使用 document.elementFromPoint 偵測下方是什麼元素
            element.style.display = 'none';
            const elemBelow = document.elementFromPoint(e.clientX, e.clientY);
            element.style.display = '';

            const dropzone = elemBelow ? elemBelow.closest('.dropzone') : null;

            if (dropzone && !dropzone.classList.contains('filled')) {
                if (dropzone.dataset.value === element.dataset.value) {
                    // 🎉 答對了！
                    sounds.correct();
                    
                    // 1. 清除 fixed 與其他行內樣式
                    element.style = ''; 
                    // 2. 設定放置後的樣式
                    element.className = 'w-full h-full flex items-center justify-center text-xl md:text-2xl font-extrabold text-gray-800 bg-transparent cursor-default scale-100';
                    
                    // 3. 把卡片塞進框框裡
                    dropzone.appendChild(element);
                    
                    // 4. 更新框框的樣式 (綠色底、實線框)
                    dropzone.classList.add('filled', 'border-green-500', 'bg-green-100', 'shadow-inner');
                    dropzone.classList.remove('border-gray-400', 'border-dashed', 'bg-white/90', 'shadow-sm');
                    
                    // 5. 標記為已放置
                    element.dataset.placed = "true";
                    
                    // 6. 移除佔位符
                    if(placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
                    
                    placedCount++;
                    checkWin();
                } else {
                    // ❌ 答錯了
                    sounds.wrong();
                    showError(dropzone);
                    returnToSource(element, placeholder);
                }
            } else {
                // 沒丟進框框內
                returnToSource(element, placeholder);
            }

            currentDrag = null;
        }

        // 答錯時，讓卡片飛回原本的位置
        function returnToSource(element, placeholder) {
            const rect = placeholder.getBoundingClientRect();
            
            // 加入過渡動畫
            element.style.transition = 'all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
            element.style.left = rect.left + 'px';
            element.style.top = rect.top + 'px';
            element.style.transform = 'scale(1) rotate(0)';
            element.style.pointerEvents = 'none'; // 防止過渡期間被點擊
            
            setTimeout(() => {
                // 恢復原狀
                element.style = '';
                element.classList.remove('scale-110', 'shadow-2xl', 'rotate-3', 'cursor-grabbing');
                element.classList.add('cursor-grab', 'hover:scale-110');
                
                if(placeholder.parentNode) {
                    placeholder.parentNode.insertBefore(element, placeholder);
                    placeholder.parentNode.removeChild(placeholder);
                }
            }, 300);
        }

        // 答錯的震動與紅色閃爍提示
        function showError(dropzone) {
            dropzone.classList.add('bg-red-200', 'border-red-400', 'animate-shake');
            setTimeout(() => {
                dropzone.classList.remove('bg-red-200', 'border-red-400', 'animate-shake');
            }, 400);
        }

        // 檢查是否全數完成
        function checkWin() {
            if (placedCount === totalItems) {
                sounds.win();
                setTimeout(showModal, 300);
            }
        }

        /* ================= 模態框與彩紙特效 ================= */
        function showModal() {
            const modal = document.getElementById('success-modal');
            const box = document.getElementById('success-box');
            modal.classList.remove('hidden');
            // 強制重繪
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            box.classList.remove('scale-90');
            box.classList.add('scale-100');
            triggerConfetti();
        }
        
        function hideModal() {
            const modal = document.getElementById('success-modal');
            modal.classList.add('opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 500);
        }

        // 簡單彩紙掉落特效 (不依賴外部套件)
        function triggerConfetti() {
            const colors = ['#FFC700', '#FF0000', '#2E3192', '#41BBC7', '#42B132'];
            for(let i=0; i<60; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti w-3 h-3 md:w-4 md:h-4 rounded-sm';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-5vh';
                document.body.appendChild(confetti);

                const duration = Math.random() * 2 + 2; // 2~4秒
                const delay = Math.random() * 1;
                
                confetti.animate([
                    { transform: 'translate3d(0,0,0) rotate(0deg)', opacity: 1 },
                    { transform: `translate3d(${Math.random()*300 - 150}px, 105vh, 0) rotate(${Math.random()*1000}deg)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    delay: delay * 1000,
                    easing: 'cubic-bezier(.37,0,.63,1)',
                    fill: 'forwards'
                });

                // 動畫結束後移除 DOM
                setTimeout(() => confetti.remove(), (duration + delay) * 1000);
            }
        }
    </script>
</body>
</html>
