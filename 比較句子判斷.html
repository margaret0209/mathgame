    <script>
        // --- 音效系統 (使用 Web Audio API，無需外部檔案) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playClickSound() {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function playCorrectSound() {
            initAudio();
            const t = audioCtx.currentTime;
            const playNote = (freq, startTime, duration) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.2, startTime);
                gain.gain.linearRampToValueAtTime(0, startTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(startTime);
                osc.stop(startTime + duration);
            };
            playNote(523.25, t, 0.2); // Do
            playNote(659.25, t + 0.15, 0.2); // Mi
            playNote(783.99, t + 0.3, 0.4); // Sol
        }

        function playWrongSound() {
            initAudio();
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(250, t);
            osc.frequency.linearRampToValueAtTime(150, t + 0.4);
            gain.gain.setValueAtTime(0.2, t);
            gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(t);
            osc.stop(t + 0.4);
        }

        const fruits = ['🍎 蘋果', '🍌 香蕉', '🍊 橙子', '🍉 西瓜', '🍓 士多啤梨', '🍇 葡萄', '🥭 芒果', '🍐 雪梨', '🍒 車厘子', '🍍 菠蘿', '🍑 水蜜桃', '🥝 奇異果', '🍈 蜜瓜', '🍋 檸檬', '🥑 牛油果', '🥥 椰子', '🫐 藍莓', '🍅 番茄', '🍈 哈密瓜', '🍏 青蘋果'];
        const animals = ['🐶 小狗', '🐱 小貓', '🐰 小兔', '🦁 獅子', '🐯 老虎', '🐘 大象', '🐒 猴子', '🐼 熊貓', '🦊 狐狸', '🐻 小熊', '🐨 樹熊', '🐮 乳牛', '🐷 小豬', '🐸 青蛙', '🐧 企鵝', '🐔 小雞', '🦆 鴨子', '🦉 貓頭鷹', '🐴 馬', '🦄 獨角獸', '🐝 蜜蜂', '🐛 毛蟲', '🦋 蝴蝶', '🐌 蝸牛', '🐢 烏龜', '🐍 蛇', '🐙 章魚', '🐬 海豚', '🐳 鯨魚', '🦈 鯊魚'];

        let currentCategory = '';
        let currentMode = 'normal';
        let currentEntities = [];
        
        // 記錄答案用
        let correctLeft = '';
        let correctRight = '';
        let currentDifference = 0;
        let currentPattern = 0;
        let hardTargetEntity = '';
        let hardCorrectPosition = '';

        // 理解模式變數
        let activeInputTarget = 1;

        // 初始化
        window.onload = () => {
            // 為所有下拉選單加入點擊音效
            document.querySelectorAll('select').forEach(select => {
                select.addEventListener('change', playClickSound);
            });
            setCategory('animal');
        };

        function setMode(mode) {
            playClickSound();
            currentMode = mode;
            ['normal', 'hard', 'understanding'].forEach(m => {
                let btn = document.getElementById('btn-' + m);
                if (m === mode) {
                    btn.classList.replace('bg-white', 'bg-purple-600');
                    btn.classList.replace('text-purple-600', 'text-white');
                } else {
                    btn.classList.replace('bg-purple-600', 'bg-white');
                    btn.classList.replace('text-white', 'text-purple-600');
                }
            });
            generateQuestion();
        }

        function setCategory(category) {
            playClickSound();
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'bg-orange-600', 'bg-amber-600', 'text-white');
                btn.classList.add('bg-white');
            });

            if(category === 'AB') {
                let btn = document.getElementById('btn-AB');
                btn.classList.remove('bg-white', 'text-blue-600');
                btn.classList.add('bg-blue-600', 'text-white');
            } else if(category === 'fruit') {
                let btn = document.getElementById('btn-fruit');
                btn.classList.remove('bg-white', 'text-orange-600');
                btn.classList.add('bg-orange-600', 'text-white');
            } else if(category === 'animal') {
                let btn = document.getElementById('btn-animal');
                btn.classList.remove('bg-white', 'text-amber-700');
                btn.classList.add('bg-amber-600', 'text-white');
            }
            generateQuestion();
        }

        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateQuestion() {
            let e1, e2, unit;

            if (currentCategory === 'AB') {
                e1 = 'A';
                e2 = 'B';
                unit = '';
            } else if (currentCategory === 'fruit') {
                e1 = getRandomItem(fruits);
                do { e2 = getRandomItem(fruits); } while (e1 === e2);
                unit = '個';
            } else {
                e1 = getRandomItem(animals);
                do { e2 = getRandomItem(animals); } while (e1 === e2);
                unit = '隻';
            }

            currentEntities = [e1, e2];
            currentDifference = Math.floor(Math.random() * 1000) + 1;
            currentPattern = Math.floor(Math.random() * 4);
            let sentence = "";

            // A 以紅色表示，B 以藍色表示
            let styledE1 = `<span class="text-red-600 font-extrabold">${e1}</span>`;
            let styledE2 = `<span class="text-blue-600 font-extrabold">${e2}</span>`;

            /*
            Pattern 0: e1 比 e2 少 X
            Pattern 1: e1 比 e2 多 X
            Pattern 2: e2 比 e1 少 X
            Pattern 3: e2 比 e1 多 X
            */
            if (currentPattern === 0) {
                sentence = `${styledE1} 比 ${styledE2} 少 ${currentDifference} ${unit}`;
                correctLeft = e1;
                correctRight = e2;
            } else if (currentPattern === 1) {
                sentence = `${styledE1} 比 ${styledE2} 多 ${currentDifference} ${unit}`;
                correctLeft = e2;
                correctRight = e1;
            } else if (currentPattern === 2) {
                sentence = `${styledE2} 比 ${styledE1} 少 ${currentDifference} ${unit}`;
                correctLeft = e2;
                correctRight = e1;
            } else {
                sentence = `${styledE2} 比 ${styledE1} 多 ${currentDifference} ${unit}`;
                correctLeft = e1;
                correctRight = e2;
            }

            document.getElementById('sentenceDisplay').innerHTML = sentence;
            
            // UI 佈局切換
            if (currentMode === 'normal') {
                document.getElementById('visual-mode-section').classList.remove('hidden');
                document.getElementById('understanding-mode-section').classList.add('hidden');
                document.getElementById('normal-layout').classList.remove('hidden');
                document.getElementById('hard-layout').classList.add('hidden');
                
                document.getElementById('numpad-section').classList.add('hidden');
                document.getElementById('numpad-section').classList.remove('flex');
                
                updateSelectOptions();

            } else if (currentMode === 'hard') {
                document.getElementById('visual-mode-section').classList.remove('hidden');
                document.getElementById('understanding-mode-section').classList.add('hidden');
                document.getElementById('normal-layout').classList.add('hidden');
                document.getElementById('hard-layout').classList.remove('hidden');
                
                document.getElementById('numpad-section').classList.add('hidden');
                document.getElementById('numpad-section').classList.remove('flex');
                
                const isLeftKnown = Math.random() < 0.5;
                const knownEntity = isLeftKnown ? correctLeft : correctRight;
                
                hardTargetEntity = isLeftKnown ? correctRight : correctLeft;
                hardCorrectPosition = isLeftKnown ? 'right' : 'left'; 
                
                // 固定選項依據它是 A 還是 B 套用對應的顏色
                const middleColorClass = (knownEntity === e1) ? "text-red-600" : "text-blue-600";
                document.getElementById('hardMiddleBox').innerHTML = `<span class="${middleColorClass} font-extrabold">${knownEntity}</span>`;
                
                const hardLeft = document.getElementById('hardLeftSelect');
                const hardRight = document.getElementById('hardRightSelect');
                
                hardLeft.innerHTML = '<option value="">請選擇</option><option value="' + hardTargetEntity + '">' + hardTargetEntity + '</option>';
                hardRight.innerHTML = '<option value="">請選擇</option><option value="' + hardTargetEntity + '">' + hardTargetEntity + '</option>';
                hardLeft.value = "";
                hardRight.value = "";

            } else if (currentMode === 'understanding') {
                document.getElementById('visual-mode-section').classList.add('hidden');
                document.getElementById('understanding-mode-section').classList.remove('hidden');

                document.getElementById('numpad-section').classList.remove('hidden');
                document.getElementById('numpad-section').classList.add('flex');

                document.getElementById('und-entity1-name').innerText = e1;
                document.getElementById('und-entity2-name').innerText = e2;
                document.getElementById('und-e1-type').value = '';
                document.getElementById('und-e2-type').value = '';
                document.getElementById('und-e1-val').innerText = '';
                document.getElementById('und-e2-val').innerText = '';

                focusUndInput(1);
            }
        }

        function updateSelectOptions() {
            const leftSelect = document.getElementById('leftSelect');
            const rightSelect = document.getElementById('rightSelect');
            
            leftSelect.innerHTML = '<option value="">請選擇</option>';
            rightSelect.innerHTML = '<option value="">請選擇</option>';

            currentEntities.forEach(entity => {
                leftSelect.innerHTML += `<option value="${entity}">${entity}</option>`;
                rightSelect.innerHTML += `<option value="${entity}">${entity}</option>`;
            });

            leftSelect.value = "";
            rightSelect.value = "";
        }

        // 理解模式：點擊對焦輸入框
        function focusUndInput(target) {
            playClickSound();
            activeInputTarget = target;
            document.getElementById('und-e1-input').classList.remove('border-indigo-500', 'ring-4', 'ring-indigo-200');
            document.getElementById('und-e2-input').classList.remove('border-indigo-500', 'ring-4', 'ring-indigo-200');
            document.getElementById('cursor-1').classList.add('hidden');
            document.getElementById('cursor-2').classList.add('hidden');

            document.getElementById(`und-e${target}-input`).classList.add('border-indigo-500', 'ring-4', 'ring-indigo-200');
            document.getElementById(`cursor-${target}`).classList.remove('hidden');
        }

        // 理解模式：處理數字盤點擊
        function pressNumpad(val) {
            playClickSound();
            const display = document.getElementById(`und-e${activeInputTarget}-val`);
            let current = display.innerText;

            if (val === 'clear') {
                display.innerText = '';
            } else if (val === 'back') {
                display.innerText = current.slice(0, -1);
            } else {
                if (current.length < 5) {
                    if (current === '0' && val === '0') return;
                    if (current === '0' && val !== '0') {
                        display.innerText = val;
                    } else {
                        display.innerText = current + val;
                    }
                }
            }
        }

        function checkAnswer() {
            if (currentMode === 'normal') {
                const leftVal = document.getElementById('leftSelect').value;
                const rightVal = document.getElementById('rightSelect').value;

                if (!leftVal || !rightVal) {
                    showFeedback(false, "請先在兩個框框中選好答案喔！");
                    return;
                }
                if (leftVal === rightVal) {
                    showFeedback(false, "兩邊不能選一樣的喔，請再看清楚句子！");
                    return;
                }
                if (leftVal === correctLeft && rightVal === correctRight) {
                    showFeedback(true, "你太棒了！完全正確！🎉");
                } else {
                    showFeedback(false, "哎呀，放反了！再想想看誰比較多？誰比較少？");
                }
            } else if (currentMode === 'hard') {
                const leftVal = document.getElementById('hardLeftSelect').value;
                const rightVal = document.getElementById('hardRightSelect').value;

                if (!leftVal && !rightVal) {
                    showFeedback(false, "請選擇一個位置填入答案喔！");
                    return;
                }
                if (leftVal && rightVal) {
                    showFeedback(false, "只能選擇一邊放入答案喔！請把另一邊改回「請選擇」。");
                    return;
                }

                if (hardCorrectPosition === 'left' && leftVal === hardTargetEntity) {
                    showFeedback(true, "太棒了！判斷完全正確！🎉");
                } else if (hardCorrectPosition === 'right' && rightVal === hardTargetEntity) {
                    showFeedback(true, "太棒了！判斷完全正確！🎉");
                } else {
                    showFeedback(false, "哎呀，放錯邊了！再讀一次句子，看看它比中間的少還是多？");
                }
            } else if (currentMode === 'understanding') {
                const e1Type = document.getElementById('und-e1-type').value;
                const e1Val = document.getElementById('und-e1-val').innerText;
                const e2Type = document.getElementById('und-e2-type').value;
                const e2Val = document.getElementById('und-e2-val').innerText;

                if (!e1Type || !e2Type || !e1Val || !e2Val) {
                    showFeedback(false, "請把所有的「多/少」和「數字」都填寫完成喔！");
                    return;
                }

                let expectedE1Type = '';
                let expectedE2Type = '';
                // Pattern 0 & 3 代表 e1 比較少, e2 比較多
                if (currentPattern === 0 || currentPattern === 3) {
                    expectedE1Type = '少';
                    expectedE2Type = '多';
                } else {
                    expectedE1Type = '多';
                    expectedE2Type = '少';
                }

                const expectedValStr = currentDifference.toString();

                if (e1Type === expectedE1Type && e2Type === expectedE2Type && e1Val === expectedValStr && e2Val === expectedValStr) {
                    showFeedback(true, "太棒了！你完全理解了這句話的意思！🎉");
                } else {
                    if (e1Type !== expectedE1Type || e2Type !== expectedE2Type) {
                        showFeedback(false, "「多/少」選錯了喔，再仔細讀一次句子是誰比誰多？");
                    } else {
                        showFeedback(false, "選擇正確，但是輸入的數字不對喔！相差多少呢？");
                    }
                }
            }
        }

        function showFeedback(isCorrect, msg) {
            const modal = document.getElementById('feedbackModal');
            const box = document.getElementById('feedbackBox');
            const icon = document.getElementById('feedbackIcon');
            const title = document.getElementById('feedbackTitle');
            const message = document.getElementById('feedbackMessage');

            modal.classList.remove('hidden');
            setTimeout(() => { box.classList.add('bounce-in'); }, 10);

            if (isCorrect) {
                playCorrectSound();
                icon.innerHTML = "🌟";
                title.textContent = "答對了！";
                title.className = "text-4xl font-black mb-4 text-green-600";
                message.textContent = msg;
                document.body.classList.add('bg-green-100');
                setTimeout(() => document.body.classList.remove('bg-green-100'), 1000);
            } else {
                playWrongSound();
                icon.innerHTML = "🤔";
                title.textContent = "再試一次！";
                title.className = "text-4xl font-black mb-4 text-red-500";
                message.textContent = msg;
                box.classList.remove('bounce-in');
                box.classList.add('shake');
                setTimeout(() => box.classList.remove('shake'), 500);
            }
        }

        function nextQuestion() {
            playClickSound();
            const modal = document.getElementById('feedbackModal');
            const box = document.getElementById('feedbackBox');
            box.classList.remove('bounce-in', 'shake');
            modal.classList.add('hidden');
            
            if (document.getElementById('feedbackTitle').textContent === "答對了！") {
                generateQuestion();
            }
        }
    </script>
</body>
</html>
