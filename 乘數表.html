    <!-- 核心互動邏輯 JavaScript -->
    <script>
        // ----------------- 音效系統 (Web Audio API) -----------------
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playTone(freq, type, duration, vol=0.1) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = type;
            oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        // 短促的點擊聲
        function playClickSound() { playTone(600, 'sine', 0.1, 0.05); }
        // 盒子彈出的清脆聲
        function playPopSound() { playTone(800, 'triangle', 0.15, 0.05); }
        // 答對的升階慶祝聲 (Do-Mi-Sol-Do)
        function playCorrectSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playTone(523.25, 'sine', 0.1, 0.1); 
            setTimeout(() => playTone(659.25, 'sine', 0.1, 0.1), 100); 
            setTimeout(() => playTone(783.99, 'sine', 0.2, 0.1), 200); 
            setTimeout(() => playTone(1046.50, 'sine', 0.4, 0.1), 300); 
        }
        // 答錯的嘟嘟聲
        function playWrongSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playTone(300, 'sawtooth', 0.2, 0.08);
            setTimeout(() => playTone(250, 'sawtooth', 0.3, 0.08), 150);
        }

        // ----------------- 通用與頁籤切換邏輯 -----------------
        function switchTab(tabId) {
            playClickSound();
            // 隱藏所有頁籤內容
            document.getElementById('tab-study').classList.add('hidden');
            document.getElementById('tab-practice').classList.add('hidden');
            document.getElementById('tab-random').classList.add('hidden');
            
            // 顯示當前選中的頁籤內容
            document.getElementById(tabId).classList.remove('hidden');

            // 還原按鈕樣式
            const buttons = {
                'tab-study': 'btn-tab-study',
                'tab-practice': 'btn-tab-practice',
                'tab-random': 'btn-tab-random'
            };

            for (const [id, btnId] of Object.entries(buttons)) {
                const btn = document.getElementById(btnId);
                if (id === tabId) {
                    btn.className = btn.className.replace('bg-white text-gray-600 border-gray-300', getThemeBtnClass(id));
                } else {
                    btn.className = btn.className.replace(/bg-(amber|sky|purple)-400 text-white border-(amber|sky|purple)-600/, 'bg-white text-gray-600 border-gray-300');
                }
            }

            // 若切換到隨機挑戰，直接初始化
            if (tabId === 'tab-random' && randomQuestionNum1 === null) {
                initRandomGame();
            }
        }

        function getThemeBtnClass(tabId) {
            if (tabId === 'tab-study') return 'bg-amber-400 text-white border-amber-600';
            if (tabId === 'tab-practice') return 'bg-sky-400 text-white border-sky-600';
            return 'bg-purple-400 text-white border-purple-600';
        }


        // ----------------- 慶舉動畫與提示輔助 -----------------
        function triggerCelebration() {
            playCorrectSound();
            const overlay = document.getElementById('celebration-overlay');
            const box = overlay.querySelector('div');
            
            // 隨機鼓勵詞
            const words = ['太厲害了！🌟', '答對囉！👍', '你真棒！🧁', '無懈可擊！🎈', '超級小天才！🌈'];
            box.querySelector('.text-2xl').innerText = words[Math.floor(Math.random() * words.length)];

            overlay.classList.remove('pointer-events-none');
            overlay.classList.add('opacity-100');
            box.classList.remove('scale-90');
            box.classList.add('scale-100');

            setTimeout(() => {
                overlay.classList.add('pointer-events-none');
                overlay.classList.remove('opacity-100');
                box.classList.remove('scale-100');
                box.classList.add('scale-90');
            }, 800);
        }


        // ----------------- 頁籤一：乘數盒探索 邏輯 -----------------
        let selectedStudyBase = null;     // 當前選擇的乘數 (如 3)
        let studyStep = 1;                // 目前進行到的步驟 (1 到 10)
        let activeInputId = 'study-val1'; // 當前焦點輸入格

        // 可愛的糖果樣式
        const candyEmojis = ['🍬', '🍭', '🍩', '🍪', '🧁', '🍓', '🍇', '🍒', '🍋', '🍎'];
        let currentCandy = '🍬';

        function selectStudyNum(num) {
            playClickSound();
            selectedStudyBase = num;
            studyStep = 1;
            currentCandy = candyEmojis[num - 1] || '🍬';

            // 更新按鈕高亮樣式
            document.querySelectorAll('.study-num-btn').forEach(btn => {
                btn.classList.remove('bg-amber-400', 'text-white', 'border-amber-600');
                btn.classList.add('bg-white', 'text-amber-600', 'border-amber-300');
            });
            const activeBtn = document.getElementById(`btn-num-${num}`);
            activeBtn.classList.add('bg-amber-400', 'text-white', 'border-amber-600');
            activeBtn.classList.remove('bg-white', 'text-amber-600', 'border-amber-300');

            // 顯示工作區
            document.getElementById('study-placeholder').classList.add('hidden');
            document.getElementById('study-workspace').classList.remove('hidden');

            // 清空盒子容器與歷史紀錄
            document.getElementById('candy-boxes-container').innerHTML = '';
            document.getElementById('candy-title').innerText = `已收集的 ${selectedStudyBase} 顆裝糖果盒`;
            
            const historyContainer = document.getElementById('study-history-container');
            historyContainer.innerHTML = '';

            // 初始化第一個算式與提示
            resetStudyFormula();
            appendCandyBox(1); // 預先生成第一個盒子（等待輸入）
        }

        // 動態添加一個糖果盒子
        function appendCandyBox(stepNum) {
            const container = document.getElementById('candy-boxes-container');
            
            // 創建盒子容器
            const boxDiv = document.createElement('div');
            boxDiv.className = "bg-white border-4 border-amber-200 rounded-2xl p-3 shadow-sm box-animate relative";
            
            // 標題與標籤
            let boxHtml = `
                <div class="flex justify-between items-center mb-2">
                    <span class="bg-amber-100 text-amber-800 text-xs px-2.5 py-0.5 rounded-full font-bold">
                        第 ${stepNum} 個盒子
                    </span>
                    <span class="text-xs text-gray-400">裝著 ${selectedStudyBase} 顆糖果</span>
                </div>
                <div class="grid grid-cols-5 gap-2 justify-items-center bg-amber-50/50 p-2 rounded-xl">
            `;

            // 生成糖果
            for (let i = 0; i < selectedStudyBase; i++) {
                boxHtml += `
                    <div class="text-2xl candy-animate" style="animation-delay: ${i * 0.1}s">
                        ${currentCandy}
                    </div>
                `;
            }

            boxHtml += `</div>`;
            boxDiv.innerHTML = boxHtml;
            container.appendChild(boxDiv);
            playPopSound();

            // 自動滾動到最底部
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 100);
        }

        // 將正確答對的算式，累積在右側「完整乘數表歷史區」
        function addFormulaToHistory(val1, val2, ans) {
            const historyContainer = document.getElementById('study-history-container');
            
            // 移除佔位提示字
            const placeholder = document.getElementById('history-placeholder');
            if (placeholder) {
                placeholder.remove();
            }

            // 建立一筆精美的歷史算式
            const item = document.createElement('div');
            item.className = "bg-emerald-100/70 border border-emerald-300 text-emerald-800 rounded-lg py-1 px-3 text-sm font-bold flex justify-between items-center animate-pulse";
            item.innerHTML = `
                <span>${val1} × ${val2}</span>
                <span class="text-emerald-900 font-extrabold">= ${ans}</span>
            `;

            historyContainer.appendChild(item);

            // 閃爍一下表示加入，之後取消閃爍
            setTimeout(() => {
                item.classList.remove('animate-pulse');
            }, 800);

            // 滾動歷史欄至最底
            setTimeout(() => {
                historyContainer.scrollTop = historyContainer.scrollHeight;
            }, 100);
        }

        // 初始化/還原算式輸入狀態
        function resetStudyFormula() {
            // 三個填空重置為 "?" 狀態
            document.getElementById('study-val1-box').innerText = '?';
            document.getElementById('study-val2-box').innerText = '?';
            document.getElementById('study-ans-box').innerText = '?';

            // 重置輸入焦點到第一格
            setActiveInput('study-val1');

            // 清空回饋資訊
            document.getElementById('study-feedback').innerHTML = '';
        }

        // 設定輸入焦點
        function setActiveInput(id) {
            activeInputId = id;
            // 移除所有填空的高亮，高亮目前的焦點
            document.querySelectorAll('.formula-box').forEach(box => {
                box.classList.remove('border-emerald-500', 'bg-emerald-100/50', 'ring-4', 'ring-emerald-200');
                box.classList.add('border-emerald-300', 'bg-emerald-50');
            });

            const activeBox = document.getElementById(`${id}-box`);
            if (activeBox) {
                activeBox.classList.remove('border-emerald-300', 'bg-emerald-50');
                activeBox.classList.add('border-emerald-500', 'bg-emerald-100/50', 'ring-4', 'ring-emerald-200');
            }
        }

        // 按鍵盤輸入數字 +【自動跳格邏輯】
        function pressKey(val) {
            playClickSound();
            const activeBox = document.getElementById(`${activeInputId}-box`);
            if (!activeBox) return;

            if (val === 'C') {
                activeBox.innerText = '?';
                return;
            }

            let currentVal = activeBox.innerText;
            if (currentVal === '?') {
                currentVal = '';
            }

            // 輸入數字
            if (currentVal.length < 3) {
                activeBox.innerText = currentVal + val;
            }

            // --- 核心：自動檢測並自動跳到下一格 ---
            const newVal = parseInt(activeBox.innerText);

            if (activeInputId === 'study-val1') {
                // 如果第一格正確輸入了所選的乘數
                if (newVal === selectedStudyBase) {
                    document.getElementById('study-feedback').innerHTML = `<span class="text-emerald-600">✨ 第一格對了！</span>`;
                    // 自動跳到第二格
                    setTimeout(() => {
                        setActiveInput('study-val2');
                    }, 150);
                }
            } else if (activeInputId === 'study-val2') {
                // 如果第二格正確輸入了當前的乘數 (步驟數)
                if (newVal === studyStep) {
                    document.getElementById('study-feedback').innerHTML = `<span class="text-emerald-600">✨ 第二格對了！來填答案吧！</span>`;
                    // 自動跳到第三格答案
                    setTimeout(() => {
                        setActiveInput('study-ans');
                    }, 150);
                }
            }
        }

        // 檢查乘數探索算式答案
        function checkStudyAnswer() {
            const val1 = parseInt(document.getElementById('study-val1-box').innerText);
            const val2 = parseInt(document.getElementById('study-val2-box').innerText);
            const ans = parseInt(document.getElementById('study-ans-box').innerText);

            const feedback = document.getElementById('study-feedback');

            // 檢查是否皆已輸入
            if (isNaN(val1) || isNaN(val2) || isNaN(ans)) {
                feedback.innerHTML = `<span class="text-red-500">❌ 還有算式格沒填滿唷！</span>`;
                return;
            }

            // 正確答案條件
            const correctVal1 = selectedStudyBase;
            const correctVal2 = studyStep;
            const correctAns = correctVal1 * correctVal2;

            if (val1 === correctVal1 && val2 === correctVal2 && ans === correctAns) {
                triggerCelebration();
                feedback.innerHTML = `<span class="text-emerald-600">🎉 答對了！太棒了！</span>`;

                // 【保留算式】：將答對的這一題存入右側乘數表歷史
                addFormulaToHistory(val1, val2, ans);

                if (studyStep < 10) {
                    studyStep++;
                    // 延遲一下再開啟下一題，並累積長出下一個糖果盒子
                    setTimeout(() => {
                        resetStudyFormula();
                        appendCandyBox(studyStep);
                    }, 1200);
                } else {
                    // 完成全部 1-10 關卡
                    setTimeout(() => {
                        document.getElementById('study-feedback').innerHTML = `
                            <div class="text-amber-600 font-extrabold text-base animate-bounce">
                                🏆 恭喜！完成了整個 ${selectedStudyBase} 的完整乘數表！
                            </div>
                        `;
                    }, 1000);
                }
            } else {
                // 答錯提示
                playWrongSound();
                let errMsg = "❌ 算式不對唷，再檢查一下！";
                if (val1 !== correctVal1) {
                    errMsg = `❌ 這盒是 ${selectedStudyBase} 顆糖果，第一個數要輸入 ${selectedStudyBase} 喔！`;
                } else if (val2 !== correctVal2) {
                    errMsg = `❌ 現在是第 ${correctVal2} 個盒子，第二個數要輸入 ${correctVal2} 喔！`;
                } else if (ans !== correctAns) {
                    errMsg = `❌ 答案不對喔，快數數看左邊總共有幾顆糖果！`;
                }
                feedback.innerHTML = `<span class="text-red-500">${errMsg}</span>`;
            }
        }


        // ----------------- 頁籤二：指定乘數挑戰 邏輯 -----------------
        let selectedPracticeBase = null;
        let practiceCurrentMultiplier = null;
        let practiceCorrectAns = null;
        let practiceCorrectCount = 0;

        function selectPracticeNum(num) {
            playClickSound();
            selectedPracticeBase = num;
            practiceCorrectCount = 0;
            document.getElementById('practice-score-text').innerText = `已答對：0 題`;

            // 更新按鈕樣式
            document.querySelectorAll('.practice-num-btn').forEach(btn => {
                btn.classList.remove('bg-sky-400', 'text-white', 'border-sky-600');
                btn.classList.add('bg-white', 'text-sky-600', 'border-sky-300');
            });
            const activeBtn = document.getElementById(`btn-practice-${num}`);
            activeBtn.classList.add('bg-sky-400', 'text-white', 'border-sky-600');
            activeBtn.classList.remove('bg-white', 'text-sky-600', 'border-sky-300');

            document.getElementById('practice-placeholder').classList.add('hidden');
            document.getElementById('practice-game-area').classList.remove('hidden');

            generatePracticeQuestion(true);
        }

        function generatePracticeQuestion(isAuto) {
            if (isAuto !== true) playClickSound();
            document.getElementById('btn-practice-next').classList.add('hidden');
            document.getElementById('practice-feedback').innerHTML = '';
            document.getElementById('practice-ans-box').innerText = '?';

            practiceCurrentMultiplier = Math.floor(Math.random() * 10) + 1;
            practiceCorrectAns = selectedPracticeBase * practiceCurrentMultiplier;

            document.getElementById('practice-q-num1').innerText = selectedPracticeBase;
            document.getElementById('practice-q-num2').innerText = practiceCurrentMultiplier;
        }

        function pressPracticeKey(val) {
            playClickSound();
            if (!document.getElementById('btn-practice-next').classList.contains('hidden')) return;

            const ansBox = document.getElementById('practice-ans-box');
            if (val === 'C') {
                ansBox.innerText = '?';
                return;
            }

            let currentVal = ansBox.innerText;
            if (currentVal === '?') {
                currentVal = '';
            }

            if (currentVal.length < 3) {
                ansBox.innerText = currentVal + val;
            }
        }

        function checkPracticeAnswer() {
            if (!document.getElementById('btn-practice-next').classList.contains('hidden')) return;

            const ansBox = document.getElementById('practice-ans-box');
            const userAns = parseInt(ansBox.innerText);
            const feedback = document.getElementById('practice-feedback');

            if (isNaN(userAns)) {
                feedback.innerHTML = `<span class="text-red-500">❌ 請先輸入答案喔！</span>`;
                return;
            }

            if (userAns === practiceCorrectAns) {
                triggerCelebration();
                feedback.innerHTML = `<span class="text-emerald-600">🎉 答對了！太厲害了！</span>`;
                practiceCorrectCount++;
                document.getElementById('practice-score-text').innerText = `已答對：${practiceCorrectCount} 題`;
                
                document.getElementById('btn-practice-next').classList.remove('hidden');
            } else {
                playWrongSound();
                feedback.innerHTML = `<span class="text-red-500">❌ 算錯囉，再想一想、重新輸入試試！</span>`;
            }
        }


        // ----------------- 頁籤三：隨機挑戰 邏輯 -----------------
        let randomQuestionNum1 = null;
        let randomQuestionNum2 = null;
        let randomCorrectAns = null;
        let randomCorrectCount = 0;

        function initRandomGame() {
            randomCorrectCount = 0;
            document.getElementById('random-score-text').innerText = `已答對：0 題`;
            generateRandomQuestion(true);
        }

        function generateRandomQuestion(isAuto) {
            if (isAuto !== true) playClickSound();
            document.getElementById('btn-random-next').classList.add('hidden');
            document.getElementById('random-feedback').innerHTML = '';
            document.getElementById('random-ans-box').innerText = '?';

            randomQuestionNum1 = Math.floor(Math.random() * 10) + 1;
            randomQuestionNum2 = Math.floor(Math.random() * 10) + 1;
            randomCorrectAns = randomQuestionNum1 * randomQuestionNum2;

            document.getElementById('random-q-num1').innerText = randomQuestionNum1;
            document.getElementById('random-q-num2').innerText = randomQuestionNum2;
        }

        function pressRandomKey(val) {
            playClickSound();
            if (!document.getElementById('btn-random-next').classList.contains('hidden')) return;

            const ansBox = document.getElementById('random-ans-box');
            if (val === 'C') {
                ansBox.innerText = '?';
                return;
            }

            let currentVal = ansBox.innerText;
            if (currentVal === '?') {
                currentVal = '';
            }

            if (currentVal.length < 3) {
                ansBox.innerText = currentVal + val;
            }
        }

        function checkRandomAnswer() {
            if (!document.getElementById('btn-random-next').classList.contains('hidden')) return;

            const ansBox = document.getElementById('random-ans-box');
            const userAns = parseInt(ansBox.innerText);
            const feedback = document.getElementById('random-feedback');

            if (isNaN(userAns)) {
                feedback.innerHTML = `<span class="text-red-500">❌ 請先輸入答案喔！</span>`;
                return;
            }

            if (userAns === randomCorrectAns) {
                triggerCelebration();
                feedback.innerHTML = `<span class="text-emerald-600">🎉 答對了！你超級厲害！</span>`;
                randomCorrectCount++;
                document.getElementById('random-score-text').innerText = `已答對：${randomCorrectCount} 題`;
                
                document.getElementById('btn-random-next').classList.remove('hidden');
            } else {
                playWrongSound();
                feedback.innerHTML = `<span class="text-red-500">❌ 差一點點！重新算算看！</span>`;
            }
        }
    </script>
</body>
</html>
