<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>互動平面圖形遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: none;
            background-color: #f0fdf4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            /* 網格背景 */
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
        }
        
        .shape-container {
            transition: transform 0.2s;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .shape-container:active {
            transform: scale(0.95);
        }

        .dragging {
            position: fixed !important;
            z-index: 1000 !important;
            pointer-events: none;
            transform: scale(1.15) rotate(4deg) !important;
            filter: drop-shadow(0 20px 25px rgba(0,0,0,0.2));
        }

        /* 移除半透明，改為純色實體 */
        .drop-zone {
            border: 4px dashed #cbd5e1;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #ffffff;
        }

        .drop-zone.active {
            background-color: #f0fdfa;
            border-color: #10b981;
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2);
        }

        .drop-zone.matched {
            border: 4px solid #10b981;
            background-color: #d1fae5;
            transform: scale(1);
        }

        .drop-zone svg {
            opacity: 0.3;
            filter: grayscale(100%);
        }

        .scene-shape:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .nav-btn {
            @apply flex flex-col items-center justify-center transition-all duration-300 rounded-2xl p-2 text-center border-2 border-transparent bg-white shadow-sm hover:shadow-md hover:-translate-y-1 relative overflow-hidden;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col text-slate-800">

    <!-- 頂部設定選單區 (移除玻璃擬物，改為實體純白背景) -->
    <header id="main-menu" class="w-full bg-white shadow-md border-b border-slate-200 p-3 z-20 sticky top-0">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-4 md:gap-8">
            <h1 class="text-3xl font-extrabold text-emerald-600 shrink-0 drop-shadow-sm tracking-tight flex items-center gap-2">
                <span class="text-4xl drop-shadow-md">🏆</span> 幾何大挑戰
            </h1>
            
            <div class="flex-1 flex flex-col md:flex-row gap-4 w-full bg-slate-50 p-2 rounded-3xl border border-slate-200 shadow-inner">
                <!-- 步驟 1：模式 -->
                <div class="flex-1 px-2">
                    <div class="flex items-center justify-between mb-2">
                        <span class="bg-emerald-100 text-emerald-700 text-[10px] font-black px-2 py-0.5 rounded-full tracking-widest">STEP 1</span>
                        <span class="text-xs font-bold text-slate-500">選擇模式</span>
                    </div>
                    <div class="grid grid-cols-4 gap-2" id="mode-selectors">
                        <button class="mode-btn nav-btn text-emerald-700 sound-click" data-mode="1" title="拖拉配對">
                            <span class="text-2xl drop-shadow-sm mb-1 pointer-events-none">🧩</span>
                            <span class="text-[11px] font-bold pointer-events-none">配對</span>
                        </button>
                        <button class="mode-btn nav-btn text-emerald-700 sound-click" data-mode="2" title="圖形分類">
                            <span class="text-2xl drop-shadow-sm mb-1 pointer-events-none">🗂️</span>
                            <span class="text-[11px] font-bold pointer-events-none">分類</span>
                        </button>
                        <button class="mode-btn nav-btn text-emerald-700 sound-click" data-mode="3" title="選擇指定形狀">
                            <span class="text-2xl drop-shadow-sm mb-1 pointer-events-none">🎯</span>
                            <span class="text-[11px] font-bold pointer-events-none">選擇</span>
                        </button>
                        <button class="mode-btn nav-btn text-emerald-700 sound-click" data-mode="4" title="圖片尋寶">
                            <span class="text-2xl drop-shadow-sm mb-1 pointer-events-none">🔍</span>
                            <span class="text-[11px] font-bold pointer-events-none">尋寶</span>
                        </button>
                    </div>
                </div>

                <div class="w-px bg-slate-200 hidden md:block my-2"></div>

                <!-- 步驟 2：難度 -->
                <div class="flex-1 px-2">
                    <div class="flex items-center justify-between mb-2">
                        <span class="bg-amber-100 text-amber-700 text-[10px] font-black px-2 py-0.5 rounded-full tracking-widest">STEP 2</span>
                        <span class="text-xs font-bold text-slate-500">選擇難度</span>
                    </div>
                    <div class="grid grid-cols-3 gap-2 h-[calc(100%-24px)]" id="diff-selectors">
                        <button class="diff-btn nav-btn text-amber-700 sound-click" data-diff="1">
                            <span class="text-xl drop-shadow-sm mb-1 pointer-events-none">⭐</span>
                            <span class="text-[11px] font-bold pointer-events-none">簡單</span>
                        </button>
                        <button class="diff-btn nav-btn text-amber-700 sound-click" data-diff="2">
                            <span class="text-xl drop-shadow-sm mb-1 pointer-events-none">⭐⭐</span>
                            <span class="text-[11px] font-bold pointer-events-none">中等</span>
                        </button>
                        <button class="diff-btn nav-btn text-amber-700 sound-click" data-diff="3">
                            <span class="text-xl drop-shadow-sm mb-1 pointer-events-none">⭐⭐⭐</span>
                            <span class="text-[11px] font-bold pointer-events-none">困難</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 開始按鈕 -->
            <button id="start-btn" class="shrink-0 bg-emerald-500 hover:bg-emerald-600 text-white font-black text-lg py-4 px-8 rounded-2xl shadow-lg transition-all disabled:opacity-40 disabled:grayscale hover:-translate-y-1 active:translate-y-0 sound-click" disabled>
                開始遊戲 <span class="text-2xl ml-1 align-middle">▶</span>
            </button>
        </div>
    </header>

    <!-- 遊戲畫面區域 -->
    <main id="game-screen" class="flex-1 hidden flex-col overflow-hidden relative z-10">
        <div class="bg-white border-b border-emerald-100 p-2 flex justify-between items-center px-4 md:px-8 shadow-sm">
            <button id="back-btn" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-2 transition-colors sound-click">
                <span class="text-lg">↺</span> 重設
            </button>
            <div class="flex-1 text-center">
                <h2 id="game-instruction" class="text-lg md:text-2xl font-black text-emerald-700 drop-shadow-sm">請在上方選好模式後按開始</h2>
            </div>
            <div class="text-emerald-700 font-black bg-emerald-100 px-5 py-2 rounded-xl border border-emerald-200 text-lg flex items-center gap-2">
                🏆 <span id="score-display">0</span>
            </div>
        </div>

        <div id="game-area" class="flex-1 relative flex items-center justify-center p-4 overflow-y-auto">
            <div id="empty-state" class="text-slate-400 flex flex-col items-center opacity-70">
                <div class="text-9xl mb-6 filter drop-shadow-lg animate-bounce" style="animation-duration: 3s;">🎮</div>
                <p class="text-2xl font-extrabold text-slate-500">請選擇模式與難度</p>
                <p class="text-md font-bold mt-2 text-slate-400">然後點擊右上角的「開始遊戲」</p>
            </div>
        </div>
    </main>

    <!-- 回饋視窗 (實體背景) -->
    <div id="feedback-modal" class="fixed inset-0 bg-slate-900/70 hidden items-center justify-center z-50">
        <div id="feedback-content" class="bg-white p-10 rounded-[2rem] shadow-2xl flex flex-col items-center transform scale-0 transition-transform duration-300 border-4 border-emerald-400">
            <div id="feedback-icon" class="text-7xl mb-4 filter drop-shadow-md">✨</div>
            <h2 id="feedback-text" class="text-4xl font-black mb-8 text-emerald-500">答對了！</h2>
            <button id="next-round-btn" class="bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 px-10 rounded-2xl shadow-lg text-xl transition-all hover:-translate-y-1 active:translate-y-0 sound-click">
                下一關 ➔
            </button>
        </div>
    </div>

    <script>
        // --- 音效系統 (利用 Web Audio API 合成，無須外部檔案) ---
        const SoundBox = {
            ctx: null,
            init: function() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            playTone: function(freq, type, duration, vol=0.1, startTime=0) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime + startTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime + startTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + startTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(this.ctx.currentTime + startTime);
                osc.stop(this.ctx.currentTime + startTime + duration);
            },
            click: function() {
                this.init();
                this.playTone(600, 'sine', 0.1, 0.05);
            },
            success: function() {
                this.init();
                this.playTone(800, 'sine', 0.1, 0.05);
                this.playTone(1200, 'sine', 0.15, 0.05, 0.1);
            },
            error: function() {
                this.init();
                this.playTone(200, 'sawtooth', 0.3, 0.05);
            },
            win: function() {
                this.init();
                this.playTone(523.25, 'sine', 0.15, 0.1, 0);       // C5
                this.playTone(659.25, 'sine', 0.15, 0.1, 0.15);    // E5
                this.playTone(783.99, 'sine', 0.15, 0.1, 0.3);     // G5
                this.playTone(1046.50, 'sine', 0.4, 0.1, 0.45);    // C6
            }
        };

        // --- 核心資料 ---
        const SHAPES = {
            circle: { id: 'circle', name: '圓形', category: '圓形', type: 'circle' },
            square: { id: 'square', name: '正方形', category: '正方形', type: 'square' },
            triangle: { id: 'triangle', name: '三角形', category: '三角形', type: 'polygon', sides: 3 },
            rectangle: { id: 'rectangle', name: '長方形', category: '長方形', type: 'rect' },
            quadrilateral: { id: 'quadrilateral', name: '四邊形', category: '多邊形', type: 'polygon', sides: 4, irregular: true },
            pentagon: { id: 'pentagon', name: '五邊形', category: '多邊形', type: 'polygon', sides: 5 },
            hexagon: { id: 'hexagon', name: '六邊形', category: '多邊形', type: 'polygon', sides: 6 },
            heptagon: { id: 'heptagon', name: '七邊形', category: '多邊形', type: 'polygon', sides: 7 },
            octagon: { id: 'octagon', name: '八邊形', category: '多邊形', type: 'polygon', sides: 8 },
            nonagon: { id: 'nonagon', name: '九邊形', category: '多邊形', type: 'polygon', sides: 9 },
            decagon: { id: 'decagon', name: '十邊形', category: '多邊形', type: 'polygon', sides: 10 }
        };

        const DIFFICULTY_LEVELS = {
            1: ['circle', 'square', 'rectangle', 'triangle'], // 基礎集合
            2: ['circle', 'square', 'rectangle', 'triangle'], 
            3: ['circle', 'triangle', 'quadrilateral', 'pentagon', 'hexagon', 'heptagon', 'octagon', 'nonagon', 'decagon']
        };

        const COLORS = ['#ef4444', '#f97316', '#f59e0b', '#84cc16', '#10b981', '#06b6d4', '#3b82f6', '#8b5cf6', '#d946ef', '#f43f5e'];

        let selectedMode = null;
        let selectedDifficulty = null;
        let currentScore = 0;
        let activeShapes = [];
        let targetShapeId = null;

        let dragState = { element: null, originalParent: null, startX: 0, startY: 0, initialLeft: 0, initialTop: 0 };
        let itemsToMatch = 0;
        let itemsMatched = 0;
        let mode1RemainingShapes = [];
        let nextShapeBtn = null;

        const ui = {
            mainMenu: document.getElementById('main-menu'),
            gameScreen: document.getElementById('game-screen'),
            modeBtns: document.querySelectorAll('.mode-btn'),
            diffBtns: document.querySelectorAll('.diff-btn'),
            startBtn: document.getElementById('start-btn'),
            backBtn: document.getElementById('back-btn'),
            gameArea: document.getElementById('game-area'),
            gameInstruction: document.getElementById('game-instruction'),
            scoreDisplay: document.getElementById('score-display'),
            feedbackModal: document.getElementById('feedback-modal'),
            feedbackContent: document.getElementById('feedback-content'),
            feedbackIcon: document.getElementById('feedback-icon'),
            feedbackText: document.getElementById('feedback-text'),
            nextRoundBtn: document.getElementById('next-round-btn')
        };

        function init() {
            // 初始化全域點擊以啟用音效
            document.body.addEventListener('click', () => SoundBox.init(), { once: true });
            document.body.addEventListener('touchstart', () => SoundBox.init(), { once: true });

            // 綁定音效按鈕
            document.querySelectorAll('.sound-click').forEach(btn => {
                btn.addEventListener('click', () => SoundBox.click());
            });

            ui.modeBtns.forEach(btn => btn.addEventListener('click', () => selectOption('mode', btn)));
            ui.diffBtns.forEach(btn => btn.addEventListener('click', () => selectOption('diff', btn)));
            ui.startBtn.addEventListener('click', startGame);
            ui.backBtn.addEventListener('click', () => {
                ui.gameArea.innerHTML = '<div id="empty-state" class="text-slate-400 flex flex-col items-center opacity-70"><div class="text-9xl mb-6 filter drop-shadow-lg animate-bounce" style="animation-duration: 3s;">🎮</div><p class="text-2xl font-extrabold text-slate-500">請選擇模式與難度</p><p class="text-md font-bold mt-2 text-slate-400">然後點擊右上角的「開始遊戲」</p></div>';
                ui.gameInstruction.textContent = '請在上方選好模式後按開始';
            });
            ui.nextRoundBtn.addEventListener('click', () => {
                hideFeedback();
                startRound();
            });

            document.addEventListener('mousedown', onDragStart, {passive: false});
            document.addEventListener('mousemove', onDragMove, {passive: false});
            document.addEventListener('mouseup', onDragEnd, {passive: false});
            document.addEventListener('touchstart', onDragStart, {passive: false});
            document.addEventListener('touchmove', onDragMove, {passive: false});
            document.addEventListener('touchend', onDragEnd, {passive: false});

            ui.gameScreen.classList.remove('hidden');
            ui.gameScreen.classList.add('flex');
        }

        function selectOption(type, button) {
            const btns = type === 'mode' ? ui.modeBtns : ui.diffBtns;
            const activeClass = type === 'mode' 
                ? 'bg-emerald-500 border-emerald-600 text-white shadow-md scale-[1.03]' 
                : 'bg-amber-500 border-amber-600 text-white shadow-md scale-[1.03]';
            const inactiveClass = 'bg-white border-transparent text-slate-600 hover:bg-slate-50 hover:border-slate-200';

            btns.forEach(btn => {
                btn.className = 'mode-btn nav-btn sound-click ' + inactiveClass;
                if(type==='diff') btn.className = 'diff-btn nav-btn sound-click ' + inactiveClass;
            });

            button.className = (type === 'mode' ? 'mode-btn ' : 'diff-btn ') + 'nav-btn sound-click ' + activeClass;

            if (type === 'mode') selectedMode = button.dataset.mode;
            if (type === 'diff') selectedDifficulty = button.dataset.diff;

            if (selectedMode && selectedDifficulty) {
                ui.startBtn.disabled = false;
            }
        }

        function startGame() {
            if (!selectedMode || !selectedDifficulty) return;
            activeShapes = DIFFICULTY_LEVELS[selectedDifficulty];
            startRound();
        }

        function startRound() {
            ui.gameArea.innerHTML = '';
            const mode = parseInt(selectedMode);
            if (mode === 1) renderMode1();
            else if (mode === 2) renderMode2();
            else if (mode === 3) renderMode3();
            else if (mode === 4) renderMode4();
        }

        function getShapeSVG(shapeId, color, size = 100) {
            const s = SHAPES[shapeId];
            const half = size / 2;
            let svgContent = '';
            if (s.type === 'circle') svgContent = `<circle cx="${half}" cy="${half}" r="${half - 4}" fill="${color}" stroke="#334155" stroke-width="4"/>`;
            else if (s.type === 'square') svgContent = `<rect x="4" y="4" width="${size - 8}" height="${size - 8}" rx="4" fill="${color}" stroke="#334155" stroke-width="4"/>`;
            else if (s.type === 'rect') svgContent = `<rect x="4" y="${(size - size * 0.6) / 2}" width="${size - 8}" height="${size * 0.6}" rx="4" fill="${color}" stroke="#334155" stroke-width="4"/>`;
            else {
                let points = [];
                for (let i = 0; i < s.sides; i++) {
                    let angle = (i * 2 * Math.PI / s.sides) - Math.PI / 2;
                    let r = half - 4;
                    if (s.irregular && i % 2 === 0) r *= 0.7;
                    let yOffset = (s.sides === 3) ? (r * 0.25) : 0;
                    points.push(`${half + r * Math.cos(angle)},${half + r * Math.sin(angle) + yOffset}`);
                }
                svgContent = `<polygon points="${points.join(' ')}" fill="${color}" stroke="#334155" stroke-width="4" stroke-linejoin="round"/>`;
            }
            return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="drop-shadow-sm overflow-visible">${svgContent}</svg>`;
        }

        function getRandomColor() { return COLORS[Math.floor(Math.random() * COLORS.length)]; }
        function shuffleArray(arr) { return arr.sort(() => Math.random() - 0.5); }

        function renderMode1() {
            ui.gameInstruction.textContent = '🧩 拖拉上方隨機出現的圖形到對應框中';
            
            // 邏輯優化：簡單難度下僅使用圓形、三角形、正方形 (排除長方形)
            let roundShapes = [...activeShapes];
            if (parseInt(selectedDifficulty) === 1) {
                roundShapes = roundShapes.filter(id => id !== 'rectangle');
            }
            roundShapes = shuffleArray(roundShapes).slice(0, 4);
            
            itemsToMatch = roundShapes.length;
            itemsMatched = 0;
            mode1RemainingShapes = shuffleArray([...roundShapes]);

            const container = document.createElement('div');
            container.className = 'w-full h-full flex flex-col justify-around items-center max-w-4xl mx-auto';

            const topArea = document.createElement('div');
            topArea.id = 'mode1-top-area';
            topArea.className = 'w-full flex justify-center min-h-[120px]';

            const bottomArea = document.createElement('div');
            bottomArea.className = 'w-full flex justify-center gap-8 flex-wrap';

            roundShapes.forEach(shapeId => {
                const zone = document.createElement('div');
                zone.className = 'drop-zone w-32 h-40 rounded-2xl flex flex-col items-center justify-center gap-2 bg-white shadow-sm';
                zone.dataset.targetId = shapeId;
                zone.innerHTML = `<div class="pointer-events-none">${getShapeSVG(shapeId, '#f1f5f9', 80)}</div><span class="text-xs font-bold text-slate-400">${SHAPES[shapeId].name}</span>`;
                bottomArea.appendChild(zone);
            });

            const btnArea = document.createElement('div');
            btnArea.className = 'h-16 flex items-center justify-center w-full';
            nextShapeBtn = document.createElement('button');
            nextShapeBtn.className = 'hidden bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-8 rounded-xl shadow-md animate-pop sound-click';
            nextShapeBtn.textContent = '全部完成！下一關 ➔';
            nextShapeBtn.onclick = () => { SoundBox.click(); handleWin(); };
            btnArea.appendChild(nextShapeBtn);

            container.appendChild(topArea);
            container.appendChild(bottomArea);
            container.appendChild(btnArea);
            ui.gameArea.appendChild(container);
            showNextDraggable();
        }

        function showNextDraggable() {
            const topArea = document.getElementById('mode1-top-area');
            if (!topArea || mode1RemainingShapes.length === 0) return;
            topArea.innerHTML = '';
            const shapeId = mode1RemainingShapes.pop();
            const item = document.createElement('div');
            item.className = 'shape-container draggable animate-pop';
            item.dataset.shapeId = shapeId;
            item.innerHTML = getShapeSVG(shapeId, getRandomColor(), 100);
            topArea.appendChild(item);
        }

        function getClientCoords(e) {
            if (e.changedTouches) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
            if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            return { x: e.clientX, y: e.clientY };
        }

        function onDragStart(e) {
            const target = e.target.closest('.draggable');
            if (!target) return;
            e.preventDefault();
            const coords = getClientCoords(e);
            dragState.element = target;
            dragState.originalParent = target.parentElement;
            const rect = target.getBoundingClientRect();
            dragState.initialLeft = rect.left;
            dragState.initialTop = rect.top;
            dragState.startX = coords.x;
            dragState.startY = coords.y;
            target.classList.add('dragging');
            target.style.left = `${rect.left}px`;
            target.style.top = `${rect.top}px`;
            document.body.appendChild(target);
        }

        function onDragMove(e) {
            if (!dragState.element) return;
            e.preventDefault();
            const coords = getClientCoords(e);
            dragState.element.style.left = `${dragState.initialLeft + coords.x - dragState.startX}px`;
            dragState.element.style.top = `${dragState.initialTop + coords.y - dragState.startY}px`;
            const elemBelow = document.elementFromPoint(coords.x, coords.y);
            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('active'));
            if (elemBelow) {
                const zone = elemBelow.closest('.drop-zone');
                if (zone && !zone.classList.contains('matched')) zone.classList.add('active');
            }
        }

        function onDragEnd(e) {
            if (!dragState.element) return;
            const el = dragState.element;
            const id = el.dataset.shapeId;
            let dropped = false;
            el.style.display = 'none';
            const coords = getClientCoords(e);
            const elemBelow = document.elementFromPoint(coords.x, coords.y);
            el.style.display = 'block';

            if (elemBelow) {
                const zone = elemBelow.closest('.drop-zone');
                if (parseInt(selectedMode) === 1 && zone && !zone.classList.contains('matched') && zone.dataset.targetId === id) {
                    dropped = true;
                    SoundBox.success(); // 播放正確音效
                    zone.classList.add('matched', 'animate-pop');
                    zone.querySelector('div').innerHTML = el.innerHTML;
                    el.remove();
                    itemsMatched++;
                    if (itemsMatched >= itemsToMatch) {
                        setTimeout(() => nextShapeBtn.classList.remove('hidden'), 400);
                    } else {
                        setTimeout(showNextDraggable, 400);
                    }
                } else if (parseInt(selectedMode) === 2 && zone) {
                    const targetCat = zone.dataset.targetCategory;
                    const itemCat = SHAPES[id].category;
                    const isSimpleDiff = parseInt(selectedDifficulty) === 1;
                    
                    const match = (targetCat === itemCat) || 
                                (isSimpleDiff && targetCat === '方形' && (itemCat === '正方形' || itemCat === '長方形'));

                    if (match) {
                        dropped = true;
                        SoundBox.success(); // 播放正確音效
                        el.style.position = 'static';
                        el.classList.remove('dragging', 'draggable');
                        el.style.transform = 'scale(0.6)';
                        zone.querySelector('.collection-area').appendChild(el);
                        itemsMatched++;
                        if (itemsMatched >= itemsToMatch) setTimeout(handleWin, 400);
                    } else {
                        SoundBox.error(); // 分類錯誤
                        zone.classList.add('animate-shake');
                        setTimeout(() => zone.classList.remove('animate-shake'), 400);
                    }
                } else if (zone && !zone.classList.contains('matched')) {
                    SoundBox.error(); // 配對錯誤
                    zone.classList.add('animate-shake');
                    setTimeout(() => zone.classList.remove('animate-shake'), 400);
                }
            }
            if (!dropped) {
                el.classList.remove('dragging');
                if(dragState.originalParent) dragState.originalParent.appendChild(el);
            }
            dragState.element = null;
        }

        function renderMode2() {
            ui.gameInstruction.textContent = '🗂️ 將圖形拖拉到正確的分類箱中';
            
            let roundCategories = [];
            if (parseInt(selectedDifficulty) === 1) {
                roundCategories = ['圓形', '三角形', '方形'];
            } else {
                roundCategories = [...new Set(activeShapes.map(id => SHAPES[id].category))];
            }
            
            roundCategories = shuffleArray(roundCategories);
            
            let items = [];
            
            // 針對每一個分類，隨機產生 2-3 個圖形
            roundCategories.forEach(cat => {
                let idsInCat = [];
                
                // 簡單難度下，「方形」包含正方形與長方形
                if (parseInt(selectedDifficulty) === 1 && cat === '方形') {
                    idsInCat = activeShapes.filter(id => SHAPES[id].category === '正方形' || SHAPES[id].category === '長方形');
                } else {
                    idsInCat = activeShapes.filter(id => SHAPES[id].category === cat);
                }
                
                if (idsInCat.length > 0) {
                    // 隨機決定該類別要有 2 還是 3 個
                    let count = Math.floor(Math.random() * 2) + 2; 
                    for (let i = 0; i < count; i++) {
                        items.push(idsInCat[Math.floor(Math.random() * idsInCat.length)]);
                    }
                }
            });

            items = shuffleArray(items);
            itemsToMatch = items.length; 
            itemsMatched = 0; 

            const container = document.createElement('div');
            container.className = 'w-full h-full flex flex-col justify-between items-center max-w-5xl mx-auto pb-4';
            
            const topArea = document.createElement('div'); 
            topArea.className = 'w-full flex justify-center gap-4 flex-wrap min-h-[160px] p-4 bg-slate-100 rounded-2xl shadow-inner';
            
            items.forEach(id => {
                const item = document.createElement('div');
                item.className = 'shape-container draggable animate-pop';
                item.dataset.shapeId = id;
                item.innerHTML = getShapeSVG(id, getRandomColor(), 70);
                topArea.appendChild(item);
            });

            const bottomArea = document.createElement('div'); 
            bottomArea.className = 'w-full flex justify-center gap-6 px-4 mt-6 overflow-x-auto';
            
            roundCategories.forEach(cat => {
                const zone = document.createElement('div');
                zone.className = 'drop-zone min-w-[140px] flex-1 min-h-[200px] rounded-2xl flex flex-col items-center p-3 shadow-sm';
                zone.dataset.targetCategory = cat;
                zone.innerHTML = `<div class="text-sm font-bold text-slate-500 mb-2 border-b w-full text-center pb-1">${cat}</div><div class="collection-area flex flex-wrap justify-center gap-1"></div>`;
                bottomArea.appendChild(zone);
            });

            container.appendChild(topArea); 
            container.appendChild(bottomArea); 
            ui.gameArea.appendChild(container);
        }

        function renderMode3() {
            targetShapeId = activeShapes[Math.floor(Math.random() * activeShapes.length)];
            ui.gameInstruction.innerHTML = `🎯 請找出：<span class="text-3xl text-emerald-600 font-black ml-2">${SHAPES[targetShapeId].name}</span>`;
            
            let options = [targetShapeId];
            let pool = activeShapes.filter(id => id !== targetShapeId);
            pool = shuffleArray(pool);
            
            while(options.length < 6) {
                if(pool.length > 0) options.push(pool.pop());
                else {
                    const fallback = Object.keys(SHAPES).filter(id => id !== targetShapeId);
                    options.push(fallback[Math.floor(Math.random() * fallback.length)]);
                }
            }
            
            options = shuffleArray(options);
            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-3 gap-8 p-4';
            options.forEach(id => {
                const btn = document.createElement('button');
                btn.className = 'shape-container bg-white p-8 rounded-3xl shadow-md border-4 border-transparent hover:border-emerald-300 animate-pop';
                btn.innerHTML = getShapeSVG(id, getRandomColor(), 100);
                btn.onclick = () => {
                    if (id === targetShapeId) {
                        handleWin();
                    } else { 
                        SoundBox.error(); // 錯誤音效
                        btn.classList.add('animate-shake'); 
                        setTimeout(() => btn.classList.remove('animate-shake'), 400); 
                    }
                };
                grid.appendChild(btn);
            });
            ui.gameArea.appendChild(grid);
        }

        function renderMode4() {
            targetShapeId = activeShapes[Math.floor(Math.random() * activeShapes.length)];
            ui.gameInstruction.innerHTML = `🔍 尋找圖中的：<span class="text-3xl text-red-600 font-black ml-2">${SHAPES[targetShapeId].name}</span>`;
            const scene = document.createElement('div');
            scene.id = 'scene-container';
            scene.className = 'w-full max-w-4xl h-[60vh] rounded-3xl relative overflow-hidden shadow-lg border-4 border-slate-200';
            
            for(let i=0; i<30; i++) {
                const randomId = Object.keys(SHAPES)[Math.floor(Math.random() * Object.keys(SHAPES).length)];
                if (randomId !== targetShapeId) {
                    createSceneShape(scene, randomId, false);
                }
            }
            createSceneShape(scene, targetShapeId, true);
            ui.gameArea.appendChild(scene);
        }

        function createSceneShape(container, id, isTarget) {
            const div = document.createElement('div');
            div.className = 'scene-shape animate-pop';
            const size = 50 + Math.random() * 30;
            div.style.left = `${Math.random() * 90}%`;
            div.style.top = `${Math.random() * 90}%`;
            div.style.transform = `rotate(${Math.random() * 360}deg)`;
            div.innerHTML = getShapeSVG(id, getRandomColor(), size);
            div.onclick = (e) => {
                e.stopPropagation();
                if (isTarget) {
                    handleWin();
                } else { 
                    SoundBox.error(); // 錯誤音效
                    div.classList.add('animate-shake'); 
                    setTimeout(() => div.classList.remove('animate-shake'), 400); 
                }
            };
            container.appendChild(div);
        }

        function handleWin() {
            SoundBox.win(); // 過關音效
            currentScore += parseInt(selectedDifficulty) * 10;
            ui.scoreDisplay.textContent = currentScore;
            showFeedback(true);
        }

        function showFeedback(isWin) {
            ui.feedbackModal.classList.remove('hidden');
            ui.feedbackModal.classList.add('flex');
            setTimeout(() => {
                ui.feedbackContent.classList.remove('scale-0');
                ui.feedbackContent.classList.add('scale-100');
            }, 50);
        }

        function hideFeedback() {
            ui.feedbackContent.classList.remove('scale-100');
            ui.feedbackContent.classList.add('scale-0');
            setTimeout(() => ui.feedbackModal.classList.add('hidden'), 300);
        }

        init();
    </script>
</body>
</html>
