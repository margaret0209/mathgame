<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>減法直式互動遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隱藏數字輸入框的上下箭頭 */
        input[type=text]::-webkit-inner-spin-button, 
        input[type=text]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        /* 自訂輸入框樣式 */
        .math-input {
            width: 4rem;
            height: 4rem;
            font-size: 3.75rem;
            line-height: 1;
            padding: 0;
            text-align: center;
            background-color: white;
            border: 2px solid #cbd5e1;
            border-radius: 0.5rem;
            outline: none;
            transition: all 0.3s ease;
            cursor: default; /* 加入 readonly 後游標保持預設 */
        }
        .math-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
            background-color: #eff6ff;
        }
        .math-input:disabled {
            background-color: transparent;
            border-color: transparent;
            color: black;
            font-weight: bold;
        }
        /* 借位用的小輸入框 */
        .borrow-input {
            width: 2.75rem;
            height: 2.75rem;
            font-size: 1.5rem;
            border-color: #fca5a5;
            background-color: white; /* 確保背景不透明 */
            z-index: 10;
        }
        .borrow-input:focus {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.3);
        }
        .borrow-input:disabled {
            background-color: white; 
            border-color: transparent;
            color: #ef4444; 
            opacity: 1 !important; 
        }
        .cell {
            width: 4rem;
            height: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* C1消失動畫輔助 */
        .fade-out {
            opacity: 0 !important;
            transform: scale(0.8);
        }
        
        /* 模式選擇按鈕樣式 */
        .mode-btn.active {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="bg-blue-50 min-h-screen flex flex-col items-center py-6 font-sans">

    <!-- 頂部控制區 -->
    <div class="w-full max-w-4xl px-4 flex flex-col items-center mb-6">
        <h1 class="text-3xl font-bold text-blue-800 mb-4">減法直式大挑戰</h1>
        
        <!-- 模式切換 -->
        <div class="flex flex-wrap justify-center gap-2 md:gap-4 bg-white p-2 rounded-xl shadow-md mb-4">
            <button class="mode-btn active px-4 py-2 rounded-lg border-2 border-gray-200 font-bold transition-colors" data-mode="SOLO_HINT">
                📖 一般練習
            </button>
            <button class="mode-btn px-4 py-2 rounded-lg border-2 border-gray-200 font-bold transition-colors" data-mode="SOLO_NOHINT">
                🔥 無提示挑戰
            </button>
            <button class="mode-btn px-4 py-2 rounded-lg border-2 border-gray-200 font-bold transition-colors" data-mode="VERSUS">
                ⚔️ 雙人競賽
            </button>
        </div>

        <!-- 獲勝/完成提示橫幅 -->
        <div id="winner-banner" class="hidden text-2xl font-bold text-center py-2 px-6 rounded-lg shadow animate-bounce w-full max-w-md">
            <!-- 內容由 JS 填寫 -->
        </div>
    </div>

    <!-- 遊戲區域 (單人或雙人會在這裡生成) -->
    <div id="game-arena" class="w-full max-w-5xl px-2 flex flex-col md:flex-row gap-6 justify-center items-center md:items-start">
        <!-- 面板容器由 JS 動態生成 -->
    </div>

    <!-- 全域控制按鈕 -->
    <div class="mt-8 h-16">
        <button id="global-next-btn" class="hidden bg-green-500 hover:bg-green-600 text-white text-xl font-bold py-3 px-12 rounded-full shadow-lg transform transition hover:scale-105">
            下一題
        </button>
    </div>

    <script>
        // 常數狀態
        const STATES = {
            WAIT_CLICK_A1: 'WAIT_CLICK_A1',
            WAIT_INPUT_A1: 'WAIT_INPUT_A1',
            WAIT_CLICK_A2: 'WAIT_CLICK_A2',
            WAIT_INPUT_A2: 'WAIT_INPUT_A2',
            WAIT_C2: 'WAIT_C2',
            WAIT_C1: 'WAIT_C1',
            DONE: 'DONE'
        };

        // 玩家面板類別 (封裝單一遊戲面板的邏輯與 UI)
        class PlayerBoard {
            constructor(container, id, title, colorClass, mode, onFinishCallback) {
                this.container = container;
                this.id = id;
                this.mode = mode; // 'HINT' 或 'NOHINT'
                this.onFinish = onFinishCallback;
                this.activeInput = null;
                this.isDisabled = false;

                // 初始化 HTML
                this.container.innerHTML = this.getHTML(title, colorClass);
                
                // 綁定 DOM 元素
                this.el = {
                    messageBox: this.container.querySelector('.message-box'),
                    borrowTens: this.container.querySelector('.borrow-tens'),
                    borrowOnes: this.container.querySelector('.borrow-ones'),
                    valA1: this.container.querySelector('.val-a1'),
                    valA2: this.container.querySelector('.val-a2'),
                    valB1: this.container.querySelector('.val-b1'),
                    valB2: this.container.querySelector('.val-b2'),
                    ansTens: this.container.querySelector('.ans-tens'),
                    ansOnes: this.container.querySelector('.ans-ones'),
                    keypadBtns: this.container.querySelectorAll('.keypad-btn')
                };

                // 追蹤焦點
                const inputs = this.container.querySelectorAll('input[type="text"]');
                inputs.forEach(input => {
                    input.addEventListener('focus', () => {
                        if (!this.isDisabled) this.activeInput = input;
                    });
                });

                this.bindEvents();
            }

            getHTML(title, colorClass) {
                // 新增了 readonly，避免在平板上彈出原生的虛擬鍵盤干擾雙人畫面
                return `
                    <div class="bg-white p-5 rounded-3xl shadow-xl w-full max-w-[380px] border-t-8 ${colorClass} flex flex-col">
                        <h2 class="text-xl font-bold mb-3 text-center text-gray-700">${title}</h2>
                        
                        <!-- 提示訊息區塊 -->
                        <div class="message-box bg-gray-100 text-gray-800 p-2 rounded-lg mb-4 text-center font-bold text-sm min-h-[3rem] flex items-center justify-center transition-colors">
                            準備開始
                        </div>

                        <!-- 直式計算區塊 -->
                        <div class="flex justify-center mb-6 select-none">
                            <div class="grid grid-cols-3 gap-y-1 gap-x-4 text-6xl font-mono">
                                <!-- 借位區 -->
                                <div class="cell"></div>
                                <div class="cell relative"><input type="text" readonly class="borrow-tens math-input borrow-input absolute bottom-0 hidden opacity-0 transition-opacity duration-300" maxlength="1"></div>
                                <div class="cell relative"><input type="text" readonly class="borrow-ones math-input borrow-input absolute bottom-0 hidden opacity-0 transition-opacity duration-300" maxlength="2"></div>

                                <!-- 被減數 A -->
                                <div class="cell"></div>
                                <div class="val-a1 cell transition-all duration-300"></div>
                                <div class="val-a2 cell transition-all duration-300"></div>

                                <!-- 減數 B -->
                                <div class="cell text-gray-500 text-4xl">-</div>
                                <div class="val-b1 cell"></div>
                                <div class="val-b2 cell"></div>

                                <!-- 分隔線 -->
                                <div class="col-span-3 border-t-4 border-gray-800 my-1"></div>

                                <!-- 答案 C -->
                                <div class="cell"></div>
                                <div class="cell"><input type="text" readonly class="ans-tens math-input transition-all duration-500" disabled></div>
                                <div class="cell"><input type="text" readonly class="ans-ones math-input" disabled></div>
                            </div>
                        </div>

                        <!-- 九宮格數字鍵盤 -->
                        <div class="grid grid-cols-3 gap-2 mt-auto px-4 pb-2 max-w-[220px] mx-auto w-full">
                            ${[1,2,3,4,5,6,7,8,9].map(n => `<button class="keypad-btn bg-gray-100 hover:bg-gray-200 text-gray-800 text-lg font-bold py-2 rounded-lg shadow transition active:scale-95 touch-manipulation">${n}</button>`).join('')}
                            <button class="keypad-btn bg-red-100 hover:bg-red-200 text-red-600 text-lg font-bold py-2 rounded-lg shadow transition active:scale-95 touch-manipulation" id="key-del">⌫</button>
                            <button class="keypad-btn bg-gray-100 hover:bg-gray-200 text-gray-800 text-lg font-bold py-2 rounded-lg shadow transition active:scale-95 touch-manipulation">0</button>
                            <div></div>
                        </div>
                    </div>
                `;
            }

            // 優化的多點觸控綁定事件
            bindTap(element, callback) {
                let touched = false;
                // 處理觸控螢幕，避免預設的點擊延遲
                element.addEventListener('touchstart', (e) => {
                    touched = true;
                    e.preventDefault(); // 阻止原生行為，實現「零延遲」多點觸控
                    callback(e);
                    // 稍後重置狀態
                    setTimeout(() => touched = false, 300);
                }, { passive: false });

                // 保留滑鼠支援 (電腦環境)
                element.addEventListener('mousedown', (e) => {
                    if (touched) return;
                    e.preventDefault(); // 避免改變 input 的焦點
                    callback(e);
                });
            }

            bindEvents() {
                // 虛擬鍵盤點擊 (支援多點觸控)
                this.el.keypadBtns.forEach(btn => {
                    this.bindTap(btn, (e) => {
                        if (this.isDisabled || !this.activeInput || this.activeInput.disabled) return;
                        
                        const key = e.target.textContent;
                        if (key === '⌫') {
                            this.activeInput.value = this.activeInput.value.slice(0, -1);
                        } else if (!isNaN(key) && key.trim() !== '') {
                            const maxLen = parseInt(this.activeInput.getAttribute('maxlength') || 1);
                            if (this.activeInput.value.length < maxLen) {
                                this.activeInput.value += key;
                            }
                        }
                        this.activeInput.dispatchEvent(new Event('input'));
                        if (this.activeInput) this.activeInput.focus();
                    });
                });

                // A1 點擊借位 (支援多點觸控)
                this.bindTap(this.el.valA1, () => {
                    if (this.isDisabled) return;
                    if (this.state === STATES.WAIT_CLICK_A1) this.setState(STATES.WAIT_INPUT_A1);
                });

                // 借位十位數輸入
                this.el.borrowTens.addEventListener('input', (e) => {
                    if (this.state === STATES.WAIT_INPUT_A1 && parseInt(e.target.value) === this.a1 - 1) {
                        e.target.disabled = true;
                        this.setState(STATES.WAIT_CLICK_A2);
                    }
                });

                // A2 點擊接收借位 (支援多點觸控)
                this.bindTap(this.el.valA2, () => {
                    if (this.isDisabled) return;
                    if (this.state === STATES.WAIT_CLICK_A2) this.setState(STATES.WAIT_INPUT_A2);
                });

                // 借位個位數輸入
                this.el.borrowOnes.addEventListener('input', (e) => {
                    if (this.state === STATES.WAIT_INPUT_A2 && parseInt(e.target.value) === this.a2 + 10) {
                        e.target.disabled = true;
                        this.setState(STATES.WAIT_C2);
                    }
                });

                // 答案個位數輸入
                this.el.ansOnes.addEventListener('input', (e) => {
                    if (this.state === STATES.WAIT_C2) {
                        if (parseInt(e.target.value) === this.expectedC2) {
                            e.target.disabled = true;
                            this.setState(STATES.WAIT_C1);
                        }
                    }
                });

                // 答案十位數輸入
                this.el.ansTens.addEventListener('input', (e) => {
                    if (this.state === STATES.WAIT_C1) {
                        const val = parseInt(e.target.value);
                        if (val === this.expectedC1 || (this.expectedC1 === 0 && e.target.value === '0')) {
                            e.target.disabled = true;
                            
                            // 0自動消失特效
                            if (this.expectedC1 === 0) {
                                setTimeout(() => {
                                    e.target.classList.add('fade-out');
                                    setTimeout(() => { e.target.value = ''; }, 300);
                                }, 500);
                            }
                            this.setState(STATES.DONE);
                        }
                    }
                });
            }

            resetUI() {
                this.isDisabled = false;
                const inputs = [this.el.borrowTens, this.el.borrowOnes, this.el.ansTens, this.el.ansOnes];
                inputs.forEach(input => {
                    input.value = '';
                    input.disabled = true;
                    input.classList.remove('fade-out');
                });
                this.activeInput = null;

                this.el.borrowTens.classList.add('hidden', 'opacity-0');
                this.el.borrowOnes.classList.add('hidden', 'opacity-0');

                this.el.valA1.className = 'val-a1 cell transition-all duration-300';
                this.el.valA2.className = 'val-a2 cell transition-all duration-300';
            }

            startRound(A, B) {
                this.a1 = Math.floor(A / 10);
                this.a2 = A % 10;
                this.b1 = Math.floor(B / 10);
                this.b2 = B % 10;
                this.isBorrowing = (this.a2 < this.b2);

                if (this.isBorrowing) {
                    this.expectedC1 = (this.a1 - 1) - this.b1;
                    this.expectedC2 = (this.a2 + 10) - this.b2;
                } else {
                    this.expectedC1 = this.a1 - this.b1;
                    this.expectedC2 = this.a2 - this.b2;
                }

                this.resetUI();

                this.el.valA1.textContent = this.a1;
                this.el.valA2.textContent = this.a2;
                this.el.valB1.textContent = this.b1;
                this.el.valB2.textContent = this.b2;

                if (this.isBorrowing) {
                    this.setState(STATES.WAIT_CLICK_A1);
                } else {
                    this.setState(STATES.WAIT_C2);
                }
            }

            setMessage(text, bgClass, textClass) {
                this.el.messageBox.textContent = text;
                this.el.messageBox.className = `message-box ${bgClass} ${textClass} p-2 rounded-lg mb-4 text-center font-bold text-sm min-h-[3rem] flex items-center justify-center transition-colors`;
            }

            focusInput(inputEl) {
                inputEl.disabled = false;
                inputEl.focus();
                this.activeInput = inputEl;
            }

            setState(newState) {
                this.state = newState;
                const isHint = (this.mode === 'HINT');
                this.currentA1 = this.isBorrowing ? this.a1 - 1 : this.a1;
                this.currentA2 = this.isBorrowing ? this.a2 + 10 : this.a2;

                switch(this.state) {
                    case STATES.WAIT_CLICK_A1:
                        this.setMessage(isHint ? `個位數不夠減，請點擊十位數 [${this.a1}] 借位` : `請進行計算`, 
                                        isHint ? 'bg-yellow-100' : 'bg-gray-200', 
                                        isHint ? 'text-yellow-800' : 'text-gray-800');
                        this.el.valA1.classList.add('cursor-pointer');
                        if (isHint) this.el.valA1.classList.add('ring-4', 'ring-yellow-400', 'bg-yellow-50', 'rounded-lg', 'animate-pulse');
                        break;
                        
                    case STATES.WAIT_INPUT_A1:
                        this.setMessage(isHint ? `請在上方輸入：${this.a1} - 1 = ?` : `請輸入借位後的數字`, 'bg-blue-100', 'text-blue-800');
                        this.el.valA1.className = 'val-a1 cell transition-all duration-300 line-through text-gray-400';
                        this.el.borrowTens.classList.remove('hidden');
                        setTimeout(() => this.el.borrowTens.classList.remove('opacity-0'), 10);
                        this.focusInput(this.el.borrowTens);
                        break;

                    case STATES.WAIT_CLICK_A2:
                        this.setMessage(isHint ? `正確！請點擊個位數 [${this.a2}]` : `請進行計算`, 
                                        isHint ? 'bg-yellow-100' : 'bg-gray-200', 
                                        isHint ? 'text-yellow-800' : 'text-gray-800');
                        this.el.valA2.classList.add('cursor-pointer');
                        if (isHint) this.el.valA2.classList.add('ring-4', 'ring-yellow-400', 'bg-yellow-50', 'rounded-lg', 'animate-pulse');
                        break;

                    case STATES.WAIT_INPUT_A2:
                        this.setMessage(isHint ? `請在上方輸入：${this.a2} + 10 = ?` : `請輸入借位後的數字`, 'bg-blue-100', 'text-blue-800');
                        this.el.valA2.className = 'val-a2 cell transition-all duration-300 line-through text-gray-400';
                        this.el.borrowOnes.classList.remove('hidden');
                        setTimeout(() => this.el.borrowOnes.classList.remove('opacity-0'), 10);
                        this.focusInput(this.el.borrowOnes);
                        break;

                    case STATES.WAIT_C2:
                        this.setMessage(isHint ? `請計算：${this.currentA2} - ${this.b2} = ?` : `請輸入個位數答案`, 'bg-blue-100', 'text-blue-800');
                        this.focusInput(this.el.ansOnes);
                        break;

                    case STATES.WAIT_C1:
                        this.setMessage(isHint ? `請計算：${this.currentA1} - ${this.b1} = ?` : `請輸入十位數答案`, 'bg-blue-100', 'text-blue-800');
                        this.focusInput(this.el.ansTens);
                        break;

                    case STATES.DONE:
                        this.setMessage("🎉 完全正確！", 'bg-green-100', 'text-green-800');
                        this.activeInput = null;
                        if (this.onFinish) this.onFinish(this.id);
                        break;
                }
            }

            disableAll() {
                this.isDisabled = true;
                this.activeInput = null;
                this.setMessage("🛑 回合結束", 'bg-gray-300', 'text-gray-600');
                this.container.querySelector('div.bg-white').classList.add('opacity-75');
            }
        }

        // ---------- 全域遊戲管理 ----------
        const gameArena = document.getElementById('game-arena');
        const globalNextBtn = document.getElementById('global-next-btn');
        const winnerBanner = document.getElementById('winner-banner');
        let players = [];
        let currentMode = 'SOLO_HINT'; // 'SOLO_HINT', 'SOLO_NOHINT', 'VERSUS'

        // 綁定模式切換按鈕
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentMode = e.target.getAttribute('data-mode');
                initGame();
            });
        });

        // 下一題按鈕
        globalNextBtn.addEventListener('click', initGame);

        function handleWin(winnerId) {
            // 如果是雙人模式，鎖定另一位玩家
            if (currentMode === 'VERSUS') {
                players.forEach(p => {
                    if (p.id !== winnerId) p.disableAll();
                });
                winnerBanner.innerHTML = `🏆 玩家 ${winnerId} 速度最快，獲得勝利！`;
                winnerBanner.className = `text-2xl font-bold text-center mb-6 py-3 px-6 rounded-xl shadow-lg animate-bounce ${winnerId === 1 ? 'bg-blue-100 text-blue-800 border-2 border-blue-400' : 'bg-red-100 text-red-800 border-2 border-red-400'} w-full max-w-lg`;
            } else {
                winnerBanner.innerHTML = `🎉 恭喜你完成計算！`;
                winnerBanner.className = `text-2xl font-bold text-center mb-6 py-3 px-6 rounded-xl shadow-lg animate-bounce bg-green-100 text-green-800 border-2 border-green-400 w-full max-w-md`;
            }
            
            winnerBanner.classList.remove('hidden');
            globalNextBtn.classList.remove('hidden');
        }

        function initGame() {
            // 隨機生成題目 (確保 A > B，範圍 10~99)
            let A, B;
            // 設定 80% 的機率產生需要借位的題目 ([A2] < [B2])
            const wantBorrow = Math.random() < 0.8;
            
            do {
                A = Math.floor(Math.random() * 90) + 10;
                B = Math.floor(Math.random() * 90) + 10;
            } while (A <= B || (wantBorrow ? (A % 10 >= B % 10) : (A % 10 < B % 10)));

            // 重置 UI
            winnerBanner.classList.add('hidden');
            globalNextBtn.classList.add('hidden');
            gameArena.innerHTML = '';
            players = [];

            // 依據模式建立玩家面板
            if (currentMode === 'VERSUS') {
                const p1Container = document.createElement('div');
                const p2Container = document.createElement('div');
                p1Container.className = 'w-full flex justify-center';
                p2Container.className = 'w-full flex justify-center';
                gameArena.appendChild(p1Container);
                gameArena.appendChild(p2Container);

                // 雙人皆為無提示模式
                players.push(new PlayerBoard(p1Container, 1, '🔵 玩家 1', 'border-blue-500', 'NOHINT', handleWin));
                players.push(new PlayerBoard(p2Container, 2, '🔴 玩家 2', 'border-red-500', 'NOHINT', handleWin));
            } else {
                const p1Container = document.createElement('div');
                p1Container.className = 'w-full flex justify-center';
                gameArena.appendChild(p1Container);
                
                const modeParam = currentMode === 'SOLO_HINT' ? 'HINT' : 'NOHINT';
                const title = currentMode === 'SOLO_HINT' ? '一般練習模式' : '無提示挑戰模式';
                players.push(new PlayerBoard(p1Container, 1, title, 'border-indigo-500', modeParam, handleWin));
            }

            // 發送相同題目給所有玩家開始
            players.forEach(p => p.startRound(A, B));
        }

        // 初始化遊戲
        window.addEventListener('DOMContentLoaded', initGame);

    </script>
</body>
</html>
