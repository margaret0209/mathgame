<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>減法直式互動遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隱藏數字輸入框的上下箭頭 */
        input[type=text]::-webkit-inner-spin-button, 
        input[type=text]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        /* 自訂輸入框樣式，取消固定長寬，改由外層容器決定 */
        .math-input {
            font-line-height: 1;
            padding: 0;
            text-align: center;
            background-color: white;
            border: 2px solid #cbd5e1;
            border-radius: 0.5rem;
            outline: none;
            transition: all 0.3s ease;
            cursor: default;
        }
        .math-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
            background-color: #eff6ff;
        }
        .math-input:disabled {
            background-color: transparent;
            border-color: transparent;
            color: black;
            font-weight: bold;
        }
        /* 借位用的小輸入框 */
        .borrow-input {
            border-color: #fca5a5;
            background-color: white; /* 確保背景不透明遮蓋後方 */
            z-index: 10;
        }
        .borrow-input:focus {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.3);
        }
        .borrow-input:disabled {
            background-color: white; 
            border-color: transparent;
            color: #ef4444; 
            opacity: 1 !important; 
        }
        /* 消失動畫輔助 */
        .fade-out {
            opacity: 0 !important;
            transform: scale(0.8);
        }
        
        /* 模式選擇按鈕樣式 */
        .mode-btn.active {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="bg-blue-50 min-h-screen flex flex-col items-center py-6 font-sans">

    <!-- 頂部控制區 -->
    <div class="w-full max-w-4xl px-4 flex flex-col items-center mb-6">
        <h1 class="text-3xl md:text-4xl font-bold text-blue-800 mb-4">減法直式大挑戰</h1>
        
        <!-- 難度設定區 -->
        <div class="flex flex-wrap justify-center gap-4 bg-white p-3 md:p-4 rounded-xl shadow-md mb-4 w-full max-w-2xl items-center">
            <div class="flex items-center gap-2 bg-blue-50 px-3 py-2 rounded-lg border border-blue-200">
                <span class="font-bold text-gray-700">🔢 位數：</span>
                <select id="config-digits" class="bg-white border border-gray-300 rounded p-1 font-bold text-blue-800 outline-none cursor-pointer hover:border-blue-400">
                    <option value="2" selected>兩位數</option>
                    <option value="3">三位數</option>
                    <option value="4">四位數</option>
                    <option value="5">五位數</option>
                    <option value="6">六位數</option>
                </select>
            </div>
            <div class="flex items-center gap-2 bg-blue-50 px-3 py-2 rounded-lg border border-blue-200">
                <span class="font-bold text-gray-700">🔄 退位設定：</span>
                <select id="config-borrow" class="bg-white border border-gray-300 rounded p-1 font-bold text-blue-800 outline-none cursor-pointer hover:border-blue-400">
                    <option value="MIXED" selected>隨機 (含退位)</option>
                    <option value="NO_BORROW">完全不退位</option>
                </select>
            </div>
        </div>

        <!-- 模式切換 -->
        <div class="flex flex-wrap justify-center gap-2 md:gap-4 bg-white p-2 rounded-xl shadow-md mb-4">
            <button class="mode-btn active px-4 py-2 rounded-lg border-2 border-gray-200 font-bold transition-colors" data-mode="SOLO_HINT">
                📖 一般練習
            </button>
            <button class="mode-btn px-4 py-2 rounded-lg border-2 border-gray-200 font-bold transition-colors" data-mode="SOLO_NOHINT">
                🔥 無提示挑戰
            </button>
            <button class="mode-btn px-4 py-2 rounded-lg border-2 border-gray-200 font-bold transition-colors" data-mode="VERSUS">
                ⚔️ 雙人競賽
            </button>
        </div>

        <!-- 獲勝/完成提示橫幅 -->
        <div id="winner-banner" class="hidden text-2xl font-bold text-center py-2 px-6 rounded-lg shadow animate-bounce w-full max-w-md">
            <!-- 內容由 JS 填寫 -->
        </div>
    </div>

    <!-- 遊戲區域 -->
    <div id="game-arena" class="w-full max-w-[1200px] px-2 flex flex-col lg:flex-row gap-6 justify-center items-center lg:items-start">
        <!-- 面板容器由 JS 動態生成 -->
    </div>

    <!-- 全域控制按鈕 -->
    <div class="mt-8 h-16 pb-8">
        <button id="global-next-btn" class="hidden bg-green-500 hover:bg-green-600 text-white text-xl font-bold py-3 px-12 rounded-full shadow-lg transform transition hover:scale-105">
            下一題
        </button>
    </div>

    <script>
        // 玩家面板類別 (封裝單一遊戲面板的邏輯與 UI)
        class PlayerBoard {
            constructor(container, id, title, colorClass, mode, digitsCount, onFinishCallback) {
                this.container = container;
                this.id = id;
                this.mode = mode; // 'HINT' 或 'NOHINT'
                this.digitsCount = digitsCount;
                this.onFinish = onFinishCallback;
                this.activeInput = null;
                this.isDisabled = false;
                this.isLeadingZero = false;

                // 根據位數決定 UI 尺寸，確保五、六位數也能完美塞入畫面
                let cClass, iSize, bSize, gClass;
                switch(this.digitsCount) {
                    case 6:
                        cClass = 'w-7 h-7 sm:w-8 sm:h-8 text-xl sm:text-2xl';
                        iSize = 'text-xl sm:text-2xl';
                        bSize = 'w-5 h-5 sm:w-6 sm:h-6 text-[10px] sm:text-xs';
                        gClass = 'gap-x-0.5 sm:gap-x-1';
                        break;
                    case 5:
                        cClass = 'w-8 h-8 sm:w-10 sm:h-10 text-2xl sm:text-3xl';
                        iSize = 'text-2xl sm:text-3xl';
                        bSize = 'w-6 h-6 sm:w-7 sm:h-7 text-xs sm:text-sm';
                        gClass = 'gap-x-1 sm:gap-x-1';
                        break;
                    case 4:
                        cClass = 'w-10 h-10 sm:w-12 sm:h-12 text-3xl sm:text-4xl';
                        iSize = 'text-3xl sm:text-4xl';
                        bSize = 'w-7 h-7 sm:w-8 sm:h-8 text-xs sm:text-sm';
                        gClass = 'gap-x-1 sm:gap-x-2';
                        break;
                    case 3:
                        cClass = 'w-12 h-12 sm:w-14 sm:h-14 text-4xl sm:text-5xl';
                        iSize = 'text-4xl sm:text-5xl';
                        bSize = 'w-8 h-8 sm:w-10 sm:h-10 text-sm sm:text-base';
                        gClass = 'gap-x-2 sm:gap-x-4';
                        break;
                    case 2:
                    default:
                        cClass = 'w-14 h-14 sm:w-16 sm:h-16 text-5xl sm:text-6xl';
                        iSize = 'text-5xl sm:text-6xl';
                        bSize = 'w-10 h-10 sm:w-11 sm:h-11 text-lg sm:text-xl';
                        gClass = 'gap-x-2 sm:gap-x-4';
                        break;
                }
                
                this.cellClass = cClass;
                this.inputSize = iSize;
                this.borrowSize = bSize;
                this.gapClass = gClass;

                // 初始化 HTML
                this.container.innerHTML = this.getHTML(title, colorClass);
                
                // 綁定 DOM 元素
                this.el = {
                    messageBox: this.container.querySelector('.message-box'),
                    keypadBtns: this.container.querySelectorAll('.keypad-btn')
                };

                // 追蹤焦點
                const inputs = this.container.querySelectorAll('input[type="text"]');
                inputs.forEach(input => {
                    input.addEventListener('focus', () => {
                        if (!this.isDisabled) this.activeInput = input;
                    });
                });

                this.bindEvents();
            }

            getHTML(title, colorClass) {
                let cols = this.digitsCount + 1; // 加上減號欄位
                let gap = this.gapClass;

                // 動態生成網格結構
                return `
                    <div class="bg-white p-4 sm:p-5 rounded-3xl shadow-xl w-full max-w-[480px] border-t-8 ${colorClass} flex flex-col items-center">
                        <h2 class="text-xl font-bold mb-3 text-center text-gray-700">${title}</h2>
                        
                        <!-- 提示訊息區塊 -->
                        <div class="message-box bg-gray-100 text-gray-800 p-2 rounded-lg mb-4 text-center font-bold text-sm min-h-[3rem] w-full flex items-center justify-center transition-colors">
                            準備開始
                        </div>

                        <!-- 直式計算區塊 -->
                        <div class="flex justify-center mb-6 select-none w-full">
                            <div style="display: grid; grid-template-columns: repeat(${cols}, minmax(0, auto));" class="gap-y-1 ${gap} font-mono">
                                
                                <!-- 第一排：借位區 -->
                                <div class="${this.cellClass}"></div>
                                ${Array.from({length: this.digitsCount}, (_, i) => `
                                    <div class="${this.cellClass} relative flex justify-center">
                                        <input type="text" readonly data-type="BORROW" data-col="${i}" class="math-input borrow-input absolute bottom-0 hidden opacity-0 transition-opacity duration-300 ${this.borrowSize}" maxlength="2">
                                    </div>
                                `).join('')}

                                <!-- 第二排：被減數 A -->
                                <div class="${this.cellClass}"></div>
                                ${Array.from({length: this.digitsCount}, (_, i) => `
                                    <div data-type="A" data-col="${i}" class="${this.cellClass} flex items-center justify-center transition-all duration-300 font-bold text-gray-800"></div>
                                `).join('')}

                                <!-- 第三排：減數 B -->
                                <div class="${this.cellClass} flex items-center justify-center text-gray-500 font-bold">-</div>
                                ${Array.from({length: this.digitsCount}, (_, i) => `
                                    <div data-type="B" data-col="${i}" class="${this.cellClass} flex items-center justify-center font-bold text-gray-800"></div>
                                `).join('')}

                                <!-- 分隔線 -->
                                <div style="grid-column: span ${cols} / span ${cols};" class="border-t-4 border-gray-800 my-1 w-full"></div>

                                <!-- 第四排：答案 C -->
                                <div class="${this.cellClass}"></div>
                                ${Array.from({length: this.digitsCount}, (_, i) => `
                                    <div class="${this.cellClass} flex justify-center">
                                        <input type="text" readonly data-type="C" data-col="${i}" class="math-input transition-all duration-500 w-full h-full ${this.inputSize}" maxlength="1" disabled>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- 九宮格數字鍵盤 -->
                        <div class="grid grid-cols-3 gap-2 mt-auto px-4 pb-2 max-w-[220px] w-full mx-auto">
                            ${[1,2,3,4,5,6,7,8,9].map(n => `<button class="keypad-btn bg-gray-100 hover:bg-gray-200 text-gray-800 text-lg font-bold py-2 rounded-lg shadow transition active:scale-95 touch-manipulation">${n}</button>`).join('')}
                            <button class="keypad-btn bg-red-100 hover:bg-red-200 text-red-600 text-lg font-bold py-2 rounded-lg shadow transition active:scale-95 touch-manipulation">⌫</button>
                            <button class="keypad-btn bg-gray-100 hover:bg-gray-200 text-gray-800 text-lg font-bold py-2 rounded-lg shadow transition active:scale-95 touch-manipulation">0</button>
                            <div></div>
                        </div>
                    </div>
                `;
            }

            // 優化的多點觸控綁定事件
            bindTap(element, callback) {
                let touched = false;
                element.addEventListener('touchstart', (e) => {
                    touched = true;
                    e.preventDefault(); 
                    callback(e);
                    setTimeout(() => touched = false, 300);
                }, { passive: false });

                element.addEventListener('mousedown', (e) => {
                    if (touched) return;
                    e.preventDefault(); 
                    callback(e);
                });
            }

            getEl(type, idx) {
                return this.container.querySelector(`[data-type="${type}"][data-col="${idx}"]`);
            }

            bindEvents() {
                // 虛擬鍵盤點擊
                this.el.keypadBtns.forEach(btn => {
                    this.bindTap(btn, (e) => {
                        if (this.isDisabled || !this.activeInput || this.activeInput.disabled) return;
                        
                        const key = e.target.textContent;
                        if (key === '⌫') {
                            this.activeInput.value = this.activeInput.value.slice(0, -1);
                        } else if (!isNaN(key) && key.trim() !== '') {
                            const maxLen = parseInt(this.activeInput.getAttribute('maxlength') || 1);
                            if (this.activeInput.value.length < maxLen) {
                                this.activeInput.value += key;
                            }
                        }
                        this.activeInput.dispatchEvent(new Event('input'));
                        if (this.activeInput) this.activeInput.focus();
                    });
                });

                // A排數字點擊 (借位來源)
                for (let i = 0; i < this.digitsCount; i++) {
                    const el = this.getEl('A', i);
                    this.bindTap(el, () => {
                        if (this.isDisabled) return;
                        if (this.expectedEvent === 'CLICK' && this.currentTarget === el) {
                            this.actionIdx++;
                            this.doNextAction();
                        }
                    });
                }

                // 輸入框監聽 (包含借位與答案)
                const handleInput = (e) => {
                    if (this.isDisabled) return;
                    if (this.expectedEvent === 'INPUT' && this.currentTarget === e.target) {
                        const val = parseInt(e.target.value);
                        // 處理預期為 0 的字串比對
                        if (val === this.expectedValue || (this.expectedValue === 0 && e.target.value === '0')) {
                            e.target.disabled = true;
                            
                            // 最左側若是 0 則自動隱藏 (0自動消失特效)
                            if (this.isLeadingZero && e.target.dataset.type === 'C' && e.target.dataset.col === '0') {
                                setTimeout(() => {
                                    e.target.classList.add('fade-out');
                                    setTimeout(() => { e.target.value = ''; }, 300);
                                }, 500);
                            }
                            this.actionIdx++;
                            this.doNextAction();
                        }
                    }
                };

                for (let i = 0; i < this.digitsCount; i++) {
                    this.getEl('BORROW', i).addEventListener('input', handleInput);
                    this.getEl('C', i).addEventListener('input', handleInput);
                }
            }

            clearHighlights() {
                for(let i=0; i<this.digitsCount; i++) {
                    const el = this.getEl('A', i);
                    el.classList.remove('cursor-pointer', 'ring-4', 'ring-yellow-400', 'bg-yellow-50', 'rounded-lg', 'animate-pulse');
                }
            }

            resetUI() {
                this.isDisabled = false;
                this.activeInput = null;
                
                for (let i = 0; i < this.digitsCount; i++) {
                    const borrowEl = this.getEl('BORROW', i);
                    borrowEl.value = '';
                    borrowEl.disabled = true;
                    borrowEl.classList.add('hidden', 'opacity-0');
                    
                    const aEl = this.getEl('A', i);
                    aEl.className = `${this.cellClass} flex items-center justify-center transition-all duration-300 font-bold text-gray-800`;
                    aEl.textContent = this.digitsA[i];
                    
                    const bEl = this.getEl('B', i);
                    bEl.textContent = this.digitsB_display[i];

                    const cEl = this.getEl('C', i);
                    cEl.value = '';
                    cEl.disabled = true;
                    cEl.classList.remove('fade-out');
                }
                this.clearHighlights();
            }

            getDigitName(idx) {
                const names = ['個', '十', '百', '千', '萬', '十萬', '百萬'];
                return names[this.digitsCount - 1 - idx] + '位數';
            }

            startRound(A, B) {
                this.digitsA = A.toString().split('').map(Number);
                this.digitsB_logic = B.toString().padStart(this.digitsCount, '0').split('').map(Number);
                // 為了顯示美觀，減數若位數較少前方補空白
                this.digitsB_display = B.toString().padStart(this.digitsCount, ' ').split('');

                // 產生動作序列 (State Machine Queue) - 從右到左計算
                this.actions = [];
                let curA = [...this.digitsA];
                
                for (let i = this.digitsCount - 1; i >= 0; i--) {
                    if (curA[i] < this.digitsB_logic[i]) {
                        // 產生借位動作序列
                        let dName = this.getDigitName(i);
                        let dNameNext = this.getDigitName(i-1);

                        this.actions.push({ type: 'BORROW_CLICK_SRC', idx: i - 1, hint: `${dName}不夠減，請點擊${dNameNext} [${curA[i-1]}] 借位` });
                        curA[i-1] -= 1;
                        this.actions.push({ type: 'BORROW_INPUT_SRC', idx: i - 1, expect: curA[i-1], hint: `請輸入：${curA[i-1]+1} - 1 = ?` });
                        
                        this.actions.push({ type: 'BORROW_CLICK_DST', idx: i, hint: `正確！請點擊被借位的 [${curA[i]}]` });
                        curA[i] += 10;
                        this.actions.push({ type: 'BORROW_INPUT_DST', idx: i, expect: curA[i], hint: `請輸入：${curA[i]-10} + 10 = ?` });
                    }
                    this.actions.push({ type: 'ANSWER_INPUT', idx: i, expect: curA[i] - this.digitsB_logic[i], hint: `請計算：${curA[i]} - ${this.digitsB_logic[i]} = ?` });
                }

                this.resetUI();
                this.actionIdx = 0;
                this.doNextAction();
            }

            setMessage(text, bgClass, textClass) {
                this.el.messageBox.textContent = text;
                this.el.messageBox.className = `message-box ${bgClass} ${textClass} p-2 rounded-lg mb-4 text-center font-bold text-sm min-h-[3rem] w-full flex items-center justify-center transition-colors`;
            }

            focusInput(inputEl) {
                inputEl.disabled = false;
                inputEl.focus();
                this.activeInput = inputEl;
            }

            doNextAction() {
                if (this.actionIdx >= this.actions.length) {
                    this.setMessage("🎉 完全正確！", 'bg-green-100', 'text-green-800');
                    this.activeInput = null;
                    if (this.onFinish) this.onFinish(this.id);
                    return;
                }

                const action = this.actions[this.actionIdx];
                const isHint = (this.mode === 'HINT');
                this.clearHighlights();

                if (action.type === 'BORROW_CLICK_SRC' || action.type === 'BORROW_CLICK_DST') {
                    this.setMessage(isHint ? action.hint : `請進行計算`, isHint ? 'bg-yellow-100' : 'bg-gray-200', isHint ? 'text-yellow-800' : 'text-gray-800');
                    const el = this.getEl('A', action.idx);
                    el.classList.add('cursor-pointer');
                    if (isHint) el.classList.add('ring-4', 'ring-yellow-400', 'bg-yellow-50', 'rounded-lg', 'animate-pulse');
                    
                    this.currentTarget = el;
                    this.expectedEvent = 'CLICK';

                } else if (action.type === 'BORROW_INPUT_SRC' || action.type === 'BORROW_INPUT_DST') {
                    this.setMessage(isHint ? action.hint : `請輸入借位數字`, 'bg-blue-100', 'text-blue-800');
                    
                    // 被借位後畫刪除線
                    const aEl = this.getEl('A', action.idx);
                    aEl.classList.add('line-through', 'text-gray-400');
                    aEl.classList.remove('font-bold', 'text-gray-800');
                    
                    const el = this.getEl('BORROW', action.idx);
                    el.classList.remove('hidden');
                    setTimeout(() => el.classList.remove('opacity-0'), 10);
                    this.focusInput(el);
                    
                    this.currentTarget = el;
                    this.expectedEvent = 'INPUT';
                    this.expectedValue = action.expect;

                } else if (action.type === 'ANSWER_INPUT') {
                    this.setMessage(isHint ? action.hint : `請輸入答案`, 'bg-blue-100', 'text-blue-800');
                    const el = this.getEl('C', action.idx);
                    this.focusInput(el);
                    
                    this.currentTarget = el;
                    this.expectedEvent = 'INPUT';
                    this.expectedValue = action.expect;
                    
                    // 特殊處理：最高位數的答案若是0，啟動自動淡出特效
                    this.isLeadingZero = (action.idx === 0 && action.expect === 0);
                }
            }

            disableAll() {
                this.isDisabled = true;
                this.activeInput = null;
                this.setMessage("🛑 回合結束", 'bg-gray-300', 'text-gray-600');
                this.container.querySelector('div.bg-white').classList.add('opacity-75');
            }
        }

        // ---------- 全域遊戲管理 ----------
        const gameArena = document.getElementById('game-arena');
        const globalNextBtn = document.getElementById('global-next-btn');
        const winnerBanner = document.getElementById('winner-banner');
        let players = [];
        let currentMode = 'SOLO_HINT'; // 'SOLO_HINT', 'SOLO_NOHINT', 'VERSUS'

        // 綁定設定切換
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentMode = e.target.getAttribute('data-mode');
                initGame();
            });
        });
        
        document.getElementById('config-digits').addEventListener('change', initGame);
        document.getElementById('config-borrow').addEventListener('change', initGame);
        globalNextBtn.addEventListener('click', initGame);

        function handleWin(winnerId) {
            if (currentMode === 'VERSUS') {
                players.forEach(p => {
                    if (p.id !== winnerId) p.disableAll();
                });
                winnerBanner.innerHTML = `🏆 玩家 ${winnerId} 速度最快，獲得勝利！`;
                winnerBanner.className = `text-2xl font-bold text-center mb-6 py-3 px-6 rounded-xl shadow-lg animate-bounce ${winnerId === 1 ? 'bg-blue-100 text-blue-800 border-2 border-blue-400' : 'bg-red-100 text-red-800 border-2 border-red-400'} w-full max-w-lg`;
            } else {
                winnerBanner.innerHTML = `🎉 恭喜你完成計算！`;
                winnerBanner.className = `text-2xl font-bold text-center mb-6 py-3 px-6 rounded-xl shadow-lg animate-bounce bg-green-100 text-green-800 border-2 border-green-400 w-full max-w-md`;
            }
            
            winnerBanner.classList.remove('hidden');
            globalNextBtn.classList.remove('hidden');
        }

        function generateProblem(digits, allowBorrow) {
            let A, B;
            let valid = false;
            let maxA = Math.pow(10, digits) - 1;
            let minA = Math.pow(10, digits - 1); 
            const wantBorrow = allowBorrow ? (Math.random() < 0.8) : false; // 80% 機率強迫退位

            while(!valid) {
                A = Math.floor(Math.random() * (maxA - minA + 1)) + minA;
                B = Math.floor(Math.random() * (maxA - minA + 1)) + minA;
                
                if (A <= B) continue;
                
                let strA = A.toString();
                let strB = B.toString().padStart(digits, '0');
                let currentA = strA.split('').map(Number);
                let bArr = strB.split('').map(Number);
                let borrowCount = 0;
                let reject = false;
                
                // 由右至左檢測借位狀態
                for (let i = digits - 1; i >= 0; i--) {
                    if (currentA[i] < bArr[i]) {
                        if (!allowBorrow) { reject = true; break; }
                        borrowCount++;
                        // 為保持 UI 簡單，排除「連續借位」(例如 204 - 18) 出現中間數字是 0 的情況
                        if (i - 1 < 0 || currentA[i-1] === 0) { 
                            reject = true; 
                            break; 
                        }
                        currentA[i-1] -= 1;
                        currentA[i] += 10;
                    }
                }
                
                if (reject) continue;
                if (!allowBorrow && borrowCount === 0) valid = true;
                if (allowBorrow && wantBorrow && borrowCount > 0) valid = true;
                if (allowBorrow && !wantBorrow && borrowCount === 0) valid = true;
            }
            return { A, B };
        }

        function initGame() {
            // 讀取設定
            const digitsConfig = parseInt(document.getElementById('config-digits').value);
            const borrowConfig = document.getElementById('config-borrow').value;
            const allowBorrow = borrowConfig !== 'NO_BORROW';
            
            // 生成題目
            const { A, B } = generateProblem(digitsConfig, allowBorrow);

            // 重置 UI
            winnerBanner.classList.add('hidden');
            globalNextBtn.classList.add('hidden');
            gameArena.innerHTML = '';
            players = [];

            // 依據模式建立玩家面板
            if (currentMode === 'VERSUS') {
                const p1Container = document.createElement('div');
                const p2Container = document.createElement('div');
                p1Container.className = 'w-full flex justify-center';
                p2Container.className = 'w-full flex justify-center';
                gameArena.appendChild(p1Container);
                gameArena.appendChild(p2Container);

                players.push(new PlayerBoard(p1Container, 1, '🔵 玩家 1 (左)', 'border-blue-500', 'NOHINT', digitsConfig, handleWin));
                players.push(new PlayerBoard(p2Container, 2, '🔴 玩家 2 (右)', 'border-red-500', 'NOHINT', digitsConfig, handleWin));
            } else {
                const p1Container = document.createElement('div');
                p1Container.className = 'w-full flex justify-center';
                gameArena.appendChild(p1Container);
                
                const modeParam = currentMode === 'SOLO_HINT' ? 'HINT' : 'NOHINT';
                const title = currentMode === 'SOLO_HINT' ? '一般練習模式' : '無提示挑戰模式';
                players.push(new PlayerBoard(p1Container, 1, title, 'border-indigo-500', modeParam, digitsConfig, handleWin));
            }

            // 發送題目開始遊戲
            players.forEach(p => p.startRound(A, B));
        }

        // 初始化遊戲
        window.addEventListener('DOMContentLoaded', initGame);

    </script>
