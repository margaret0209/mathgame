<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>平面圖形遊戲</title>
    <!-- 引入 Tone.js 聲音庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Varela+Round&display=swap');

        :root {
            --bg-color: #F8F1F1;
            --panel-bg: #FFFFFF;
            --text-main: #5D5D5D;
            --macaron-pink: #FFB7B2;
            --macaron-orange: #FFDAC1;
            --macaron-green: #E2F0CB;
            --macaron-mint: #B5EAD7;
            --macaron-purple: #C7CEEA;
            --macaron-yellow: #FFF5BA;
            --shadow: 0 8px 24px rgba(200, 180, 180, 0.2);
            --btn-shadow: 0 4px 0px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Varela Round', 'Nunito', sans-serif;
            background-color: #D6C7C5; /* 外部邊框色 */
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 縮小高度的容器 */
        .app-container {
            width: 95vw;
            max-width: 1150px;
            height: 88vh;
            max-height: 660px;
            background-color: var(--bg-color);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 8px solid white;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            background: var(--panel-bg);
            box-shadow: var(--shadow);
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 26px;
            color: #FF9AA2;
            letter-spacing: 1px;
        }

        .level-tabs {
            display: flex;
            gap: 12px;
        }

        .tab-btn {
            background: #F0F0F0;
            border: none;
            padding: 8px 22px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            color: #AAA;
            transition: all 0.2s;
            box-shadow: var(--btn-shadow);
        }

        .tab-btn.active {
            background: var(--macaron-green);
            color: #5D5D5D;
            transform: translateY(-2px);
        }

        main {
            flex: 1;
            display: flex;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        /* 左區：較窄 */
        .canvas-section {
            flex: 4;
            background: var(--panel-bg);
            border-radius: 30px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        svg {
            width: 100%;
            height: 100%;
            max-width: 380px;
            max-height: 380px;
            overflow: visible;
        }

        /* 右區：較闊 */
        .controls-section {
            flex: 6;
            background: var(--panel-bg);
            border-radius: 30px;
            box-shadow: var(--shadow);
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .instruction {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            color: #FF9AA2;
            line-height: 1.4;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .answer-btn {
            border: none;
            padding: 18px 10px;
            font-weight: bold;
            border-radius: 24px;
            cursor: pointer;
            color: #5D5D5D;
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }

        .answer-btn:active {
            transform: translateY(6px);
        }

        .eng-sub {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .zh-main {
            font-size: 24px;
            font-weight: bold;
        }

        /* Level 2 UI */
        .level2-controls {
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .sentence {
            font-size: 24px;
            line-height: 1.6;
            text-align: center;
            background: #FFF9EB;
            padding: 18px;
            border-radius: 20px;
            border: 3px dashed var(--macaron-mint);
            margin-bottom: 5px;
        }

        .pill-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .pill {
            background: #F0F0F0;
            border: 2px solid transparent;
            padding: 8px 14px;
            font-size: 18px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .pill.selected {
            background: var(--macaron-purple);
            border-color: #A6AFCD;
            color: #333;
        }

        .submit-btn {
            background: var(--macaron-green);
            border: none;
            padding: 14px 35px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            color: #5D5D5D;
            box-shadow: 0 6px 0px #C9D9B2;
            align-self: center;
            margin-top: 10px;
        }
        
        .submit-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0px #C9D9B2;
        }

        .edge-text {
            font-size: 26px;
            font-weight: 900;
            fill: #FF6B6B;
            text-anchor: middle;
            dominant-baseline: central;
        }

        /* Feedback Modals */
        #feedback-overlay, #message-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255,255,255,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .feedback-box, .msg-content {
            background: white;
            padding: 40px 60px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            text-align: center;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .msg-btn {
            margin-top: 25px;
            background: var(--macaron-orange);
            border: none;
            padding: 12px 30px;
            font-size: 20px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>🎀 圖形世界</h1>
            <div class="level-tabs">
                <button class="tab-btn active" onclick="setLevel(1)">Level 1</button>
                <button class="tab-btn" onclick="setLevel(2)">Level 2</button>
                <button class="tab-btn" onclick="setLevel(3)">Level 3</button>
            </div>
        </header>

        <main>
            <div class="canvas-section">
                <svg id="game-svg" viewBox="0 0 400 400"></svg>
            </div>

            <div class="controls-section">
                <div class="instruction" id="instruction-text">請選擇正確的圖形名稱：</div>
                
                <div class="btn-grid" id="btn-grid"></div>

                <div class="level2-controls" id="level2-controls">
                    <div class="sentence">
                        這個閉合圖形有 <span id="ans-sides" style="color:#FF9AA2; font-weight:bold;">[ ? ]</span> 條邊，<br>
                        是 <span id="ans-name" style="color:#B5EAD7; font-weight:bold;">[ ? ]</span>。
                    </div>
                    
                    <div style="font-weight:bold; color:#888; text-align:center; font-size:14px; margin-bottom:5px;">選擇邊數：</div>
                    <div class="pill-group" id="pill-group-sides"></div>

                    <div style="font-weight:bold; color:#888; text-align:center; font-size:14px; margin-top:10px; margin-bottom:5px;">選擇形狀：</div>
                    <div class="pill-group" id="pill-group-names"></div>

                    <button class="submit-btn" onclick="checkLevel2Answer()">確定送出</button>
                </div>
            </div>
        </main>
    </div>

    <div id="feedback-overlay">
        <div class="feedback-box">
            <div id="feedback-icon" style="font-size:80px; margin-bottom:20px;">🎉</div>
            <div id="feedback-title" style="font-size:32px; font-weight:bold;">答對了！</div>
        </div>
    </div>

    <div id="message-overlay">
        <div class="msg-content" style="background:var(--macaron-yellow); border:4px solid var(--macaron-orange);">
            <div id="msg-text" style="font-size:26px; font-weight:bold;">請完成題目喔！</div>
            <button class="msg-btn" onclick="closeMsg()">知道囉</button>
        </div>
    </div>

    <script>
        // --- 強化的聲音系統 (Enhanced Audio) ---
        let audioContextStarted = false;
        let popSynth, winSynth, loseSynth;

        async function initAudio() {
            if (audioContextStarted) return;
            await Tone.start();
            
            // 點擊音效：清脆的彈跳感
            popSynth = new Tone.MembraneSynth({
                pitchDecay: 0.02,
                octaves: 2,
                oscillator: { type: "sine" },
                envelope: { attack: 0.001, decay: 0.2, sustain: 0 }
            }).toDestination();
            popSynth.volume.value = -6;

            // 成功音效：明亮的琶音
            winSynth = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "triangle" },
                envelope: { attack: 0.02, decay: 0.1, sustain: 0.3, release: 0.8 }
            }).toDestination();
            winSynth.volume.value = -4;

            // 失敗音效：低沉滑落感
            loseSynth = new Tone.MonoSynth({
                oscillator: { type: "sawtooth" },
                envelope: { attack: 0.1, decay: 0.3, sustain: 0.1, release: 0.5 },
                filterEnvelope: { attack: 0.01, decay: 0.2, sustain: 0.1, baseFrequency: 200, octaves: 2 }
            }).toDestination();
            loseSynth.volume.value = -5;

            audioContextStarted = true;
        }

        function playPop() {
            if (audioContextStarted) popSynth.triggerAttackRelease("G5", "32n");
        }

        function playWin() {
            if (!audioContextStarted) return;
            const now = Tone.now();
            // C大調琶音 C5-E5-G5-C6
            winSynth.triggerAttackRelease("C5", "16n", now);
            winSynth.triggerAttackRelease("E5", "16n", now + 0.1);
            winSynth.triggerAttackRelease("G5", "16n", now + 0.2);
            winSynth.triggerAttackRelease("C6", "4n", now + 0.3);
        }

        function playLose() {
            if (!audioContextStarted) return;
            const now = Tone.now();
            // 下行滑動音
            loseSynth.triggerAttackRelease("A2", "8n", now);
            loseSynth.frequency.rampTo("G2", 0.2, now + 0.05);
        }

        // 監聽第一次點擊以啟動音頻
        document.body.addEventListener('pointerdown', initAudio, { once: true });

        // --- 遊戲邏輯 ---
        let currentLevel = 1;
        let currentShapeData = {};
        let level2ClickedEdges = [];
        
        const colors = ['#FFB7B2', '#FFDAC1', '#E2F0CB', '#B5EAD7', '#C7CEEA', '#FFF5BA'];
        const shadowColors = ['#E5A5A0', '#E5C4AE', '#CBD8B6', '#A3D2C1', '#B3B9D2', '#E5DCA7'];

        const level1Shapes = ['圓形', '三角形', '正方形', '長方形'];
        const level2Names = {
            3: '三角形', 4: '四邊形', 5: '五邊形', 6: '六邊形', 7: '七邊形', 8: '八邊形', 9: '九邊形', 10: '十邊形'
        };
        const level3Shapes = ['正方形', '長方形', '平行四邊形', '菱形', '梯形', '鷂形'];

        const translations = {
            '圓形': 'Circle', '三角形': 'Triangle', '正方形': 'Square', '長方形': 'Rectangle',
            '平行四邊形': 'Parallelogram', '菱形': 'Rhombus', '梯形': 'Trapezoid', '鷂形': 'Kite',
            '四邊形': 'Quadrilateral', '五邊形': 'Pentagon', '六邊形': 'Hexagon', '七邊形': 'Heptagon',
            '八邊形': 'Octagon', '九邊形': 'Nonagon', '十邊形': 'Decagon'
        };

        const svg = document.getElementById('game-svg');
        const instructionText = document.getElementById('instruction-text');
        const btnGrid = document.getElementById('btn-grid');
        const level2Controls = document.getElementById('level2-controls');
        const ansSidesSpan = document.getElementById('ans-sides');
        const ansNameSpan = document.getElementById('ans-name');
        
        window.onload = () => setLevel(1);

        function setLevel(level) {
            playPop();
            currentLevel = level;
            document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx + 1 === level);
            });

            if (level === 2) {
                btnGrid.style.display = 'none';
                level2Controls.style.display = 'flex';
                instructionText.innerHTML = '先點擊邊數一數，<br>再選出正確答案！';
                setupLevel2Pills();
            } else {
                btnGrid.style.display = 'grid';
                level2Controls.style.display = 'none';
                instructionText.textContent = level === 1 ? '這是什麼圖形？' : '這是哪一種四邊形？';
                setupLevelButtons();
            }
            nextQuestion();
        }

        function nextQuestion() {
            svg.innerHTML = '';
            level2ClickedEdges = [];
            resetLevel2Answers();
            
            let colorIdx = Math.floor(Math.random() * colors.length);
            if (currentLevel === 1) generateLevel1Shape(colors[colorIdx], shadowColors[colorIdx]);
            else if (currentLevel === 2) generateLevel2Shape(colors[colorIdx]);
            else generateLevel3Shape(colors[colorIdx], shadowColors[colorIdx]);
        }

        function generateLevel1Shape(color, shadow) {
            let shape = level1Shapes[Math.floor(Math.random() * level1Shapes.length)];
            currentShapeData = { name: shape };
            drawShapeWithShadow(shape, color, shadow);
        }

        function generateLevel2Shape(color) {
            let sides = Math.floor(Math.random() * 8) + 3;
            currentShapeData = { sides: sides, name: level2Names[sides] };
            let cx = 200, cy = 200, r = 130;
            let vertices = [];
            let start = Math.random() * Math.PI;
            for (let i = 0; i < sides; i++) {
                let angle = start + (i * 2 * Math.PI / sides);
                vertices.push({ x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) });
            }
            let polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            polygon.setAttribute("points", vertices.map(v => `${v.x},${v.y}`).join(' '));
            polygon.setAttribute("fill", color);
            svg.appendChild(polygon);

            vertices.forEach((p1, i) => {
                let p2 = vertices[(i + 1) % sides];
                let lineBg = document.createElementNS("http://www.w3.org/2000/svg", "line");
                lineBg.setAttribute("x1", p1.x); lineBg.setAttribute("y1", p1.y);
                lineBg.setAttribute("x2", p2.x); lineBg.setAttribute("y2", p2.y);
                lineBg.setAttribute("stroke", "white"); lineBg.setAttribute("stroke-width", "6");
                lineBg.setAttribute("id", `edge-bg-${i}`);
                svg.appendChild(lineBg);

                let lineHit = document.createElementNS("http://www.w3.org/2000/svg", "line");
                lineHit.setAttribute("x1", p1.x); lineHit.setAttribute("y1", p1.y);
                lineHit.setAttribute("x2", p2.x); lineHit.setAttribute("y2", p2.y);
                lineHit.setAttribute("stroke", "transparent"); lineHit.setAttribute("stroke-width", "40");
                lineHit.classList.add("clickable-edge");
                lineHit.onclick = () => {
                    if (level2ClickedEdges.includes(i)) return;
                    playPop();
                    level2ClickedEdges.push(i);
                    document.getElementById(`edge-bg-${i}`).setAttribute('stroke', '#FF6B6B');
                    let mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
                    let dx = mx - cx, dy = my - cy, dist = Math.sqrt(dx*dx + dy*dy);
                    let text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", mx + (dx/dist)*25); text.setAttribute("y", my + (dy/dist)*25);
                    text.setAttribute("class", "edge-text");
                    text.textContent = level2ClickedEdges.length;
                    svg.appendChild(text);
                };
                svg.appendChild(lineHit);
            });
        }

        function generateLevel3Shape(color, shadow) {
            let shape = level3Shapes[Math.floor(Math.random() * level3Shapes.length)];
            currentShapeData = { name: shape };
            drawShapeWithShadow(shape, color, shadow);
        }

        function drawShapeWithShadow(shape, color, shadow) {
            let gS = document.createElementNS("http://www.w3.org/2000/svg", "g");
            gS.setAttribute("transform", "translate(10, 15)");
            let gM = document.createElementNS("http://www.w3.org/2000/svg", "g");
            let path = "";
            if (shape === '圓形') {
                gS.innerHTML = `<circle cx="200" cy="200" r="115" fill="${shadow}"/>`;
                gM.innerHTML = `<circle cx="200" cy="200" r="115" fill="${color}"/>`;
            } else {
                switch(shape) {
                    case '三角形': path = "M200 60 L330 280 L70 280 Z"; break;
                    case '正方形': path = "M90 90 L310 90 L310 310 L90 310 Z"; break;
                    case '長方形': path = "M50 130 L350 130 L350 270 L50 270 Z"; break;
                    case '平行四邊形': path = "M110 120 L350 120 L290 280 L50 280 Z"; break;
                    case '菱形': path = "M200 60 L330 200 L200 340 L70 200 Z"; break;
                    case '梯形': path = "M130 110 L270 110 L350 290 L50 290 Z"; break;
                    case '鷂形': path = "M200 60 L290 160 L200 340 L110 160 Z"; break;
                }
                gS.innerHTML = `<path d="${path}" fill="${shadow}" stroke="${shadow}" stroke-width="8" stroke-linejoin="round"/>`;
                gM.innerHTML = `<path d="${path}" fill="${color}" stroke="${color}" stroke-width="8" stroke-linejoin="round"/>`;
            }
            svg.appendChild(gS); svg.appendChild(gM);
        }

        function setupLevelButtons() {
            btnGrid.innerHTML = '';
            let options = currentLevel === 1 ? level1Shapes : level3Shapes;
            options.forEach(shape => {
                let btn = document.createElement('button');
                btn.className = 'answer-btn';
                let colIdx = Math.floor(Math.random() * colors.length);
                btn.style.backgroundColor = colors[colIdx];
                btn.style.boxShadow = `0 6px 0px ${shadowColors[colIdx]}`;
                btn.innerHTML = `<span class="eng-sub">${translations[shape]}</span><span class="zh-main">${shape}</span>`;
                btn.onclick = () => shape === currentShapeData.name ? showFeedback(true) : showFeedback(false);
                btnGrid.appendChild(btn);
            });
        }

        function setupLevel2Pills() {
            const gs = document.getElementById('pill-group-sides');
            const gn = document.getElementById('pill-group-names');
            gs.innerHTML = ''; gn.innerHTML = '';
            for(let i=3; i<=10; i++) {
                let p = document.createElement('div'); p.className = 'pill';
                p.innerHTML = `<span style="font-size:8px; opacity:0.5;">SIDES</span><span>${i}</span>`;
                p.onclick = () => { playPop(); l2S=i; ansSidesSpan.textContent=i; updatePillSelect(gs, p); };
                gs.appendChild(p);
            }
            Object.values(level2Names).forEach(n => {
                let p = document.createElement('div'); p.className = 'pill';
                p.innerHTML = `<span class="pill-eng-sub" style="font-size:9px; opacity:0.6;">${translations[n]}</span><span>${n}</span>`;
                p.onclick = () => { playPop(); l2N=n; ansNameSpan.textContent=n; updatePillSelect(gn, p); };
                gn.appendChild(p);
            });
        }

        let l2S=null, l2N=null;
        function updatePillSelect(g, p) { Array.from(g.children).forEach(c => c.classList.remove('selected')); p.classList.add('selected'); }
        function resetLevel2Answers() { l2S=null; l2N=null; ansSidesSpan.textContent='[ ? ]'; ansNameSpan.textContent='[ ? ]'; }

        function checkLevel2Answer() {
            if (!l2S || !l2N) { playLose(); document.getElementById('message-overlay').style.display='flex'; return; }
            (l2S === currentShapeData.sides && l2N === currentShapeData.name) ? showFeedback(true) : showFeedback(false);
        }

        function showFeedback(correct) {
            const o = document.getElementById('feedback-overlay');
            o.style.display = 'flex';
            if (correct) {
                playWin();
                document.getElementById('feedback-icon').textContent = '🎉';
                document.getElementById('feedback-title').textContent = '答對了！';
                setTimeout(() => { o.style.display='none'; nextQuestion(); }, 1500);
            } else {
                playLose();
                document.getElementById('feedback-icon').textContent = '🤔';
                document.getElementById('feedback-title').textContent = '再試一次！';
                setTimeout(() => o.style.display='none', 1500);
            }
        }
        function closeMsg() { playPop(); document.getElementById('message-overlay').style.display='none'; }
    </script>
</body>
</html>
