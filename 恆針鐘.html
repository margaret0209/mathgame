<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恆針鐘互動遊戲</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body {
            font-family: 'Nunito', 'Microsoft JhengHei', sans-serif;
            background-color: #f0fdfa; /* Tailwind teal-50 */
            touch-action: manipulation; /* Disable double-tap to zoom for better game feel */
        }
        .clock-shadow {
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1));
        }
        .pulse-text {
            animation: pulse-color 2s infinite;
        }
        @keyframes pulse-color {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- Web Audio API 簡易音效系統 ---
        let audioCtx = null;
        const initAudio = () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        };

        const playTone = (frequency, type, duration, vol=0.1) => {
            try {
                initAudio();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch (e) {
                console.log("Audio play failed", e);
            }
        };

        const sounds = {
            click: () => playTone(600, 'sine', 0.1, 0.05),
            pop: () => playTone(800, 'sine', 0.15, 0.1),
            success: () => {
                playTone(523.25, 'sine', 0.15, 0.1); // C5
                setTimeout(() => playTone(659.25, 'sine', 0.15, 0.1), 100); // E5
                setTimeout(() => playTone(783.99, 'sine', 0.3, 0.1), 200); // G5
                setTimeout(() => playTone(1046.50, 'sine', 0.5, 0.1), 300); // C6
            },
            error: () => {
                playTone(200, 'sawtooth', 0.2, 0.1);
                setTimeout(() => playTone(150, 'sawtooth', 0.3, 0.1), 150);
            }
        };

        const { useState, useEffect, useCallback } = React;

        const TabButton = ({ active, onClick, children, theme }) => {
            const themes = {
                blue: active ? "bg-blue-500 text-white border-blue-600 shadow-inner" : "bg-white text-blue-500 border-blue-200 hover:bg-blue-50",
                green: active ? "bg-emerald-500 text-white border-emerald-600 shadow-inner" : "bg-white text-emerald-500 border-emerald-200 hover:bg-emerald-50",
                yellow: active ? "bg-amber-400 text-amber-900 border-amber-500 shadow-inner" : "bg-white text-amber-600 border-amber-200 hover:bg-amber-50"
            };
            return (
                <button 
                    onClick={onClick} 
                    className={`px-4 py-2 md:px-6 md:py-3 rounded-2xl font-bold border-b-4 transition-all active:border-b-0 active:translate-y-1 ${themes[theme]}`}
                >
                    {children}
                </button>
            );
        };

        const App = () => {
            // State
            const [mode, setMode] = useState('oclock'); // 'oclock', 'halfpast', 'hourmin', 'findhour', 'findminute'
            const [qType, setQType] = useState('select'); // 'select', 'click'
            const [hint, setHint] = useState(false);
            
            const [time, setTime] = useState({ h: 12, m: 0 });
            const [options, setOptions] = useState({ h: [], m: [] });
            const [answered, setAnswered] = useState({ h: null, m: null });
            const [wrongAnswers, setWrongAnswers] = useState({ h: [], m: [] });
            
            const [success, setSuccess] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');

            // Generate a new random question based on current mode
            const generateQuestion = useCallback(() => {
                let newH = Math.floor(Math.random() * 12) + 1;
                let newM = 0;
                
                if (mode === 'halfpast') {
                    newM = 30;
                } else if (mode === 'hourmin' || mode === 'findhour' || mode === 'findminute') {
                    const mOptions = [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55];
                    if (mode === 'hourmin') mOptions.shift(); // Remove 0 for hourmin
                    newM = mOptions[Math.floor(Math.random() * mOptions.length)];
                }

                setTime({ h: newH, m: newM });
                setAnswered({ h: null, m: null });
                setWrongAnswers({ h: [], m: [] });
                setSuccess(false);
                setErrorMsg('');

                if (qType === 'select') {
                    // Generate 3 unique hour options including correct answer
                    const hOpts = [newH];
                    while (hOpts.length < 3) {
                        let rnd = Math.floor(Math.random() * 12) + 1;
                        if (!hOpts.includes(rnd)) hOpts.push(rnd);
                    }
                    
                    // Generate 3 unique minute options including correct answer
                    const mOpts = [newM];
                    while (mOpts.length < 3) {
                        let rnd = Math.floor(Math.random() * 12) * 5; 
                        if (!mOpts.includes(rnd)) mOpts.push(rnd);
                    }
                    
                    setOptions({
                        h: hOpts.sort(() => Math.random() - 0.5),
                        m: mOpts.sort(() => Math.random() - 0.5)
                    });
                }
            }, [mode, qType]);

            // Trigger generation on mount and mode/qType changes
            useEffect(() => {
                generateQuestion();
            }, [generateQuestion]);

            const handleWin = useCallback(() => {
                sounds.success();
                setSuccess(true);
            }, []);

            // Win condition check for Select and Click Modes
            useEffect(() => {
                if (!success) {
                    if (mode === 'oclock' || mode === 'halfpast') {
                        if (answered.h === time.h) handleWin();
                    } else if (mode === 'hourmin') {
                        if (answered.h === time.h && answered.m === time.m) handleWin();
                    }
                }
            }, [answered, time, mode, success, handleWin]);

            const showTempError = () => {
                setErrorMsg('哎呀，不對喔！再試試看！');
                setTimeout(() => setErrorMsg(''), 1500);
            };

            // Handle clicking the hands in 'Find' modes
            const handleHandClick = (handType) => {
                if (success) return;
                if (mode === 'findhour') {
                    if (handType === 'hour') handleWin();
                    else { sounds.error(); showTempError(); }
                } else if (mode === 'findminute') {
                    if (handType === 'minute') handleWin();
                    else { sounds.error(); showTempError(); }
                }
            };

            // Handle option click in 'Select' mode
            const handleSelect = (type, val) => {
                if (success) return;
                if (type === 'h') {
                    if (val === time.h) {
                        if (mode === 'hourmin' && answered.m !== time.m) sounds.pop(); // 中途答對時的音效
                        setAnswered(prev => ({ ...prev, h: val }));
                    } else {
                        sounds.error();
                        setWrongAnswers(prev => ({ ...prev, h: [...prev.h, val] }));
                        showTempError();
                    }
                } else if (type === 'm') {
                    if (val === time.m) {
                        if (mode === 'hourmin' && answered.h !== time.h) sounds.pop(); // 中途答對時的音效
                        setAnswered(prev => ({ ...prev, m: val }));
                    } else {
                        sounds.error();
                        setWrongAnswers(prev => ({ ...prev, m: [...prev.m, val] }));
                        showTempError();
                    }
                }
            };

            // Handle clicking numbers on the clock face in 'Click' mode
            const handleClockClick = (num) => {
                if (qType !== 'click' || success || ['findhour', 'findminute'].includes(mode)) return;

                if (mode === 'oclock' || mode === 'halfpast') {
                    if (answered.h !== null) return;
                    if (num === time.h) {
                        setAnswered({ h: num, m: time.m });
                    } else {
                        sounds.error();
                        showTempError();
                    }
                } else if (mode === 'hourmin') {
                    if (answered.h === null) {
                        // Expecting Hour click
                        if (num === time.h) {
                            sounds.pop(); // 中途答對時的音效
                            setAnswered(prev => ({ ...prev, h: num }));
                        } else {
                            sounds.error();
                            showTempError();
                        }
                    } else if (answered.m === null) {
                        // Expecting Minute click
                        let expectedMinNum = time.m === 0 ? 12 : time.m / 5;
                        if (num === expectedMinNum) {
                            setAnswered(prev => ({ ...prev, m: time.m }));
                        } else {
                            sounds.error();
                            showTempError();
                        }
                    }
                }
            };

            // Render Select Button Group
            const renderSelectButtons = (type) => {
                const opts = type === 'h' ? options.h : options.m;
                const ans = type === 'h' ? answered.h : answered.m;
                const wrongs = type === 'h' ? wrongAnswers.h : wrongAnswers.m;
                const isH = type === 'h';
                
                // If it's minute, and hour is not yet answered, disable minutes
                const isDisabled = (type === 'm' && answered.h === null);

                return (
                    <span className={`inline-flex gap-2 mx-2 align-middle ${isDisabled ? 'opacity-40 pointer-events-none' : ''}`}>
                        {opts.map((opt, i) => {
                            const isCorrect = ans === opt;
                            const isWrong = wrongs.includes(opt);
                            
                            let btnClass = "bg-white text-gray-700 border-gray-300 hover:bg-gray-100";
                            if (isCorrect) btnClass = "bg-green-500 text-white border-green-600 scale-105 transform";
                            else if (isWrong) btnClass = "bg-red-500 text-white border-red-600 opacity-50 cursor-not-allowed";
                            else if (hint) btnClass = isH ? "bg-red-50 text-red-600 border-red-300 hover:bg-red-100" : "bg-blue-50 text-blue-600 border-blue-300 hover:bg-blue-100";

                            return (
                                <button 
                                    key={`${type}-${opt}-${i}`}
                                    onClick={() => handleSelect(type, opt)}
                                    disabled={ans !== null || isWrong}
                                    className={`px-3 py-2 md:px-5 md:py-3 rounded-xl font-bold border-b-4 active:border-b-0 active:translate-y-1 transition-all text-xl md:text-2xl ${btnClass}`}
                                >
                                    {opt}
                                </button>
                            );
                        })}
                    </span>
                );
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 min-h-screen flex flex-col items-center">
                    
                    {/* Header & Controls */}
                    <div className="w-full bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-teal-100 mb-8 flex flex-col items-center gap-6">
                        <h1 className="text-3xl font-black text-teal-800 tracking-wide">⏰ 恆針鐘互動遊戲</h1>
                        
                        <div className="flex flex-wrap justify-center gap-6 w-full">
                            <div className="flex flex-col items-center gap-2">
                                <span className="text-sm font-bold text-gray-500">模式選擇</span>
                                <div className="flex gap-2 bg-gray-50 p-1.5 rounded-full border border-gray-200 flex-wrap justify-center">
                                    <TabButton theme="blue" active={mode === 'oclock'} onClick={() => { sounds.click(); setMode('oclock'); }}>時正</TabButton>
                                    <TabButton theme="blue" active={mode === 'halfpast'} onClick={() => { sounds.click(); setMode('halfpast'); }}>時半</TabButton>
                                    <TabButton theme="blue" active={mode === 'hourmin'} onClick={() => { sounds.click(); setMode('hourmin'); }}>時與分</TabButton>
                                    <TabButton theme="blue" active={mode === 'findhour'} onClick={() => { sounds.click(); setMode('findhour'); }}>找時針</TabButton>
                                    <TabButton theme="blue" active={mode === 'findminute'} onClick={() => { sounds.click(); setMode('findminute'); }}>找分針</TabButton>
                                </div>
                            </div>
                            
                            {!['findhour', 'findminute'].includes(mode) && (
                                <div className="flex flex-col items-center gap-2">
                                    <span className="text-sm font-bold text-gray-500">問題種類</span>
                                    <div className="flex gap-2 bg-gray-50 p-1.5 rounded-full border border-gray-200">
                                        <TabButton theme="green" active={qType === 'select'} onClick={() => { sounds.click(); setQType('select'); }}>選出時間</TabButton>
                                        <TabButton theme="green" active={qType === 'click'} onClick={() => { sounds.click(); setQType('click'); }}>點擊時鐘</TabButton>
                                    </div>
                                </div>
                            )}

                            <div className="flex flex-col items-center gap-2 justify-end pb-1.5">
                                <button 
                                    onClick={() => { sounds.click(); setHint(!hint); }} 
                                    className={`px-5 py-3 rounded-2xl font-bold flex items-center gap-2 transition-all border-b-4 active:border-b-0 active:translate-y-1 ${hint ? 'bg-amber-400 text-amber-900 border-amber-500 shadow-inner' : 'bg-white text-amber-500 border-amber-200 hover:bg-amber-50'}`}
                                >
                                    💡 提示 {hint ? 'ON' : 'OFF'}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Game Area */}
                    <div className="w-full max-w-3xl flex flex-col md:flex-row items-center justify-center gap-8 md:gap-12 relative">
                        
                        {/* Clock SVG */}
                        <div className="relative w-full max-w-[340px] aspect-square select-none">
                            <svg viewBox="0 0 340 340" className="w-full h-full clock-shadow overflow-visible">
                                {/* Outer Ring */}
                                <circle cx="170" cy="170" r="140" fill="#ffffff" stroke={success ? "#10b981" : "#cbd5e1"} strokeWidth="12" className="transition-colors duration-500" />
                                <circle cx="170" cy="170" r="134" fill="none" stroke="#f8fafc" strokeWidth="4" />
                                
                                {/* Ticks */}
                                {Array.from({length: 60}).map((_, i) => {
                                    const angle = (i * 6 - 90) * (Math.PI / 180);
                                    const isHour = i % 5 === 0;
                                    return (
                                        <line 
                                            key={`tick-${i}`} 
                                            x1={170 + (isHour ? 120 : 128) * Math.cos(angle)} 
                                            y1={170 + (isHour ? 120 : 128) * Math.sin(angle)} 
                                            x2={170 + 134 * Math.cos(angle)} 
                                            y2={170 + 134 * Math.sin(angle)} 
                                            stroke={isHour ? "#475569" : "#94a3b8"} 
                                            strokeWidth={isHour ? 4 : 2} 
                                        />
                                    )
                                })}

                                {/* Numbers and Hitboxes */}
                                {Array.from({length: 12}).map((_, i) => {
                                    const num = i + 1;
                                    const angle = (num * 30 - 90) * (Math.PI / 180);
                                    const x = 170 + 98 * Math.cos(angle);
                                    const y = 170 + 98 * Math.sin(angle);
                                    
                                    // Hitbox position slightly outwards
                                    const hitX = 170 + 115 * Math.cos(angle);
                                    const hitY = 170 + 115 * Math.sin(angle);

                                    // Pulse correct target if in click mode
                                    const isClickable = qType === 'click' && !['findhour', 'findminute'].includes(mode);
                                    
                                    // Check if this number is the clicked hour or minute
                                    const isHourClicked = qType === 'click' && answered.h === num;
                                    const isMinuteClicked = qType === 'click' && mode === 'hourmin' && answered.m !== null && num === (time.m === 0 ? 12 : time.m / 5);

                                    return (
                                        <g 
                                            key={num} 
                                            onClick={() => handleClockClick(num)} 
                                            className={`${isClickable ? 'cursor-pointer' : ''}`}
                                        >
                                            {/* Answer Rings for Click Mode */}
                                            {isHourClicked && (
                                                <circle cx={x} cy={y} r="20" fill="transparent" stroke="#EF4444" strokeWidth="4" className="animate-in zoom-in duration-300" style={{ pointerEvents: 'none' }} />
                                            )}
                                            {isMinuteClicked && (
                                                <circle cx={x} cy={y} r={isHourClicked ? "26" : "20"} fill="transparent" stroke="#3B82F6" strokeWidth="4" className="animate-in zoom-in duration-300" style={{ pointerEvents: 'none' }} />
                                            )}

                                            <text 
                                                x={x} y={y} 
                                                textAnchor="middle" dominantBaseline="central" 
                                                className="text-3xl font-black fill-slate-800" 
                                                style={{ pointerEvents: 'none' }}
                                            >
                                                {num}
                                            </text>
                                            
                                            {/* Hitbox */}
                                            {isClickable && (
                                                <circle 
                                                    cx={hitX} cy={hitY} r="30" 
                                                    fill="transparent" 
                                                />
                                            )}

                                            {/* Hint Minute Numbers outside the clock */}
                                            {hint && (
                                                <text 
                                                    x={170 + 158 * Math.cos(angle)} y={170 + 158 * Math.sin(angle)} 
                                                    textAnchor="middle" dominantBaseline="central" 
                                                    className="text-sm font-black fill-blue-500 opacity-90 pulse-text" 
                                                    style={{ pointerEvents: 'none' }}
                                                >
                                                    {num === 12 ? 0 : num * 5}
                                                </text>
                                            )}
                                        </g>
                                    );
                                })}

                                {/* Hour Hand */}
                                <g 
                                    onClick={(e) => { if(['findhour', 'findminute'].includes(mode) && !success) { e.stopPropagation(); handleHandClick('hour'); } }}
                                    className={['findhour', 'findminute'].includes(mode) && !success ? 'cursor-pointer group' : ''}
                                    style={{ pointerEvents: ['findhour', 'findminute'].includes(mode) && !success ? 'auto' : 'none' }}
                                >
                                    <line 
                                        x1="170" y1="170" 
                                        x2={170 + 65 * Math.cos(((time.h % 12 + time.m / 60) * 30 - 90) * Math.PI / 180)} 
                                        y2={170 + 65 * Math.sin(((time.h % 12 + time.m / 60) * 30 - 90) * Math.PI / 180)} 
                                        stroke="transparent" strokeWidth="40" strokeLinecap="round" 
                                    />
                                    <line 
                                        x1="170" y1="170" 
                                        x2={170 + 65 * Math.cos(((time.h % 12 + time.m / 60) * 30 - 90) * Math.PI / 180)} 
                                        y2={170 + 65 * Math.sin(((time.h % 12 + time.m / 60) * 30 - 90) * Math.PI / 180)} 
                                        stroke={success && mode === 'findhour' ? '#10b981' : (hint ? "#EF4444" : "#1e293b")} 
                                        strokeWidth="12" strokeLinecap="round" 
                                        className={`transition-all duration-300 ${['findhour', 'findminute'].includes(mode) && !success ? 'group-hover:stroke-emerald-400' : ''}`}
                                        style={{ filter: success && mode === 'findhour' ? 'drop-shadow(0 0 12px #34d399) drop-shadow(0 0 4px #10b981)' : 'drop-shadow(2px 4px 4px rgba(0,0,0,0.2))' }} 
                                    />
                                </g>
                                
                                {/* Minute Hand */}
                                <g 
                                    onClick={(e) => { if(['findhour', 'findminute'].includes(mode) && !success) { e.stopPropagation(); handleHandClick('minute'); } }}
                                    className={['findhour', 'findminute'].includes(mode) && !success ? 'cursor-pointer group' : ''}
                                    style={{ pointerEvents: ['findhour', 'findminute'].includes(mode) && !success ? 'auto' : 'none' }}
                                >
                                    <line 
                                        x1="170" y1="170" 
                                        x2={170 + 105 * Math.cos((time.m * 6 - 90) * Math.PI / 180)} 
                                        y2={170 + 105 * Math.sin((time.m * 6 - 90) * Math.PI / 180)} 
                                        stroke="transparent" strokeWidth="30" strokeLinecap="round" 
                                    />
                                    <line 
                                        x1="170" y1="170" 
                                        x2={170 + 105 * Math.cos((time.m * 6 - 90) * Math.PI / 180)} 
                                        y2={170 + 105 * Math.sin((time.m * 6 - 90) * Math.PI / 180)} 
                                        stroke={success && mode === 'findminute' ? '#10b981' : (hint ? "#3B82F6" : "#475569")} 
                                        strokeWidth="6" strokeLinecap="round" 
                                        className={`transition-all duration-300 ${['findhour', 'findminute'].includes(mode) && !success ? 'group-hover:stroke-emerald-400' : ''}`}
                                        style={{ filter: success && mode === 'findminute' ? 'drop-shadow(0 0 12px #34d399) drop-shadow(0 0 4px #10b981)' : 'drop-shadow(2px 4px 4px rgba(0,0,0,0.2))' }} 
                                    />
                                </g>
                                
                                {/* Center Pin */}
                                <circle cx="170" cy="170" r="10" fill="#f59e0b" style={{ pointerEvents: 'none' }} />
                                <circle cx="170" cy="170" r="4" fill="#fff" style={{ pointerEvents: 'none' }} />
                            </svg>
                        </div>

                        {/* Question Area */}
                        <div className="flex-1 w-full bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-teal-100 flex flex-col justify-center min-h-[260px] text-center relative">
                            
                            {['findhour', 'findminute'].includes(mode) ? (
                                <div className="text-2xl md:text-3xl lg:text-4xl font-bold text-gray-700 leading-loose flex flex-col items-center justify-center gap-y-4">
                                    <span>請找出並點擊時鐘上的</span>
                                    <span className={`inline-block px-6 py-2 border-b-4 rounded-xl ${mode === 'findhour' ? 'border-red-500 bg-red-50 text-red-600' : 'border-blue-500 bg-blue-50 text-blue-600'} text-3xl md:text-4xl lg:text-5xl transition-colors`}>
                                        {mode === 'findhour' ? '時針 (短針)' : '分針 (長針)'}
                                    </span>
                                </div>
                            ) : (
                                <>
                                    {/* Instruction text for Click Mode */}
                                    {qType === 'click' && !success && (
                                        <div className="text-lg md:text-xl font-bold text-teal-600 mb-4 bg-teal-50 inline-block px-4 py-2 rounded-full mx-auto">
                                            {mode === 'hourmin' ? (
                                                answered.h === null ? "👉 步驟 1：請點擊時針(短針)指著的數字" : "👉 步驟 2：接著，點擊分針(長針)指著的數字"
                                            ) : (
                                                "👉 請點擊時針(短針)指著的數字"
                                            )}
                                        </div>
                                    )}

                                    {/* Question Text */}
                                    {qType === 'select' ? (
                                        <div className="text-2xl md:text-3xl lg:text-4xl font-bold text-gray-700 leading-loose flex flex-wrap items-center justify-center gap-y-4">
                                            <span>時鐘顯示的時間是</span>
                                            {renderSelectButtons('h')}
                                            <span>時</span>
                                            
                                            {mode === 'halfpast' && <span className="ml-2">半。</span>}
                                            {mode === 'oclock' && <span className="ml-2">正。</span>}
                                            
                                            {mode === 'hourmin' && (
                                                <>
                                                    {renderSelectButtons('m')}
                                                    <span>分。</span>
                                                </>
                                            )}
                                        </div>
                                    ) : (
                                        <div className="text-2xl md:text-3xl lg:text-4xl font-bold text-gray-700 leading-loose flex flex-wrap items-center justify-center gap-y-4">
                                            <span>時鐘顯示的時間是</span>
                                            
                                            <span className={`inline-block min-w-[3rem] px-2 pb-1 mx-3 border-b-4 ${answered.h === null ? 'border-red-500 bg-red-50' : 'border-gray-400'} text-center text-red-600 transition-colors rounded-t-lg`}>
                                                {answered.h !== null ? answered.h : '?'}
                                            </span>
                                            <span>時</span>
                                            
                                            {mode === 'halfpast' && <span className="ml-2">半。</span>}
                                            {mode === 'oclock' && <span className="ml-2">正。</span>}

                                            {mode === 'hourmin' && (
                                                <>
                                                    <span className={`inline-block min-w-[3rem] px-2 pb-1 mx-3 border-b-4 ${answered.h !== null && answered.m === null ? 'border-blue-500 bg-blue-50' : 'border-gray-400'} text-center text-blue-600 transition-colors rounded-t-lg`}>
                                                        {answered.m !== null ? answered.m : '?'}
                                                    </span>
                                                    <span>分。</span>
                                                </>
                                            )}
                                        </div>
                                    )}
                                </>
                            )}

                            {/* Error Message Placeholder / Toast */}
                            {!success && (
                                <div className="h-8 mt-4 text-xl font-bold text-red-500 transition-opacity">
                                    {errorMsg && <span className="animate-bounce inline-block">❌ {errorMsg}</span>}
                                </div>
                            )}

                            {/* Next Question Button & Success Feedback */}
                            {success && (
                                <div className="mt-6 animate-in fade-in zoom-in duration-300 w-full flex flex-col items-center gap-4">
                                    <div className="text-5xl md:text-6xl animate-bounce drop-shadow-lg">✨✅</div>
                                    <button 
                                        onClick={() => { sounds.click(); generateQuestion(); }}
                                        className="bg-emerald-500 hover:bg-emerald-600 text-white px-8 py-3 rounded-full font-black text-2xl shadow-lg border-b-4 border-emerald-700 active:border-b-0 active:translate-y-1 transition-all flex items-center gap-2"
                                    >
                                        ⏭️ 下一題
                                    </button>
                                </div>
                            )}
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
