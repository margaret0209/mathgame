<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比較應用題遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0fdf4;
            user-select: none;
        }

        .active-input {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.4) !important;
            transform: scale(1.05);
        }

        .numpad-btn {
            transition: all 0.1s;
        }
        .numpad-btn:active {
            transform: scale(0.95);
            background-color: #e5e7eb;
        }

        .box-option {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .box-selected {
            background-color: #dbeafe !important;
            border-color: #2563eb !important;
            border-style: solid !important;
            transform: scale(1.1);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .box-selected .inner-text {
            color: #1d4ed8 !important;
            font-size: 1.25rem !important;
        }
        
        select {
            appearance: none;
            text-align: center;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-2 px-2 md:px-4">

    <!-- 調整容器寬度和內邊距以適應 iPad，縮減 padding -->
    <div class="max-w-6xl w-full bg-white rounded-3xl shadow-xl overflow-hidden p-3 md:p-5 flex flex-col gap-4 md:gap-5 border-4 border-green-100">
        
        <!-- 頂部標題與控制列 -->
        <div class="flex flex-col border-b-2 border-gray-100 pb-3 gap-3 relative">
            
            <div class="flex flex-col md:flex-row justify-between items-center gap-3">
                <h1 class="text-xl md:text-2xl font-black text-gray-700 flex items-center gap-2 justify-center md:justify-start">
                    <span class="text-3xl md:text-4xl">📏</span> 比較應用題小挑戰
                </h1>
                
                <!-- 計分板 (右上角) -->
                <div class="bg-yellow-50 border-2 border-yellow-300 rounded-2xl px-3 py-1.5 flex gap-3 text-base font-black text-yellow-700 shadow-sm items-center">
                    <div class="flex flex-col items-center leading-tight">
                        <span class="text-[10px] md:text-xs text-yellow-600 font-bold">答題數量</span>
                        <span id="statsTotal" class="text-lg md:text-xl text-yellow-700">0</span>
                    </div>
                    <div class="w-px h-6 bg-yellow-300"></div>
                    <div class="flex flex-col items-center leading-tight">
                        <span class="text-[10px] md:text-xs text-yellow-600 font-bold">正確率</span>
                        <span id="statsRate" class="text-lg md:text-xl text-yellow-700">0%</span>
                    </div>
                </div>
            </div>
            
            <!-- 控制選項 (縮小字體與內距) -->
            <div class="flex flex-wrap items-center justify-center md:justify-start gap-2 mt-1">
                <div class="bg-gray-100 px-2 py-1 rounded-lg flex items-center gap-1 font-bold text-sm text-gray-600">
                    <label for="subjectSelect">類型：</label>
                    <select id="subjectSelect" onchange="initGame()" class="bg-white border border-gray-300 rounded-md p-1 cursor-pointer outline-none">
                        <option value="AB">[AB]</option>
                        <option value="fruit">[水果]</option>
                        <option value="animal">[動物]</option>
                    </select>
                </div>

                <div class="bg-gray-100 px-2 py-1 rounded-lg flex items-center gap-1 font-bold text-sm text-gray-600">
                    <label for="rangeSelect">數量：</label>
                    <select id="rangeSelect" onchange="initGame()" class="bg-white border border-gray-300 rounded-md p-1 cursor-pointer outline-none">
                        <option value="1-100">1 - 100</option>
                        <option value="100-1000">100 - 1000</option>
                    </select>
                </div>

                <div class="bg-gray-100 px-2 py-1 rounded-lg flex items-center gap-1 font-bold text-sm text-gray-600">
                    <label for="difficultySelect">難度：</label>
                    <select id="difficultySelect" onchange="initGame()" class="bg-white border border-gray-300 rounded-md p-1 cursor-pointer outline-none">
                        <option value="easy">易 (圖形提示)</option>
                        <option value="medium">中 (引導算式)</option>
                        <option value="hard">難 (完整算式)</option>
                    </select>
                </div>

                <button onclick="initGame()" class="ml-auto bg-green-500 hover:bg-green-600 text-white text-sm md:text-base font-bold py-1 px-4 md:px-5 rounded-full transition transform hover:scale-105 shadow-sm active:scale-95">
                    換一題 🎲
                </button>
            </div>
        </div>

        <!-- 題目顯示區 -->
        <div id="questionDisplay" class="bg-yellow-50 border-2 border-yellow-300 rounded-xl p-3 md:p-5 text-left text-lg md:text-xl leading-tight font-black tracking-wide shadow-inner text-gray-800">
            <!-- 題目由 JS 動態生成 -->
        </div>

        <!-- 互動區：左側大區塊 (句式 + 數棒/算式) | 右側：數字盤 (改為 md:flex-row 提早在 iPad 並排) -->
        <div class="flex flex-col md:flex-row gap-4 md:gap-5 items-start">
            
            <!-- 左側大區塊：包含句式和算式 -->
            <div class="flex-1 flex flex-col gap-3 md:gap-4 w-full">
                
                <!-- 句式完成區 -->
                <div class="flex flex-col gap-2 md:gap-3 w-full text-lg font-bold bg-blue-50 p-3 md:p-4 rounded-2xl border-2 border-blue-200 shadow-sm justify-center items-start">
                    <h2 class="text-lg md:text-xl text-blue-800 font-black flex items-center gap-1 md:gap-2">
                        <span>✏️</span> 請完成下方句子：
                    </h2>

                    <!-- 易 難度句式 -->
                    <div id="normalSentences" class="flex flex-col gap-2 md:gap-3 w-full items-start">
                        <!-- 句式 1 -->
                        <div class="flex items-center flex-wrap gap-1 md:gap-2 bg-white p-2 md:px-3 rounded-xl shadow-sm border border-blue-100">
                            <span id="labelA1" class="text-red-600 text-xl md:text-2xl drop-shadow-sm whitespace-nowrap">A</span>
                            <div class="flex items-center text-gray-400 text-base md:text-lg font-normal gap-1 opacity-80 whitespace-nowrap">
                                <span>比</span>
                                <span id="labelB1">B</span>
                            </div>
                            
                            <select id="dd1" class="border-2 border-gray-300 rounded-lg py-1 px-1 text-base md:text-lg bg-gray-50 focus:border-blue-500 outline-none cursor-pointer text-blue-700">
                                <option value="?">選擇 ▼</option>
                                <option value="多">多</option>
                                <option value="少">少</option>
                            </select>
                            
                            <div class="flex items-center gap-1 md:gap-2 relative">
                                <input type="text" id="input1" readonly class="w-14 md:w-16 text-center border-2 border-gray-300 rounded-lg py-1 px-1 text-lg md:text-xl font-black bg-white cursor-text transition-all active-input text-gray-800" placeholder="?" onclick="setActiveInput('input1')">
                                <span id="pointer1" class="absolute -right-6 md:-right-8 text-xl md:text-2xl animate-bounce text-blue-500">👈</span>
                            </div>
                        </div>

                        <!-- 句式 2 -->
                        <div class="flex items-center flex-wrap gap-1 md:gap-2 bg-white p-2 md:px-3 rounded-xl shadow-sm border border-blue-100">
                            <span id="labelB2" class="text-blue-600 text-xl md:text-2xl drop-shadow-sm whitespace-nowrap">B</span>
                            <div class="flex items-center text-gray-400 text-base md:text-lg font-normal gap-1 opacity-80 whitespace-nowrap">
                                <span>比</span>
                                <span id="labelA2">A</span>
                            </div>
                            
                            <select id="dd2" class="border-2 border-gray-300 rounded-lg py-1 px-1 text-base md:text-lg bg-gray-50 focus:border-blue-500 outline-none cursor-pointer text-blue-700">
                                <option value="?">選擇 ▼</option>
                                <option value="多">多</option>
                                <option value="少">少</option>
                            </select>
                            
                            <div class="flex items-center gap-1 md:gap-2 relative">
                                <input type="text" id="input2" readonly class="w-14 md:w-16 text-center border-2 border-gray-300 rounded-lg py-1 px-1 text-lg md:text-xl font-black bg-white cursor-text transition-all text-gray-800" placeholder="?" onclick="setActiveInput('input2')">
                                <span id="pointer2" class="absolute -right-6 md:-right-8 text-xl md:text-2xl animate-bounce text-blue-500 hidden">👈</span>
                            </div>
                        </div>
                    </div>

                    <!-- 中/難 難度句式 -->
                    <div id="hardSentences" class="flex flex-col gap-2 md:gap-3 w-full items-start hidden">
                        <!-- 句式 1 (A有...) -->
                        <div class="flex items-center flex-wrap gap-1 md:gap-2 bg-white p-2 md:px-3 rounded-xl shadow-sm border border-blue-100">
                            <span id="labelA1_hard" class="text-red-600 text-xl md:text-2xl drop-shadow-sm whitespace-nowrap">A</span>
                            <span class="text-gray-600 text-lg md:text-xl font-bold whitespace-nowrap mx-1">有</span>
                            <div class="flex items-center gap-1 md:gap-2 relative">
                                <input type="text" id="input1_hard" readonly class="w-14 md:w-16 text-center border-2 border-gray-300 rounded-lg py-1 px-1 text-lg md:text-xl font-black bg-white cursor-text transition-all text-gray-800" placeholder="?" onclick="setActiveInput('input1_hard')">
                                <span id="pointer1_hard" class="absolute -right-6 md:-right-8 text-xl md:text-2xl animate-bounce text-blue-500 hidden">👈</span>
                            </div>
                        </div>

                        <!-- 句式 2 (B比A...) -->
                        <div class="flex items-center flex-wrap gap-1 md:gap-2 bg-white p-2 md:px-3 rounded-xl shadow-sm border border-blue-100">
                            <span id="labelB2_hard" class="text-blue-600 text-xl md:text-2xl drop-shadow-sm whitespace-nowrap">B</span>
                            <div class="flex items-center text-gray-400 text-base md:text-lg font-normal gap-1 opacity-80 whitespace-nowrap">
                                <span>比</span>
                                <span id="labelA2_hard">A</span>
                            </div>
                            
                            <select id="dd1_hard" onchange="checkStepProgress()" class="border-2 border-gray-300 rounded-lg py-1 px-1 text-base md:text-lg bg-gray-50 focus:border-blue-500 outline-none cursor-pointer text-blue-700 transition-all">
                                <option value="?">選擇 ▼</option>
                                <option value="多">多</option>
                                <option value="少">少</option>
                            </select>
                            
                            <div class="flex items-center gap-1 md:gap-2 relative">
                                <input type="text" id="input2_hard" readonly class="w-14 md:w-16 text-center border-2 border-gray-300 rounded-lg py-1 px-1 text-lg md:text-xl font-black bg-white cursor-text transition-all text-gray-800" placeholder="?" onclick="setActiveInput('input2_hard')">
                                <span id="pointer2_hard" class="absolute -right-6 md:-right-8 text-xl md:text-2xl animate-bounce text-blue-500 hidden">👈</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 底部區塊 A：數棒/數線區 (難度：易) -->
                <div id="numberLineSection" class="bg-white p-3 md:p-4 rounded-2xl border-2 border-dashed border-gray-300 flex flex-col items-center shadow-sm relative overflow-hidden">
                    <h2 class="text-base md:text-lg font-black text-gray-700 mb-3 relative z-10 flex items-center gap-1 md:gap-2 bg-white px-3 py-1 rounded-full border border-gray-200">
                        <span>🤔</span> 請問 <span id="questionTargetB" class="text-blue-600 text-lg md:text-xl mx-1 whitespace-nowrap">B</span> 在哪裡？ <span class="text-xs md:text-sm text-gray-500 font-normal ml-1">(點擊選擇)</span>
                    </h2>
                    
                    <div class="relative w-full h-24 md:h-28 bg-gray-50 rounded-xl border-2 border-gray-200 shadow-inner mt-1">
                        <div class="text-lg md:text-xl font-black text-gray-400 absolute left-2 bottom-2 bg-white w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center border-2 border-gray-100 z-10">少</div>
                        <div class="text-lg md:text-xl font-black text-gray-400 absolute right-2 bottom-2 bg-white w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center border-2 border-gray-100 z-10">多</div>

                        <div class="absolute left-8 right-8 md:left-12 md:right-12 h-2 bg-gray-300 bottom-[1.25rem] md:bottom-[1.5rem] rounded-full border-b border-white z-0"></div>

                        <div id="boxLeft" class="box-option absolute left-[20%] bottom-[2rem] md:bottom-[2.5rem] -translate-x-1/2 flex flex-col items-center cursor-pointer group z-20" onclick="selectBox('left')">
                            <div class="inner-box w-auto px-2 min-w-[2.5rem] h-8 md:h-10 bg-white border-2 border-dashed border-blue-400 rounded-lg flex items-center justify-center group-hover:border-blue-500 group-hover:bg-blue-50 shadow-sm relative whitespace-nowrap">
                                <span class="inner-text text-blue-300 text-lg md:text-xl font-black">?</span>
                            </div>
                            <div class="h-4 w-1 bg-gray-400 mt-1 rounded-sm group-hover:bg-blue-400 transition-colors"></div>
                        </div>

                        <div class="absolute left-[50%] bottom-[2rem] md:bottom-[2.5rem] -translate-x-1/2 flex flex-col items-center z-30">
                            <div class="w-auto px-3 min-w-[3.5rem] h-10 md:h-12 bg-red-100 border-2 border-red-500 rounded-lg flex items-center justify-center shadow-md relative overflow-hidden whitespace-nowrap">
                                <div class="absolute top-0 left-0 right-0 h-1 bg-red-500 opacity-20"></div>
                                <span id="boxLabelA" class="text-red-600 text-xl md:text-2xl font-black">A</span>
                            </div>
                            <div class="h-4 w-1 bg-gray-700 mt-1 rounded-sm"></div>
                        </div>

                        <div id="boxRight" class="box-option absolute left-[80%] bottom-[2rem] md:bottom-[2.5rem] -translate-x-1/2 flex flex-col items-center cursor-pointer group z-20" onclick="selectBox('right')">
                            <div class="inner-box w-auto px-2 min-w-[2.5rem] h-8 md:h-10 bg-white border-2 border-dashed border-blue-400 rounded-lg flex items-center justify-center group-hover:border-blue-500 group-hover:bg-blue-50 shadow-sm relative whitespace-nowrap">
                                <span class="inner-text text-blue-300 text-lg md:text-xl font-black">?</span>
                            </div>
                            <div class="h-4 w-1 bg-gray-400 mt-1 rounded-sm group-hover:bg-blue-400 transition-colors"></div>
                        </div>
                    </div>
                </div>

                <!-- 底部區塊 B：算式區 (難度：中、難) -->
                <div id="equationSection" class="bg-white p-3 md:p-4 rounded-2xl border-2 border-dashed border-gray-300 flex flex-col items-center shadow-sm relative overflow-hidden hidden">
                    <h2 class="text-base md:text-lg font-black text-gray-700 mb-2 relative z-10 flex items-center gap-1 md:gap-2 bg-white px-3 py-1 rounded-full border border-gray-200">
                        <span>🧮</span> 計算 <span id="eqTargetB" class="text-blue-600 text-lg md:text-xl mx-1 whitespace-nowrap">B</span> 的數量：
                    </h2>
                    
                    <div class="flex items-center justify-center flex-nowrap gap-1 md:gap-2 text-lg font-black bg-blue-50 p-2 md:p-3 rounded-xl border-2 border-blue-200 w-full overflow-x-auto overflow-y-hidden transition-all" id="equationContainer">
                        <span id="eqLabelB2" class="text-blue-600 text-xl md:text-2xl whitespace-nowrap">B</span>
                        <span class="text-gray-400 text-lg md:text-xl">=</span>
                        
                        <input type="text" id="inputEq1" readonly class="w-12 md:w-16 text-center border-2 border-gray-300 rounded-lg py-1 px-0.5 text-lg md:text-xl font-black bg-white cursor-text transition-all text-gray-800 flex-shrink-0" placeholder="?" onclick="setActiveInput('inputEq1')">
                        
                        <select id="eqOp" onchange="checkStepProgress()" class="border-2 border-gray-300 rounded-lg p-0.5 md:p-1 text-lg md:text-xl bg-gray-50 focus:border-blue-500 outline-none cursor-pointer text-blue-700 text-center font-black flex-shrink-0 transition-all">
                            <option value="?">?</option>
                            <option value="+">+</option>
                            <option value="-">-</option>
                        </select>
                        
                        <input type="text" id="inputEq2" readonly class="w-12 md:w-16 text-center border-2 border-gray-300 rounded-lg py-1 px-0.5 text-lg md:text-xl font-black bg-white cursor-text transition-all text-gray-800 flex-shrink-0" placeholder="?" onclick="setActiveInput('inputEq2')">
                        
                        <span class="text-gray-400 text-lg md:text-xl">=</span>
                        
                        <input type="text" id="inputEq3" readonly class="w-14 md:w-20 text-center border-2 border-gray-300 rounded-lg py-1 px-0.5 text-lg md:text-xl font-black transition-all text-gray-800 flex-shrink-0" placeholder="?" onclick="setActiveInput('inputEq3')">
                    </div>
                </div>

            </div> <!-- 左側大區塊結尾 -->

            <!-- 右側：九宮數字盤 (調整 md 下的尺寸，iPad 完美並排) -->
            <div class="w-full md:w-48 lg:w-56 bg-gray-200 p-2 md:p-3 rounded-2xl shadow-inner border-2 border-gray-300 flex-shrink-0 flex flex-col justify-center md:sticky md:top-4">
                <h3 class="text-center font-bold text-gray-500 mb-1 md:mb-2 text-sm md:text-base">數字鍵盤</h3>
                <div class="grid grid-cols-3 gap-1 md:gap-2">
                    <button class="numpad-btn bg-white text-xl md:text-2xl font-black py-1.5 md:py-2 rounded-lg shadow-sm border-b-2 md:border-b-4 border-gray-300 text-gray-800" onclick="typeNum('7')">7</button>
                    <button class="numpad-btn bg-white text-xl md:text-2xl font-black py-1.5 md:py-2 rounded-lg shadow-sm border-b-2 md:border-b-4 border-gray-300 text-gray-800" onclick="typeNum('8')">8</button>
                    <button class="numpad-btn bg-white text-xl md:text-2xl font-black py-1.5 md:py-2 rounded-lg shadow-sm border-b-2 md:border-b-4 border-gray-300 text-gray-800" onclick="typeNum('9')">9</button>
                    
                    <button class="numpad-btn bg-white text-xl md:text-2xl font-black py-1.5 md:py-2 rounded-lg shadow-sm border-b-2 md:border-b-4 border-gray-300 text-gray-800" onclick="typeNum('4')">4</button>
                    <button class="numpad-btn bg-white text-xl md:text-2xl font-black py-1.5 md:py-2 rounded-lg shadow-sm border-b-2 md:border-b-4 border-gray-300 text-gray-800" onclick="typeNum('5')">5</button>
                    <button class="numpad-btn bg-white text-xl md:text-2xl font-black py-1.5 md:py-2 rounded-lg shadow-sm border-b-2 md:border-b-4 border-gray-300 text-gray-800" onclick="typeNum('6')">6</button>
                    
                    <button class="numpad-btn bg-white text-xl md:text-2xl font-black py-1.5 md:py-2 rounded-lg shadow-sm border-b-2 md:border-b-4 border-gray-300 text-gray-800" onclick="typeNum('1')">1</button>
                    <button class="numpad-btn bg-white text-xl md:text-2xl font-black py-1.5 md:py-2 rounded-lg shadow-sm border-b-2 md:border-b-4 border-gray-300 text-gray-800" onclick="typeNum('2')">2</button>
                    <button class="numpad-btn bg-white text-xl md:text-2xl font-black py-1.5 md:py-2 rounded-lg shadow-sm border-b-2 md:border-b-4 border-gray-300 text-gray-800" onclick="typeNum('3')">3</button>
                    
                    <button class="numpad-btn text-red-600 bg-red-100 text-xs md:text-sm font-black py-1.5 md:py-2 rounded-lg shadow-sm border-b-2 md:border-b-4 border-red-300" onclick="clearInput()">清除</button>
                    <button class="numpad-btn bg-white text-xl md:text-2xl font-black py-1.5 md:py-2 rounded-lg shadow-sm border-b-2 md:border-b-4 border-gray-300 text-gray-800" onclick="typeNum('0')">0</button>
                    <button class="numpad-btn text-blue-600 bg-blue-100 text-xs md:text-sm font-black py-1.5 md:py-2 rounded-lg shadow-sm border-b-2 md:border-b-4 border-blue-300" onclick="backspaceInput()">刪除</button>
                </div>
            </div>
        </div> <!-- 互動區結尾 -->

        <!-- 提交按鈕 -->
        <div class="flex justify-center mt-2">
            <button onclick="checkAnswers()" class="bg-blue-500 hover:bg-blue-600 text-white text-xl md:text-2xl font-black py-2 md:py-3 px-10 md:px-14 rounded-full shadow-[0_4px_0_#1e3a8a] active:shadow-none active:translate-y-1 transition-all">
                檢查答案 ✔️
            </button>
        </div>
    </div>

    <!-- 彈出回饋視窗 -->
    <div id="feedbackModal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-5 md:p-8 max-w-[16rem] md:max-w-sm w-full text-center shadow-2xl transform scale-90 transition-transform duration-300 border-4 border-white" id="modalContent">
            <div id="modalIcon" class="text-6xl md:text-7xl mb-3 drop-shadow-md"></div>
            <h2 id="modalTitle" class="text-xl md:text-2xl font-black mb-5 text-gray-800"></h2>
            <button onclick="closeModal()" class="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-black py-2 md:py-3 px-6 rounded-full text-lg md:text-xl w-full shadow-[0_4px_0_#b45309] active:shadow-none active:translate-y-1 transition-all">
                繼續
            </button>
        </div>
    </div>

    <canvas id="confetti" class="fixed inset-0 pointer-events-none z-40 hidden"></canvas>

    <script>
        // 遊戲狀態與計分變數
        let activeInputId = 'input1';
        let selectedBox = '';
        let currentDifficulty = 'easy';
        
        let statsTotal = 0;
        let statsCorrect = 0;
        let currentQuestionSolved = false;
        
        let subjA = "A";
        let subjB = "B";
        
        // 答案記錄
        let currentAnsDD1 = '';
        let currentAnsDD2 = '';
        let currentAnsX = 0;
        let currentAnsY = 0;
        let currentAnsBox = '';
        
        // 算式答案記錄
        let currentAnsEq1 = 0;
        let currentAnsEqOp = '+';
        let currentAnsEq2 = 0;
        let currentAnsEq3 = 0;
        let currentAnsFinal = 0;

        function getRandomPair(arr) {
            let a = arr[Math.floor(Math.random() * arr.length)];
            let b;
            do { b = arr[Math.floor(Math.random() * arr.length)]; } while (a === b);
            return [a, b];
        }

        function initGame() {
            currentQuestionSolved = false;
            
            const selectVal = document.getElementById('subjectSelect').value;
            const rangeVal = document.getElementById('rangeSelect').value;
            currentDifficulty = document.getElementById('difficultySelect').value;
            
            let unit = "";
            if (selectVal === 'fruit') {
                const fruits = [
                    {n: '青蘋果', i: '🍏'}, {n: '蘋果', i: '🍎'}, {n: '梨子', i: '🍐'}, 
                    {n: '橙', i: '🍊'}, {n: '檸檬', i: '🍋'}, {n: '香蕉', i: '🍌'}, 
                    {n: '西瓜', i: '🍉'}, {n: '葡萄', i: '🍇'}, {n: '草莓', i: '🍓'}, 
                    {n: '藍莓', i: '🫐'}, {n: '蜜瓜', i: '🍈'}, {n: '櫻桃', i: '🍒'}, 
                    {n: '水蜜桃', i: '🍑'}, {n: '芒果', i: '🥭'}, {n: '菠蘿', i: '🍍'}, 
                    {n: '椰子', i: '🥥'}, {n: '奇異果', i: '🥝'}, {n: '番茄', i: '🍅'}, 
                    {n: '橄欖', i: '🫒'}, {n: '牛油果', i: '🥑'}
                ];
                let pair = getRandomPair(fruits);
                subjA = pair[0].n + " " + pair[0].i; subjB = pair[1].n + " " + pair[1].i;
                unit = "個";
            } else if (selectVal === 'animal') {
                const animals = [
                    {n: '小狗', i: '🐶'}, {n: '小貓', i: '🐱'}, {n: '小老鼠', i: '🐭'}, 
                    {n: '倉鼠', i: '🐹'}, {n: '兔子', i: '🐰'}, {n: '狐狸', i: '🦊'}, 
                    {n: '小熊', i: '🐻'}, {n: '熊貓', i: '🐼'}, {n: '無尾熊', i: '🐨'}, 
                    {n: '老虎', i: '🐯'}, {n: '獅子', i: '🦁'}, {n: '小豬', i: '🐷'}, 
                    {n: '青蛙', i: '🐸'}, {n: '猴子', i: '🐵'}, {n: '企鵝', i: '🐧'}, 
                    {n: '小鳥', i: '🐦'}, {n: '鴨子', i: '🦆'}, {n: '貓頭鷹', i: '🦉'}, 
                    {n: '烏龜', i: '🐢'}, {n: '大象', i: '🐘'}
                ];
                let pair = getRandomPair(animals);
                subjA = pair[0].n + " " + pair[0].i; subjB = pair[1].n + " " + pair[1].i;
                unit = "隻";
            } else {
                subjA = "A"; subjB = "B"; unit = "";
            }

            updateUI_Subjects();

            // 生成數字 X 和 Y
            let X, Y;
            if (rangeVal === '1-100') {
                X = Math.floor(Math.random() * 89) + 11; // 11 ~ 99
            } else {
                X = Math.floor(Math.random() * 899) + 101; // 101 ~ 999
            }
            Y = Math.floor(Math.random() * (X - 1)) + 1;
            
            if (Y < 5 && X > 20) Y += 5;
            currentAnsX = X;
            currentAnsY = Y;

            let type = Math.floor(Math.random() * 4) + 1;
            let qText = "";
            const spanA = `<span class="text-red-600 mx-1 whitespace-nowrap">${subjA}</span>`;
            const spanB = `<span class="text-blue-600 mx-1 whitespace-nowrap">${subjB}</span>`;

            // 設定共同算式變數
            currentAnsEq1 = X;
            currentAnsEq2 = Y;

            switch(type) {
                case 1:
                    qText = `${spanA} 有 ${X}${unit}，<br>${spanA} 比 ${spanB} 多 ${Y}${unit}，<br>${spanB} 有多少${unit}？`;
                    currentAnsDD1 = "多"; currentAnsDD2 = "少"; currentAnsBox = "left";
                    currentAnsEqOp = "-"; currentAnsFinal = X - Y;
                    break;
                case 2:
                    qText = `${spanA} 有 ${X}${unit}，<br>${spanA} 比 ${spanB} 少 ${Y}${unit}，<br>${spanB} 有多少${unit}？`;
                    currentAnsDD1 = "少"; currentAnsDD2 = "多"; currentAnsBox = "right";
                    currentAnsEqOp = "+"; currentAnsFinal = X + Y;
                    break;
                case 3:
                    qText = `${spanA} 有 ${X}${unit}，<br>${spanB} 比 ${spanA} 多 ${Y}${unit}，<br>${spanB} 有多少${unit}？`;
                    currentAnsDD1 = "少"; currentAnsDD2 = "多"; currentAnsBox = "right";
                    currentAnsEqOp = "+"; currentAnsFinal = X + Y;
                    break;
                case 4:
                    qText = `${spanA} 有 ${X}${unit}，<br>${spanB} 比 ${spanA} 少 ${Y}${unit}，<br>${spanB} 有多少${unit}？`;
                    currentAnsDD1 = "多"; currentAnsDD2 = "少"; currentAnsBox = "left";
                    currentAnsEqOp = "-"; currentAnsFinal = X - Y;
                    break;
            }

            document.getElementById('questionDisplay').innerHTML = qText;

            // 根據難度切換 UI - 句式區
            if (currentDifficulty === 'medium' || currentDifficulty === 'hard') {
                document.getElementById('normalSentences').classList.add('hidden');
                document.getElementById('hardSentences').classList.remove('hidden');
            } else {
                document.getElementById('normalSentences').classList.remove('hidden');
                document.getElementById('hardSentences').classList.add('hidden');
            }

            // 根據難度切換 UI - 底部區塊
            if (currentDifficulty === 'easy') {
                document.getElementById('numberLineSection').classList.remove('hidden');
                document.getElementById('equationSection').classList.add('hidden');
            } else {
                document.getElementById('numberLineSection').classList.add('hidden');
                document.getElementById('equationSection').classList.remove('hidden');
            }

            resetUI();
        }

        function updateUI_Subjects() {
            document.getElementById('labelA1').innerText = subjA;
            document.getElementById('labelB1').innerText = subjB;
            document.getElementById('labelB2').innerText = subjB;
            document.getElementById('labelA2').innerText = subjA;
            
            document.getElementById('labelA1_hard').innerText = subjA;
            document.getElementById('labelB2_hard').innerText = subjB;
            document.getElementById('labelA2_hard').innerText = subjA;

            document.getElementById('boxLabelA').innerText = subjA;
            document.getElementById('questionTargetB').innerText = subjB;
            document.getElementById('eqTargetB').innerText = subjB;
            document.getElementById('eqLabelB2').innerText = subjB;
        }

        function setLock(id, isLocked, type) {
            const el = document.getElementById(id);
            if (!el) return;
            if (isLocked) {
                el.classList.add('bg-gray-200', 'pointer-events-none', 'opacity-50');
                if (type === 'input') el.classList.remove('bg-white', 'cursor-text');
                else if (type === 'select') el.classList.remove('bg-gray-50', 'cursor-pointer');
                
                if (activeInputId === id) {
                    activeInputId = null;
                    el.classList.remove('active-input');
                    let ptr = document.getElementById(id.replace('input', 'pointer'));
                    if (ptr) ptr.classList.add('hidden');
                }
            } else {
                el.classList.remove('bg-gray-200', 'pointer-events-none', 'opacity-50');
                if (type === 'input') el.classList.add('bg-white', 'cursor-text');
                else if (type === 'select') el.classList.add('bg-gray-50', 'cursor-pointer');
            }
        }

        function resetUI() {
            document.getElementById('dd1').value = '?';
            document.getElementById('dd2').value = '?';
            document.getElementById('input1').value = '';
            document.getElementById('input2').value = '';

            document.getElementById('dd1_hard').value = '?';
            document.getElementById('input1_hard').value = '';
            document.getElementById('input2_hard').value = '';
            
            document.getElementById('inputEq1').value = '';
            document.getElementById('eqOp').value = '?';
            document.getElementById('inputEq2').value = '';
            document.getElementById('inputEq3').value = '';
            
            ['input1_hard', 'input2_hard', 'inputEq1', 'inputEq2', 'inputEq3'].forEach(id => {
                let el = document.getElementById(id);
                if (el) {
                    el.classList.remove('text-green-600', 'bg-green-50');
                    el.classList.add('text-gray-800');
                }
            });

            if (currentDifficulty === 'easy') {
                setLock('dd1', false, 'select');
                setLock('dd2', false, 'select');
                setLock('input1', false, 'input');
                setLock('input2', false, 'input');
                setActiveInput('input1');
            } else {
                setLock('input1_hard', false, 'input');
                setLock('dd1_hard', true, 'select');
                setLock('input2_hard', true, 'input');
                
                setLock('inputEq1', true, 'input');
                setLock('eqOp', true, 'select');
                setLock('inputEq2', true, 'input');
                setLock('inputEq3', true, 'input');

                document.getElementById('equationContainer').classList.add('opacity-50');
                
                if (currentDifficulty === 'medium') {
                    document.getElementById('inputEq3').classList.add('bg-gray-100');
                }
                setActiveInput('input1_hard');
            }

            selectedBox = '';
            document.getElementById('boxLeft').classList.remove('box-selected');
            document.getElementById('boxRight').classList.remove('box-selected');
            document.getElementById('boxLeft').querySelector('.inner-text').innerText = '?';
            document.getElementById('boxRight').querySelector('.inner-text').innerText = '?';
        }

        function setActiveInput(inputId) {
            const el = document.getElementById(inputId);
            if (!el || el.classList.contains('pointer-events-none')) return; 
            
            if (currentDifficulty === 'medium' && inputId === 'inputEq3') return;

            activeInputId = inputId;
            
            const allInputs = ['input1', 'input2', 'inputEq1', 'inputEq2', 'inputEq3', 'input1_hard', 'input2_hard'];
            allInputs.forEach(id => {
                let e = document.getElementById(id);
                if(e) e.classList.remove('active-input');
            });

            ['pointer1', 'pointer2', 'pointer1_hard', 'pointer2_hard'].forEach(id => {
                let e = document.getElementById(id);
                if(e) e.classList.add('hidden');
            });

            el.classList.add('active-input');
            
            let ptr = document.getElementById(inputId.replace('input', 'pointer'));
            if(ptr) ptr.classList.remove('hidden');
        }

        function typeNum(numStr) {
            if(!activeInputId) return;
            let el = document.getElementById(activeInputId);
            if (el.value.length < 4) {
                el.value += numStr;
                checkStepProgress();
            }
        }

        function backspaceInput() {
            if(!activeInputId) return;
            let el = document.getElementById(activeInputId);
            el.value = el.value.slice(0, -1);
            checkStepProgress();
        }

        function clearInput() {
            if(!activeInputId) return;
            let el = document.getElementById(activeInputId);
            el.value = '';
            checkStepProgress();
        }

        function checkStepProgress() {
            if (currentDifficulty === 'easy') return;
            
            let step1Ok = false;
            let step2Ok = false;
            let step3LeftOk = false;

            const i1 = document.getElementById('input1_hard');
            if (i1.value !== '' && parseInt(i1.value) === currentAnsX) {
                step1Ok = true;
                i1.classList.add('text-green-600');
            } else {
                i1.classList.remove('text-green-600');
            }

            setLock('dd1_hard', !step1Ok, 'select');
            setLock('input2_hard', !step1Ok, 'input');

            if (step1Ok && activeInputId === 'input1_hard') {
                setActiveInput('input2_hard');
            }

            if (step1Ok) {
                const dd1 = document.getElementById('dd1_hard').value;
                const i2 = document.getElementById('input2_hard').value;
                if (dd1 === currentAnsDD2 && i2 !== '' && parseInt(i2) === currentAnsY) {
                    step2Ok = true;
                    document.getElementById('input2_hard').classList.add('text-green-600');
                } else {
                    document.getElementById('input2_hard').classList.remove('text-green-600');
                }
            }

            if(step2Ok) {
                document.getElementById('equationContainer').classList.remove('opacity-50');
            } else {
                document.getElementById('equationContainer').classList.add('opacity-50');
            }
            setLock('inputEq1', !step2Ok, 'input');
            setLock('eqOp', !step2Ok, 'select');
            setLock('inputEq2', !step2Ok, 'input');

            if (step2Ok && activeInputId === 'input2_hard') {
                setActiveInput('inputEq1');
            }

            if (step2Ok) {
                const eq1 = document.getElementById('inputEq1');
                const op = document.getElementById('eqOp').value;
                const eq2 = document.getElementById('inputEq2');
                
                let eq1Ok = (eq1.value !== '' && parseInt(eq1.value) === currentAnsEq1);
                let eq2Ok = (eq2.value !== '' && parseInt(eq2.value) === currentAnsEq2);

                if (eq1Ok) eq1.classList.add('text-green-600');
                else eq1.classList.remove('text-green-600');

                if (eq2Ok) eq2.classList.add('text-green-600');
                else eq2.classList.remove('text-green-600');

                if (eq1Ok && activeInputId === 'inputEq1') setActiveInput('inputEq2');

                if (eq1Ok && op === currentAnsEqOp && eq2Ok) {
                    step3LeftOk = true;
                }
            }

            const eq3 = document.getElementById('inputEq3');
            if (currentDifficulty === 'medium') {
                if (step3LeftOk) {
                    eq3.value = currentAnsFinal;
                    eq3.classList.add('text-green-600', 'bg-green-50');
                } else {
                    eq3.value = '';
                    eq3.classList.remove('text-green-600', 'bg-green-50');
                }
            } else if (currentDifficulty === 'hard') {
                setLock('inputEq3', !step3LeftOk, 'input');
                if (step3LeftOk) {
                    if (activeInputId === 'inputEq2' || activeInputId === 'inputEq1') {
                        setActiveInput('inputEq3');
                    }
                } else {
                    eq3.value = '';
                    eq3.classList.remove('text-green-600');
                }
            }
        }

        function updateScoreboard() {
            document.getElementById('statsTotal').innerText = statsTotal;
            let rate = statsTotal === 0 ? 0 : Math.round((statsCorrect / statsTotal) * 100);
            document.getElementById('statsRate').innerText = rate + '%';
        }

        function selectBox(side) {
            if (currentDifficulty !== 'easy') return;
            selectedBox = side;
            document.getElementById('boxLeft').classList.remove('box-selected');
            document.getElementById('boxRight').classList.remove('box-selected');
            document.getElementById('boxLeft').querySelector('.inner-text').innerText = '?';
            document.getElementById('boxRight').querySelector('.inner-text').innerText = '?';

            let target = side === 'left' ? document.getElementById('boxLeft') : document.getElementById('boxRight');
            target.classList.add('box-selected');
            target.querySelector('.inner-text').innerText = subjB;
        }

        function checkAnswers() {
            if (currentQuestionSolved) return; 

            if (currentDifficulty === 'easy') {
                let dd1Val = document.getElementById('dd1').value;
                let dd2Val = document.getElementById('dd2').value;
                let in1Val = document.getElementById('input1').value;
                let in2Val = document.getElementById('input2').value;

                if (dd1Val === '?' || dd2Val === '?' || in1Val === '' || in2Val === '' || selectedBox === '') {
                    showModal('請完成上方所有空格和選擇位置喔！', '👀', 'text-yellow-500', 'border-yellow-400');
                    return;
                }

                let topOk = (dd1Val === currentAnsDD1) && (dd2Val === currentAnsDD2) && 
                            (parseInt(in1Val) === currentAnsY) && (parseInt(in2Val) === currentAnsY);
                let bottomOk = (selectedBox === currentAnsBox);

                submitScore(topOk && bottomOk);

            } else {
                let in1HardVal = document.getElementById('input1_hard').value;
                let dd1HardVal = document.getElementById('dd1_hard').value;
                let in2HardVal = document.getElementById('input2_hard').value;
                
                let eq1Val = document.getElementById('inputEq1').value;
                let opVal = document.getElementById('eqOp').value;
                let eq2Val = document.getElementById('inputEq2').value;
                let eq3Val = document.getElementById('inputEq3').value;

                if (in1HardVal === '' || dd1HardVal === '?' || in2HardVal === '' || 
                    eq1Val === '' || opVal === '?' || eq2Val === '' || eq3Val === '') {
                    showModal('請依序完成所有空格和算式喔！', '👀', 'text-yellow-500', 'border-yellow-400');
                    return;
                }
                
                let topOk = (parseInt(in1HardVal) === currentAnsX) && 
                            (dd1HardVal === currentAnsDD2) && 
                            (parseInt(in2HardVal) === currentAnsY);
                
                let bottomOk = (parseInt(eq1Val) === currentAnsEq1) && 
                               (opVal === currentAnsEqOp) && 
                               (parseInt(eq2Val) === currentAnsEq2) && 
                               (parseInt(eq3Val) === currentAnsFinal);

                submitScore(topOk && bottomOk);
            }
        }

        function submitScore(isCorrect) {
            statsTotal++;
            if (isCorrect) {
                statsCorrect++;
                currentQuestionSolved = true;
                updateScoreboard();
                showModal('全部答對了！你好棒！', '🌟', 'text-green-500', 'border-green-400');
                fireConfetti();
            } else {
                updateScoreboard();
                showModal('有點小錯誤，再仔細想一想！', '💪', 'text-blue-500', 'border-blue-400');
            }
        }

        function showModal(title, icon, colorClass, borderColorClass) {
            const modal = document.getElementById('feedbackModal');
            const content = document.getElementById('modalContent');
            
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalIcon').innerText = icon;
            document.getElementById('modalIcon').className = `text-6xl md:text-7xl mb-3 md:mb-4 drop-shadow-md ${colorClass}`;
            content.className = `bg-white rounded-[2rem] p-5 md:p-8 max-w-[16rem] md:max-w-sm w-full text-center shadow-2xl transform scale-100 transition-transform duration-300 border-4 ${borderColorClass}`;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('feedbackModal');
            const content = document.getElementById('modalContent');
            content.classList.replace('scale-100', 'scale-90');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.getElementById('confetti').classList.add('hidden');
                
                if(document.getElementById('modalTitle').innerText.includes('答對')) {
                    initGame();
                }
            }, 200);
        }

        function fireConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.classList.remove('hidden');

            let particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 15 + 10,
                    speedY: Math.random() * 5 + 3,
                    speedX: Math.random() * 4 - 2,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    rot: Math.random() * 360,
                    rotSpeed: Math.random() * 10 - 5
                });
            }

            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let active = false;
                particles.forEach(p => {
                    p.y += p.speedY; p.x += p.speedX; p.rot += p.rotSpeed;
                    if (p.y < canvas.height) active = true;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    ctx.restore();
                });

                if (active && !canvas.classList.contains('hidden')) {
                    requestAnimationFrame(render);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            render();
        }

        window.onload = initGame;
    </script>
</body>
</html>
