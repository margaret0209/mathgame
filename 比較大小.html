<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大小比一比</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            overscroll-behavior: none; /* 防止手機下拉更新干擾拖曳 */
        }
        .shape {
            /* 讓重疊的顏色會加深，將改由 JS 針對不同圖案動態控制 */
            transition: transform 0.1s ease-out, filter 0.1s ease-out;
            touch-action: none; /* 讓手機瀏覽器將觸控事件完全交給腳本處理 */
        }
        .zone {
            transition: all 0.2s ease;
        }
        .zone.hovered {
            background-color: #e0e7ff;
            border-color: #6366f1;
            transform: scale(1.02);
        }
        /* 新增：正確與錯誤的閃爍動畫類別 */
        .zone.correct-flash {
            border-color: #22c55e !important;
            background-color: #dcfce7 !important;
        }
        .zone.error-flash {
            border-color: #ef4444 !important;
            background-color: #fee2e2 !important;
        }
    </style>
</head>
<body class="bg-gray-200 h-screen w-screen overflow-hidden flex items-center justify-center p-2 md:p-4 font-sans">

    <!-- 調整這裡：移除固定高度 (h-[75vh], md:h-[600px], min-h-[500px])，讓整體高度根據內容自適應 -->
    <div class="flex flex-col w-full max-w-5xl max-h-[98vh] bg-white shadow-2xl rounded-2xl overflow-hidden relative">
        
        <!-- 頂部標題區 -->
        <header class="bg-indigo-600 text-white p-3 md:p-4 text-center z-10 relative flex-shrink-0">
            <h1 class="text-2xl md:text-3xl font-bold tracking-wider">🟢 大小比一比 🔴</h1>
            <p class="text-sm md:text-base mt-1 opacity-90 hidden sm:block">你可以把它們「疊在一起」來比較誰比較大！</p>
            
            <!-- 控制面板 -->
            <div class="mt-3 flex flex-wrap justify-center items-center gap-3">
                <!-- 新增：圖案選擇 -->
                <div class="flex items-center bg-indigo-500 rounded-full px-3 py-1 shadow-inner">
                    <label for="type-select" class="text-sm font-medium mr-2 text-white">圖案：</label>
                    <select id="type-select" onchange="changeType()" class="bg-white text-indigo-700 text-sm rounded px-2 py-1 outline-none font-bold cursor-pointer">
                        <option value="geometric" selected>形狀</option>
                        <option value="object">物件</option>
                    </select>
                </div>

                <div class="flex items-center bg-indigo-500 rounded-full px-3 py-1 shadow-inner">
                    <label for="mode-select" class="text-sm font-medium mr-2 text-white">數量：</label>
                    <select id="mode-select" onchange="changeMode()" class="bg-white text-indigo-700 text-sm rounded px-2 py-1 outline-none font-bold cursor-pointer">
                        <option value="2">2 個</option>
                        <option value="3" selected>3 個</option>
                        <option value="4">4 個</option>
                        <option value="5">5 個</option>
                        <option value="6">6 個</option>
                    </select>
                </div>
                
                <!-- 新增：提示模式開關 -->
                <label class="flex items-center bg-indigo-500 rounded-full px-3 py-1 shadow-inner cursor-pointer hover:bg-indigo-400 transition">
                    <span class="text-sm font-medium mr-2 text-white">提示模式</span>
                    <input type="checkbox" id="hint-toggle" class="w-4 h-4 accent-indigo-200 cursor-pointer" onchange="toggleHintMode()">
                </label>

                <button onclick="initGame()" class="bg-white text-indigo-600 px-5 py-1.5 rounded-full text-sm font-bold shadow hover:bg-indigo-50 active:scale-95 transition">
                    重新產生
                </button>
            </div>
        </header>

        <!-- 訊息提示區 -->
        <div id="message-container" class="text-center p-2 h-14 flex items-center justify-center flex-shrink-0 bg-indigo-50/50">
            <p id="message" class="text-sm md:text-lg text-gray-700 font-medium px-2">
                拖動圖形疊在一起比較大小，然後由大到小放入下方框框！
            </p>
        </div>

        <!-- 遊戲互動區：移除 flex-grow，加上 transition 讓高度改變時有滑順的動畫 -->
        <div id="play-area" class="relative bg-gray-50 mx-4 mb-2 rounded-xl border-2 border-dashed border-gray-300 transition-all duration-300 ease-in-out">
            <!-- 動態生成的形狀會放在這裡 -->
        </div>

        <!-- 放置區域 (由 JS 動態生成) -->
        <!-- 新增 flex-wrap 讓手機螢幕太小時，真實尺寸的方塊可以自動換行 -->
        <div id="drop-zones" class="flex justify-center items-center content-center p-3 md:p-4 bg-white gap-2 flex-shrink-0 border-t border-gray-100 min-h-[100px] max-h-[40vh] overflow-y-auto flex-wrap">
            <!-- 框框會在這裡產生 -->
        </div>
    </div>

    <script>
        const playArea = document.getElementById('play-area');
        const dropZonesContainer = document.getElementById('drop-zones');
        const messageEl = document.getElementById('message');
        
        let numObjects = 3;
        let currentPatternType = 'geometric'; // 新增：紀錄目前的圖案種類
        let zones = []; // 動態儲存放置區
        let baseSizes = []; // 儲存各等級大小，供提示模式參考
        let isHintMode = false; // 提示模式狀態
        
        let highestZ = 10;
        let draggedEl = null;
        let startX = 0, startY = 0;
        let currentHoverZone = null;

        // --- 音效系統 (Web Audio API) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        // 初始化音效引擎 (必須在使用者互動後才能啟動)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 綁定全域初始互動，確保 iOS/Safari 能順利解鎖音效
        const enableAudio = () => {
            initAudio();
            document.removeEventListener('pointerdown', enableAudio);
            document.removeEventListener('touchstart', enableAudio);
        };
        document.addEventListener('pointerdown', enableAudio);
        document.addEventListener('touchstart', enableAudio);

        // 播放合成音效
        function playSound(type) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'pick') {
                // 拿起：短促、音調微微上升
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(300, now);
                oscillator.frequency.exponentialRampToValueAtTime(600, now + 0.08);
                gainNode.gain.setValueAtTime(0, now); // 淡入防爆音
                gainNode.gain.linearRampToValueAtTime(0.2, now + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.12); // 淡出防爆音
                oscillator.start(now);
                oscillator.stop(now + 0.15);
            } else if (type === 'drop') {
                // 放開 (未放進框框)：低沉、音調下降
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(400, now);
                oscillator.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.2, now + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.12);
                oscillator.start(now);
                oscillator.stop(now + 0.15);
            } else if (type === 'snap') {
                // 吸附到框框：清脆的波形 (正確時播放)
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(600, now);
                oscillator.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.2, now + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.12);
                oscillator.start(now);
                oscillator.stop(now + 0.15);
            } else if (type === 'error') {
                // 錯誤：低沉短促的警告音 (放錯時播放)
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(200, now);
                oscillator.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.15, now + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.22);
                oscillator.start(now);
                oscillator.stop(now + 0.25);
            } else if (type === 'win') {
                // 獲勝：簡單的和弦琶音
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(440, now);       // A4
                oscillator.frequency.setValueAtTime(554.37, now + 0.1); // C#5
                oscillator.frequency.setValueAtTime(659.25, now + 0.2); // E5
                oscillator.frequency.setValueAtTime(880.00, now + 0.3); // A5 (多加一個音)
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.2, now + 0.05);
                gainNode.gain.setValueAtTime(0.2, now + 0.3);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.6);
                oscillator.start(now);
                oscillator.stop(now + 0.65);
            }
        }

        // 當使用者改變下拉選單時觸發
        function changeMode() {
            numObjects = parseInt(document.getElementById('mode-select').value);
            initGame();
        }

        // 新增：當使用者改變圖案種類時觸發
        function changeType() {
            currentPatternType = document.getElementById('type-select').value;
            initGame();
        }

        function initGame() {
            // 清空畫面與狀態
            playArea.innerHTML = '';
            dropZonesContainer.innerHTML = '';
            zones = [];
            messageEl.innerText = "拖動圖形疊在一起比較大小，然後由大到小放入下方框框！";
            messageEl.className = "text-sm md:text-lg text-gray-700 font-medium px-2";

            // 1. 動態產生放置框框的標籤文字 (支援最高 100 個)
            const labels = [];
            for (let i = 0; i < numObjects; i++) {
                if (i === 0) labels.push("最大");
                else if (i === numObjects - 1) labels.push("最小");
                else labels.push(`第${i + 1}大`);
            }

            // 動態生成下方框框
            for (let i = 0; i < numObjects; i++) {
                const zone = document.createElement('div');
                // 使用 flex-1 讓多個框框時能自動擠壓，並設定 max-width 與 min-width 以防 100 個時崩潰
                zone.className = "zone drop-zone flex-1 min-w-[45px] max-w-[100px] aspect-square border-2 md:border-4 border-dashed border-gray-300 rounded-lg md:rounded-xl flex items-center justify-center text-gray-400 font-bold text-xs md:text-sm relative bg-gray-50 m-0.5";
                
                // 由大到小排列，所以預期值為 (總數 - 1 - 索引)
                zone.dataset.expected = numObjects - 1 - i; 
                zone.dataset.currentRank = "";
                
                const span = document.createElement('span');
                span.className = "absolute pointer-events-none select-none whitespace-nowrap";
                // 如果文字較長，自動縮小字體
                if (labels[i].length > 2) {
                    span.style.transform = 'scale(0.7)';
                }
                span.innerText = labels[i];
                zone.appendChild(span);
                
                dropZonesContainer.appendChild(zone);
                zones.push(zone); // 加入陣列方便後續比對
            }

            // 2. 動態計算圖形的大小
            baseSizes = []; // 確保重置全域的大小陣列
            const minSize = 30; // 最小尺寸
            // 根據視窗限制最大尺寸，避免 100 個時圖形過大塞爆畫面
            const maxAllowedSize = Math.min(window.innerWidth * 0.6, window.innerHeight * 0.4, 250); 
            
            let actualMaxSize = maxAllowedSize;
            if (numObjects <= 5) {
                actualMaxSize = minSize + (numObjects - 1) * 40; // 數量少時維持原本明顯的級距
            }
            
            const step = (actualMaxSize - minSize) / Math.max(1, numObjects - 1);
            
            for (let i = 0; i < numObjects; i++) {
                // 如果數量小於10，加入極微小的隨機抖動；如果高達 100，則不抖動避免排序過於接近難以分辨
                const jitter = (numObjects <= 10) ? Math.random() * (step * 0.2) : 0;
                baseSizes.push(minSize + i * step + jitter);
            }

            // 動態調整中間遊戲區域的高度：最大圖形的尺寸 + 60px 的上下邊界緩衝，並給予至少 300px 的空間
            const maxSize = baseSizes[numObjects - 1];
            playArea.style.height = Math.max(maxSize + 60, 300) + 'px';

            // 3. 準備顏色庫 (動態支援高達 100 種顏色)
            const colors = [];
            for (let i = 0; i < numObjects; i++) {
                // 使用黃金角度 137.5 分散色相，確保每個相鄰物件顏色差異明顯且不重複
                colors.push(`hsla(${(i * 137.5) % 360}, 80%, 60%, 0.85)`);
            }

            // 4. 定義不同的形狀池 (擴充了六邊形、菱形、梯形等多種形狀)
            const shapeTypes = [
                { borderRadius: '50%', clipPath: 'none' }, // 圓形
                { borderRadius: '20%', clipPath: 'none' }, // 圓角方形
                { borderRadius: '0', clipPath: 'polygon(50% 0%, 0% 100%, 100% 100%)' }, // 三角形
                { borderRadius: '0', clipPath: 'polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%)' }, // 五邊形
                { borderRadius: '0', clipPath: 'polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)' }, // 星形
                { borderRadius: '0', clipPath: 'polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%)' }, // 六邊形
                { borderRadius: '0', clipPath: 'polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)' }, // 菱形
                { borderRadius: '0', clipPath: 'polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%)' }, // 八邊形
                { borderRadius: '0', clipPath: 'polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%)' }, // 梯形
                { borderRadius: '0', clipPath: 'polygon(33% 0%, 66% 0%, 66% 33%, 100% 33%, 100% 66%, 66% 66%, 66% 100%, 33% 100%, 33% 66%, 0% 66%, 0% 33%, 33% 33%)' } // 十字形
            ];

            // 準備可愛物件 (Emoji) 庫 (已擴充至 100 種)
            const emojis = [
                '🧸', '🚗', '🍎', '🐶', '⚽', '🚀', '🐢', '🎈', '🦖', '🍓',
                '🌻', '🦋', '🐟', '🐙', '🐱', '🐰', '🦊', '🐻', '🐼', '🐨',
                '🦁', '🐮', '🐷', '🐸', '🐵', '🐧', '🦆', '🦉', '🦄', '🐝',
                '🐞', '🦕', '🐬', '🐳', '🐘', '🦒', '🦘', '🦔', '🍔', '🍟',
                '🍕', '🌭', '🍿', '🍩', '🍪', '🍫', '🍬', '🍭', '🧁', '🍰',
                '🍉', '🍌', '🍍', '🥭', '🍇', '🍒', '🥑', '🥕', '🌽', '🥦',
                '🍄', '🌲', '🌵', '🌴', '🌸', '🌼', '🌍', '🌙', '⭐', '🔥',
                '💧', '⛄', '🏀', '🏈', '⚾', '🎾', '🏐', '🎱', '🏓', '🏸',
                '🎮', '🎲', '🧩', '🎸', '🎺', '🥁', '🎨', '✈️', '🚁', '🚤',
                '🛳️', '⛵', '🚂', '🚜', '🛵', '🚲', '🛴', '🛸', '💎', '🎁'
            ];

            // 決定這一回合「統一」使用的形狀或物件
            const roundShape = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];
            const roundEmoji = emojis[Math.floor(Math.random() * emojis.length)];

            // 打亂大小與顏色的對應關係，並打亂生成順序
            let objects = [];
            for(let i = 0; i < numObjects; i++) {
                objects.push({ rank: i, size: baseSizes[i] });
            }
            
            objects.sort(() => Math.random() - 0.5); 
            colors.sort(() => Math.random() - 0.5);

            const pWidth = playArea.clientWidth;
            const pHeight = playArea.clientHeight;

            objects.forEach((obj, idx) => {
                const el = document.createElement('div');
                el.dataset.rank = obj.rank;
                el.classList.add('shape');
                el.style.width = obj.size + 'px';
                el.style.height = obj.size + 'px';
                
                // 根據選取的模式套用對應的外觀
                if (currentPatternType === 'geometric') {
                    // 幾何形狀模式
                    el.style.backgroundColor = colors[idx];
                    el.style.borderRadius = roundShape.borderRadius;
                    el.style.clipPath = roundShape.clipPath;
                    el.style.WebkitClipPath = roundShape.clipPath;
                    el.style.mixBlendMode = 'multiply'; // 保留疊色效果
                    el.style.opacity = '1';
                } else {
                    // 可愛物件模式 (使用 Emoji)
                    el.style.backgroundColor = 'transparent';
                    el.style.borderRadius = '0';
                    el.style.clipPath = 'none';
                    el.style.WebkitClipPath = 'none';
                    el.style.mixBlendMode = 'normal'; // 物件不套用疊色以免變黑
                    el.style.opacity = '0.9'; // 微透明，讓疊加時仍稍微看得見下方物件
                    
                    // 使用 flex 置中 Emoji
                    el.style.display = 'flex';
                    el.style.alignItems = 'center';
                    el.style.justifyContent = 'center';
                    
                    const emojiSpan = document.createElement('span');
                    emojiSpan.innerText = roundEmoji;
                    emojiSpan.style.fontSize = (obj.size * 0.8) + 'px'; // 讓表情符號隨著物件設定的大小縮放
                    emojiSpan.style.pointerEvents = 'none';
                    emojiSpan.style.userSelect = 'none';
                    emojiSpan.style.lineHeight = '1';
                    el.appendChild(emojiSpan);
                }
                
                el.style.position = 'absolute';
                el.style.cursor = 'grab';
                // 改用 drop-shadow 讓自訂形狀的陰影更自然
                el.style.filter = 'drop-shadow(0 4px 6px rgba(0,0,0,0.1))';
                
                // 讓它們隨機散佈在中間區域
                const cx = pWidth / 2;
                const cy = pHeight / 2;
                const left = cx - obj.size/2 + (Math.random() - 0.5) * (pWidth * 0.6);
                const top = cy - obj.size/2 + (Math.random() - 0.5) * (pHeight * 0.6);
                
                // 確保不會超出邊界
                el.style.left = Math.max(10, Math.min(left, pWidth - obj.size - 10)) + 'px';
                el.style.top = Math.max(10, Math.min(top, pHeight - obj.size - 10)) + 'px';

                el.addEventListener('pointerdown', onPointerDown);
                playArea.appendChild(el);
            });

            // 套用提示模式（若開啟）
            updateZoneSizes();
        }

        // --- 提示模式切換與更新邏輯 ---
        function toggleHintMode() {
            isHintMode = document.getElementById('hint-toggle').checked;
            updateZoneSizes();
        }

        function updateZoneSizes() {
            if (zones.length === 0 || baseSizes.length === 0) return;

            const maxSize = baseSizes[numObjects - 1]; // 最大尺寸 (等級最高)
            
            zones.forEach(zone => {
                const expectedRank = parseInt(zone.dataset.expected);
                const originalIndex = numObjects - 1 - expectedRank;
                const span = zone.querySelector('span');

                if (isHintMode) {
                    const targetSize = baseSizes[expectedRank];
                    
                    zone.classList.remove('flex-1', 'max-w-[100px]');
                    
                    // 【修改這裡】：直接將寬高設定為與目標圖形完全一致的像素 (px)
                    zone.style.flex = 'none'; // 取消彈性拉伸，強制固定大小
                    zone.style.width = targetSize + 'px';
                    zone.style.height = targetSize + 'px';
                    zone.style.maxWidth = 'none';
                    zone.style.minWidth = '0px'; 
                    
                    // 依照方塊的大小等比例縮小裡面的文字，確保文字不會破版
                    if (span) {
                        const baseScale = (originalIndex === 0 || originalIndex === numObjects - 1) ? 1 : 0.7; // 文字超過2個字時稍微縮小
                        span.style.transform = `scale(${Math.max(0.2, (targetSize / maxSize) * baseScale)})`;
                        span.style.transition = 'transform 0.2s ease';
                    }
                } else {
                    zone.style.flex = '';
                    zone.style.width = '';
                    zone.style.height = '';
                    zone.style.maxWidth = '';
                    zone.style.minWidth = '';
                    zone.classList.add('flex-1', 'max-w-[100px]');
                    
                    // 恢復文字大小
                    if (span) {
                        span.style.transform = (originalIndex === 0 || originalIndex === numObjects - 1) ? 'scale(1)' : 'scale(0.7)';
                    }
                }
            });

            // 如果已經有圖形放在框框內，由於框的大小改變，需要重新吸附置中
            setTimeout(() => {
                const shapes = document.querySelectorAll('.shape');
                shapes.forEach(shape => {
                    const rank = shape.dataset.rank;
                    let currentZone = null;
                    zones.forEach(z => {
                        if(z.dataset.currentRank === rank) currentZone = z;
                    });
                    if (currentZone) snapToZone(shape, currentZone);
                });
            }, 200); // 配合 CSS transition 延遲 200ms 等框框縮放完畢再移動
        }

        // --- 拖曳事件處理 (與原版相同) ---
        function onPointerDown(e) {
            initAudio(); // 初始化音效
            playSound('pick'); // 播放「拿起」音效

            draggedEl = e.currentTarget;
            draggedEl.style.zIndex = ++highestZ;
            draggedEl.style.cursor = 'grabbing';
            draggedEl.style.transform = 'scale(1.05)';
            draggedEl.style.filter = 'drop-shadow(0 10px 15px rgba(0,0,0,0.2))';

            const rect = draggedEl.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;

            draggedEl.setPointerCapture(e.pointerId);

            draggedEl.addEventListener('pointermove', onPointerMove);
            draggedEl.addEventListener('pointerup', onPointerUp);
            draggedEl.addEventListener('pointercancel', onPointerUp);
        }

        function onPointerMove(e) {
            if (!draggedEl) return;
            e.preventDefault();

            const pRect = playArea.getBoundingClientRect();
            let newLeft = e.clientX - pRect.left - startX;
            let newTop = e.clientY - pRect.top - startY;

            draggedEl.style.left = newLeft + 'px';
            draggedEl.style.top = newTop + 'px';

            checkHover(draggedEl);
        }

        function onPointerUp(e) {
            if (!draggedEl) return;

            draggedEl.style.cursor = 'grab';
            draggedEl.style.transform = 'scale(1)';
            draggedEl.style.filter = 'drop-shadow(0 4px 6px rgba(0,0,0,0.1))';
            draggedEl.releasePointerCapture(e.pointerId);

            draggedEl.removeEventListener('pointermove', onPointerMove);
            draggedEl.removeEventListener('pointerup', onPointerUp);
            draggedEl.removeEventListener('pointercancel', onPointerUp);

            checkDrop(draggedEl);
            draggedEl = null;
            clearHoverEffects();
        }

        function checkHover(el) {
            const rect = el.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            let foundZone = null;
            zones.forEach(zone => {
                const zRect = zone.getBoundingClientRect();
                if (centerX >= zRect.left && centerX <= zRect.right &&
                    centerY >= zRect.top && centerY <= zRect.bottom) {
                    foundZone = zone;
                }
            });

            if (currentHoverZone !== foundZone) {
                if (currentHoverZone) currentHoverZone.classList.remove('hovered');
                if (foundZone) foundZone.classList.add('hovered');
                currentHoverZone = foundZone;
            }
        }

        function clearHoverEffects() {
            if (currentHoverZone) {
                currentHoverZone.classList.remove('hovered');
                currentHoverZone = null;
            }
        }

        function checkDrop(el) {
            const rect = el.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            let droppedInZone = null;
            zones.forEach(zone => {
                const zRect = zone.getBoundingClientRect();
                if (centerX >= zRect.left && centerX <= zRect.right &&
                    centerY >= zRect.top && centerY <= zRect.bottom) {
                    droppedInZone = zone;
                }
            });

            zones.forEach(z => {
                if(z.dataset.currentRank === el.dataset.rank) {
                    z.dataset.currentRank = "";
                }
            });

            let actionFeedback = null; // 紀錄這次拖放是對是錯

            if (droppedInZone) {
                droppedInZone.dataset.currentRank = el.dataset.rank;
                snapToZone(el, droppedInZone);
                
                // 判斷是否放對位置
                if (el.dataset.rank === droppedInZone.dataset.expected) {
                    actionFeedback = 'correct';
                    playSound('snap'); // 正確音效
                    droppedInZone.classList.add('correct-flash'); // 閃綠光
                    setTimeout(() => droppedInZone.classList.remove('correct-flash'), 500);
                } else {
                    actionFeedback = 'error';
                    playSound('error'); // 錯誤音效
                    droppedInZone.classList.add('error-flash'); // 閃紅光
                    setTimeout(() => droppedInZone.classList.remove('error-flash'), 500);
                }
            } else {
                playSound('drop'); // 放到空白處的音效
            }

            // 將結果傳給條件檢查
            checkWinCondition(actionFeedback);
        }

        function snapToZone(el, zone) {
            const zRect = zone.getBoundingClientRect();
            const pRect = playArea.getBoundingClientRect();
            const rect = el.getBoundingClientRect();
            
            const snapLeft = (zRect.left - pRect.left) + (zRect.width - rect.width) / 2;
            const snapTop = (zRect.top - pRect.top) + (zRect.height - rect.height) / 2;
            
            el.style.transition = 'left 0.2s, top 0.2s, transform 0.1s, filter 0.1s';
            el.style.left = snapLeft + 'px';
            el.style.top = snapTop + 'px';
            
            setTimeout(() => {
                if(el) el.style.transition = 'transform 0.1s ease-out, filter 0.1s ease-out';
            }, 200);
        }

        // --- 動態檢查獲勝條件 (加入即時回饋參數) ---
        function checkWinCondition(actionFeedback = null) {
            let filledCount = 0;
            let wrongCount = 0;

            // 遍歷所有動態生成的框框
            zones.forEach(zone => {
                if (zone.dataset.currentRank !== "") {
                    filledCount++;
                    if (zone.dataset.currentRank !== zone.dataset.expected) {
                        wrongCount++;
                    }
                }
            });

            if (filledCount === numObjects && wrongCount === 0) {
                setTimeout(() => playSound('win'), 150); // 延遲播放，避免與 snap 音效重疊
                messageEl.innerText = "🎉 恭喜你！大小排列完全正確！ 🎉";
                messageEl.className = "text-xl md:text-2xl text-green-600 font-bold animate-pulse px-2";
                fireConfetti();
            } else if (actionFeedback === 'error') {
                // 單次動作：放錯了
                messageEl.innerText = "❌ 哎呀，這個圖形大小不對喔！再比比看！";
                messageEl.className = "text-sm md:text-lg text-red-500 font-bold px-2";
            } else if (actionFeedback === 'correct') {
                // 單次動作：放對了
                messageEl.innerText = "👍 放對了！繼續保持！";
                messageEl.className = "text-sm md:text-lg text-green-600 font-bold px-2";
            } else {
                // 沒觸發特殊動作（例如拉到外面），則檢查目前整體狀態
                if (wrongCount > 0) {
                    messageEl.innerText = "🤔 框框裡有些圖形順序不對喔！";
                    messageEl.className = "text-sm md:text-lg text-red-500 font-bold px-2";
                } else if (filledCount > 0) {
                    messageEl.innerText = "👍 目前都放對了！繼續加油！";
                    messageEl.className = "text-sm md:text-lg text-green-600 font-bold px-2";
                } else {
                    messageEl.innerText = "拖動圖形疊在一起比較大小，然後由大到小放入下方框框！";
                    messageEl.className = "text-sm md:text-lg text-gray-700 font-medium px-2";
                }
            }
        }

        function fireConfetti() {
            for(let i=0; i<60; i++) {
                let conf = document.createElement('div');
                conf.style.position = 'fixed';
                conf.style.width = '10px';
                conf.style.height = '10px';
                conf.style.backgroundColor = ['#ef4444','#3b82f6','#10b981','#f59e0b','#8b5cf6'][Math.floor(Math.random()*5)];
                conf.style.zIndex = '9999';
                conf.style.pointerEvents = 'none';
                document.body.appendChild(conf);

                let x = window.innerWidth / 2;
                let y = window.innerHeight / 2;
                let angle = Math.random() * Math.PI * 2;
                let velocity = 10 + Math.random() * 25;
                let vx = Math.cos(angle) * velocity;
                let vy = Math.sin(angle) * velocity - 15;
                let rotation = Math.random() * 360;
                let dr = (Math.random() - 0.5) * 20;

                let opacity = 1;
                let frame = 0;
                
                function animate() {
                    if (frame > 60) opacity -= 0.03;
                    vy += 0.8; 
                    x += vx;
                    y += vy;
                    rotation += dr;

                    conf.style.left = x + 'px';
                    conf.style.top = y + 'px';
                    conf.style.transform = `rotate(${rotation}deg)`;
                    conf.style.opacity = opacity;

                    if (opacity > 0) {
                        requestAnimationFrame(animate);
                        frame++;
                    } else {
                        conf.remove();
                    }
                }
                requestAnimationFrame(animate);
            }
        }

        window.addEventListener('resize', () => {
            const shapes = document.querySelectorAll('.shape');
            shapes.forEach(shape => {
                const rank = shape.dataset.rank;
                let currentZone = null;
                zones.forEach(z => {
                    if(z.dataset.currentRank === rank) currentZone = z;
                });
                if (currentZone) snapToZone(shape, currentZone);
            });
        });

        // 啟動遊戲
        document.addEventListener('DOMContentLoaded', initGame);

    </script>
</body>
</html>
