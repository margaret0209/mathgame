<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>比較長度互動遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 防止拖曳時螢幕跟著滑動 */
        .draggable {
            touch-action: none;
            cursor: grab;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .draggable:active {
            cursor: grabbing;
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        
        /* 網底圖案，讓遊戲區更好看 */
        .bg-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-sky-50 min-h-screen flex flex-col items-center p-4 font-sans select-none relative">

    <!-- 重新產生按鈕 (右上角) -->
    <button onclick="playSound('click'); initGame()" class="absolute top-4 right-4 md:top-6 md:right-8 px-4 py-2 bg-indigo-500 hover:bg-indigo-600 text-white text-sm md:text-base font-bold rounded-full shadow-md transition-transform transform hover:scale-105 active:scale-95 z-50 flex items-center gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        重新產生
    </button>

    <!-- 模式切換 -->
    <div class="flex justify-center mt-2 mb-4">
        <div class="bg-gray-200 p-1 rounded-full flex gap-1 shadow-inner">
            <button onclick="playSound('click'); setMode(false)" id="btn-mode-normal" class="px-6 py-2 rounded-full font-bold bg-white text-sky-600 shadow-sm transition-all">一般模式</button>
            <button onclick="playSound('click'); setMode(true)" id="btn-mode-adv" class="px-6 py-2 rounded-full font-bold text-gray-500 hover:text-sky-600 transition-all">進階模式</button>
        </div>
    </div>

    <!-- 標題與說明 -->
    <div class="text-center mb-6">
        <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2">📐 比較長度遊戲</h1>
        <p id="instruction-text" class="text-lg text-gray-600">請將所有的長條拖曳到<span class="text-red-500 font-bold">左側紅線</span>上對齊，來比較看看誰最長！</p>
    </div>

    <!-- 數量選擇與提示切換 -->
    <div class="flex flex-wrap items-center justify-center gap-6 mb-6">
        <!-- 數量選擇 -->
        <div class="flex items-center gap-2">
            <span class="text-lg font-bold text-gray-700">物件數量：</span>
            <div class="flex gap-1 bg-white p-1 rounded-lg shadow-sm border border-sky-200">
                <button onclick="playSound('click'); setCount(2)" id="btn-count-2" class="px-3 py-1 md:px-4 rounded-md text-gray-600 hover:bg-sky-100 transition-colors">2件</button>
                <button onclick="playSound('click'); setCount(3)" id="btn-count-3" class="px-3 py-1 md:px-4 rounded-md text-white bg-sky-500 font-bold shadow-md hover:bg-sky-600 transition-colors">3件</button>
                <button onclick="playSound('click'); setCount(4)" id="btn-count-4" class="px-3 py-1 md:px-4 rounded-md text-gray-600 hover:bg-sky-100 transition-colors">4件</button>
                <button onclick="playSound('click'); setCount(5)" id="btn-count-5" class="px-3 py-1 md:px-4 rounded-md text-gray-600 hover:bg-sky-100 transition-colors">5件</button>
            </div>
        </div>

        <!-- 問題模式選擇 -->
        <div id="question-mode-container" class="flex items-center gap-2">
            <span class="text-lg font-bold text-gray-700">問題模式：</span>
            <div class="flex gap-1 bg-white p-1 rounded-lg shadow-sm border border-sky-200">
                <button onclick="playSound('click'); setQuestionMode('longest')" id="btn-qmode-longest" class="px-3 py-1 md:px-4 rounded-md text-gray-600 hover:bg-sky-100 transition-colors">找最長</button>
                <button onclick="playSound('click'); setQuestionMode('shortest')" id="btn-qmode-shortest" class="px-3 py-1 md:px-4 rounded-md text-gray-600 hover:bg-sky-100 transition-colors">找最短</button>
                <button onclick="playSound('click'); setQuestionMode('all')" id="btn-qmode-all" class="px-3 py-1 md:px-4 rounded-md text-white bg-sky-500 font-bold shadow-md hover:bg-sky-600 transition-colors">全部</button>
            </div>
        </div>

        <!-- 提示切換 -->
        <div class="flex items-center gap-2">
            <span class="text-lg font-bold text-gray-700">顯示提示：</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="hint-toggle" class="sr-only peer" onchange="toggleHint()">
                <div class="w-12 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-500 shadow-inner"></div>
            </label>
        </div>
    </div>

    <!-- 遊戲主區域 -->
    <div id="game-board" class="relative w-full max-w-5xl h-[450px] bg-white rounded-2xl shadow-lg border-4 border-sky-200 overflow-hidden bg-grid">
        <!-- 左側對齊基準線 -->
        <div class="absolute left-[60px] top-0 bottom-0 w-1 bg-red-500 border-l border-red-300 z-0"></div>
        <div class="absolute left-[20px] top-4 text-red-500 font-bold text-sm bg-white px-1 rounded">起點</div>
        
        <!-- 影子容器 (置於基準線上方，物件下方) -->
        <div id="shadows-container" class="absolute inset-0 z-5 hidden pointer-events-none"></div>

        <!-- 可拖曳的輔助比較線 -->
        <div id="movable-line" class="absolute top-0 bottom-0 w-1 bg-red-400/80 border-l-2 border-dashed border-red-500 z-40 cursor-ew-resize flex flex-col items-center justify-end group touch-none" style="left: 60px;">
            <!-- 拖曳把手 -->
            <div class="w-8 h-8 bg-white border-2 border-red-500 text-red-500 rounded-full flex items-center justify-center mb-2 shadow-md group-hover:bg-red-50 transition-colors pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M8 9l4-4 4 4m0 6l-4 4-4-4" transform="rotate(90 12 12)" />
                </svg>
            </div>
        </div>

        <!-- 進階模式提示訊息 -->
        <div id="adv-hint" class="absolute top-4 left-[90px] bg-red-100 text-red-600 px-4 py-2 rounded-lg font-bold shadow-md z-20 transition-all duration-300 opacity-0 translate-y-[-10px] pointer-events-none">
            ⚠️ 順序不對喔！請由最長（上）排到最短（下）
        </div>

        <!-- 物件容器 -->
        <div id="objects-container" class="absolute inset-0 z-10"></div>
    </div>

    <!-- 問答區域 (對齊後顯示) -->
    <div id="quiz-section" class="hidden mt-6 w-full max-w-5xl bg-white p-6 rounded-2xl shadow-lg border-2 border-sky-200 transform transition-all duration-500 opacity-0 translate-y-4">
        <h3 class="text-xl font-bold mb-4 text-gray-800">🤔 請點擊上方對應的長條來回答：</h3>
        <div class="flex flex-col sm:flex-row gap-6 justify-around">
            <div id="q1-container" class="flex-1 bg-gray-50 p-4 rounded-xl border border-gray-100 flex items-center justify-center">
                <p id="q1-text" class="text-xl font-bold text-gray-700 m-0">1) 哪條最長？</p>
            </div>
            <div id="q2-container" class="flex-1 bg-gray-50 p-4 rounded-xl border border-gray-100 flex items-center justify-center">
                <p id="q2-text" class="text-xl font-bold text-gray-700 m-0">2) 哪條最短？</p>
            </div>
        </div>
    </div>

    <!-- 過關彈窗 -->
    <div id="win-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 backdrop-blur-sm transition-opacity">
        <div class="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full transform scale-90 transition-transform duration-300" id="modal-content">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="text-3xl font-bold text-gray-800 mb-4">太棒了！</h2>
            <p id="win-message" class="text-gray-600 text-lg mb-8">你已經成功對齊長條並答對所有問題了！</p>
            <button onclick="playSound('click'); closeModalAndRestart()" class="w-full py-3 bg-green-500 hover:bg-green-600 text-white text-xl font-bold rounded-full shadow-md transition-transform active:scale-95">
                再玩一次
            </button>
        </div>
    </div>

    <script>
        const container = document.getElementById('objects-container');
        const winModal = document.getElementById('win-modal');
        const modalContent = document.getElementById('modal-content');
        const quizSection = document.getElementById('quiz-section');
        const q1Text = document.getElementById('q1-text');
        const q2Text = document.getElementById('q2-text');
        const instructionText = document.getElementById('instruction-text');
        const advHint = document.getElementById('adv-hint');
        const winMessage = document.getElementById('win-message');
        const movableLine = document.getElementById('movable-line');
        
        // --- 音效系統 (Web Audio API) ---
        let audioCtx = null;
        function playSound(type) {
            // 初始化 AudioContext (需在使用者互動後才能啟動)
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            switch(type) {
                case 'click':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, t);
                    gain.gain.setValueAtTime(0.05, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                    osc.start(t);
                    osc.stop(t + 0.1);
                    break;
                case 'pickup':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, t);
                    osc.frequency.exponentialRampToValueAtTime(600, t + 0.1);
                    gain.gain.setValueAtTime(0.05, t);
                    gain.gain.linearRampToValueAtTime(0, t + 0.1);
                    osc.start(t);
                    osc.stop(t + 0.1);
                    break;
                case 'drop':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, t);
                    osc.frequency.exponentialRampToValueAtTime(200, t + 0.1);
                    gain.gain.setValueAtTime(0.05, t);
                    gain.gain.linearRampToValueAtTime(0, t + 0.1);
                    osc.start(t);
                    osc.stop(t + 0.1);
                    break;
                case 'snap':
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(800, t);
                    gain.gain.setValueAtTime(0.1, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                    osc.start(t);
                    osc.stop(t + 0.15);
                    break;
                case 'correct':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, t);
                    osc.frequency.setValueAtTime(800, t + 0.1);
                    gain.gain.setValueAtTime(0.1, t);
                    gain.gain.setValueAtTime(0.1, t + 0.1);
                    gain.gain.linearRampToValueAtTime(0, t + 0.3);
                    osc.start(t);
                    osc.stop(t + 0.3);
                    break;
                case 'wrong':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, t);
                    gain.gain.setValueAtTime(0.05, t);
                    gain.gain.linearRampToValueAtTime(0, t + 0.3);
                    osc.start(t);
                    osc.stop(t + 0.3);
                    break;
                case 'win':
                    // 歡樂的勝利琶音 (C E G C)
                    const notes = [523.25, 659.25, 783.99, 1046.50]; 
                    notes.forEach((freq, i) => {
                        const oscWin = audioCtx.createOscillator();
                        const gainWin = audioCtx.createGain();
                        oscWin.type = 'sine';
                        oscWin.frequency.value = freq;
                        oscWin.connect(gainWin);
                        gainWin.connect(audioCtx.destination);
                        gainWin.gain.setValueAtTime(0, t + i * 0.1);
                        gainWin.gain.linearRampToValueAtTime(0.1, t + i * 0.1 + 0.05);
                        gainWin.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.3);
                        oscWin.start(t + i * 0.1);
                        oscWin.stop(t + i * 0.1 + 0.3);
                    });
                    return; // Win 已經使用了多個 oscillator，直接結束
            }
        }
        
        // 遊戲設定
        const ALIGN_X = 60; // 對齊線的 X 座標
        const SNAP_THRESHOLD = 30; // 靠近紅線多少像素會自動吸附
        let itemCount = 3; // 預設數量
        let isAdvancedMode = false; // 是否為進階模式
        let isHintEnabled = false; // 是否開啟提示
        let questionMode = 'all'; // 問題模式：'longest', 'shortest', 'all'
        let currentYTracks = []; // 儲存目前的 Y 軸軌道，供吸附使用
        const COLORS = [
            'bg-gradient-to-r from-orange-400 to-amber-300', 
            'bg-gradient-to-r from-emerald-400 to-teal-300', 
            'bg-gradient-to-r from-violet-400 to-purple-300',
            'bg-gradient-to-r from-pink-400 to-rose-300',
            'bg-gradient-to-r from-cyan-400 to-blue-300'
        ];

        let draggedItem = null;
        let startX, startY, initialLeft, initialTop;
        let alignedItems = new Set(); // 記錄已經對齊的物件
        
        // 輔助線狀態
        let isDraggingLine = false;
        let lineStartX, lineInitialLeft;

        // 問答狀態
        let longestItemId = '';
        let shortestItemId = '';
        let q1Answered = false;
        let q2Answered = false;
        let isQuizActive = false; // 追蹤問答是否開始
        let itemData = [];

        // 切換提示
        function toggleHint() {
            isHintEnabled = document.getElementById('hint-toggle').checked;
            const shadowsContainer = document.getElementById('shadows-container');
            if (isHintEnabled) {
                shadowsContainer.classList.remove('hidden');
            } else {
                shadowsContainer.classList.add('hidden');
            }
            playSound('click');
        }

        // 切換問題模式
        function setQuestionMode(mode) {
            questionMode = mode;
            // 更新按鈕樣式
            ['longest', 'shortest', 'all'].forEach(m => {
                const btn = document.getElementById(`btn-qmode-${m}`);
                if (m === mode) {
                    btn.className = "px-3 py-1 md:px-4 rounded-md text-white bg-sky-500 font-bold shadow-md hover:bg-sky-600 transition-colors";
                } else {
                    btn.className = "px-3 py-1 md:px-4 rounded-md text-gray-600 hover:bg-sky-100 transition-colors";
                }
            });
            initGame();
        }

        // 切換模式
        function setMode(advanced) {
            isAdvancedMode = advanced;
            
            const btnNormal = document.getElementById('btn-mode-normal');
            const btnAdv = document.getElementById('btn-mode-adv');
            const qModeContainer = document.getElementById('question-mode-container');
            
            if (isAdvancedMode) {
                btnAdv.className = "px-6 py-2 rounded-full font-bold bg-white text-sky-600 shadow-sm transition-all";
                btnNormal.className = "px-6 py-2 rounded-full font-bold text-gray-500 hover:text-sky-600 transition-all";
                instructionText.innerHTML = '請將長條拖曳到<span class="text-red-500 font-bold">左側紅線</span>對齊，並<span class="text-indigo-600 font-bold">由長至短（上至下）</span>排列！';
                qModeContainer.classList.add('hidden');
                qModeContainer.classList.remove('flex');
            } else {
                btnNormal.className = "px-6 py-2 rounded-full font-bold bg-white text-sky-600 shadow-sm transition-all";
                btnAdv.className = "px-6 py-2 rounded-full font-bold text-gray-500 hover:text-sky-600 transition-all";
                instructionText.innerHTML = '請將所有的長條拖曳到<span class="text-red-500 font-bold">左側紅線</span>上對齊，來比較看看誰最長！';
                qModeContainer.classList.remove('hidden');
                qModeContainer.classList.add('flex');
            }
            initGame();
        }

        // 切換數量
        function setCount(num) {
            itemCount = num;
            // 更新按鈕樣式
            [2, 3, 4, 5].forEach(n => {
                const btn = document.getElementById(`btn-count-${n}`);
                if (n === num) {
                    btn.className = "px-4 py-1 rounded-md text-white hover:bg-sky-600 transition-colors bg-sky-500 font-bold shadow-md";
                } else {
                    btn.className = "px-4 py-1 rounded-md text-gray-600 hover:bg-sky-100 transition-colors bg-transparent shadow-none";
                }
            });
            initGame();
        }

        // 初始化遊戲
        function initGame() {
            container.innerHTML = '';
            const shadowsContainer = document.getElementById('shadows-container');
            shadowsContainer.innerHTML = '';
            alignedItems.clear();
            winModal.classList.add('hidden');
            winModal.classList.remove('flex');
            advHint.classList.add('opacity-0', 'translate-y-[-10px]');
            
            // 重置輔助線位置
            movableLine.style.left = `${ALIGN_X}px`;

            // 隱藏問答區並重置狀態
            quizSection.classList.add('hidden', 'opacity-0', 'translate-y-4');
            quizSection.classList.remove('block', 'opacity-100', 'translate-y-0');
            q1Answered = false;
            q2Answered = false;
            isQuizActive = false;
            itemData = [];
            
            // 隨機選擇顏色
            let shuffledColors = [...COLORS].sort(() => 0.5 - Math.random());
            
            // 根據容器寬度動態產生合理長度，讓最長的可貼近畫面邊緣
            const boardWidth = container.parentElement.clientWidth || 1000;
            const maxL = Math.max(150, boardWidth - ALIGN_X - 40); 
            const minL = 100; // 最短長度稍微拉長一點
            const step = (maxL - minL) / (itemCount > 1 ? itemCount - 1 : 1);
            
            let lengths = [];
            for(let i = 0; i < itemCount; i++) {
                // 基礎長度，確保會從 minL 均勻分佈到 maxL
                let base = minL + i * step;
                // 加入一點隨機波動，但避免最長和最短的超過邊界
                let jitter = (Math.random() - 0.5) * (step * 0.4);
                let finalLen = Math.floor(base + jitter);
                
                // 限制在最大與最小範圍內
                finalLen = Math.max(minL, Math.min(finalLen, maxL));
                lengths.push(finalLen);
            }
            // 打亂長度分配
            lengths.sort(() => 0.5 - Math.random());

            // 根據數量動態計算 Y 軸軌道，避免物件重疊並置中
            const boardHeight = container.parentElement.clientHeight || 450;
            const itemHeight = 60;
            const totalItemHeight = itemHeight * itemCount;
            const gap = (boardHeight - totalItemHeight) / (itemCount + 1);
            
            let yTracks = [];
            for(let i=0; i<itemCount; i++) {
                yTracks.push(gap + i * (itemHeight + gap));
            }
            // 打亂軌道順序
            yTracks.sort(() => 0.5 - Math.random());
            
            // 儲存目前的 Y 軌道供吸附使用
            currentYTracks = [...yTracks];

            // 為進階模式排序所需的影子軌道和長度
            const sortedTracks = [...yTracks].sort((a,b) => a - b);
            const sortedLengths = [...lengths].sort((a,b) => b - a);

            for (let i = 0; i < itemCount; i++) {
                const id = `item-${i}`;
                // 將索引 0, 1, 2... 轉換為對應的英文字母 A, B, C... (ASCII 碼 65 起)
                const labelChar = String.fromCharCode(65 + i); 
                itemData.push({ id: id, length: lengths[i], colorClass: shuffledColors[i], label: labelChar });
                
                // 判斷：如果是進階模式，就不要顯示字母
                const displayLabel = isAdvancedMode ? '' : labelChar;
                createDraggableItem(id, lengths[i], yTracks[i], shuffledColors[i], boardWidth, displayLabel);
                
                // --- 產生提示影子 ---
                const shadow = document.createElement('div');
                let shadowW = isAdvancedMode ? sortedLengths[i] : lengths[i];
                let shadowY = isAdvancedMode ? sortedTracks[i] : yTracks[i];
                
                shadow.className = `absolute bg-gray-200 rounded-r-xl rounded-l-md border-2 border-dashed border-gray-400 opacity-60 pointer-events-none flex items-center justify-end px-3 transition-all duration-300`;
                shadow.style.width = `${shadowW}px`;
                shadow.style.height = '60px';
                shadow.style.left = `${ALIGN_X}px`;
                shadow.style.top = `${shadowY}px`;
                
                shadow.innerHTML = `
                    <div class="w-1 h-8 bg-gray-400/40 rounded-full mx-1"></div>
                    <div class="w-1 h-8 bg-gray-400/40 rounded-full mx-1"></div>
                    <div class="w-1 h-8 bg-gray-400/40 rounded-full mx-1"></div>
                `;
                shadowsContainer.appendChild(shadow);
            }

            // 套用影子顯示狀態
            if (isHintEnabled) {
                shadowsContainer.classList.remove('hidden');
                document.getElementById('hint-toggle').checked = true;
            } else {
                shadowsContainer.classList.add('hidden');
                document.getElementById('hint-toggle').checked = false;
            }

            // 找出最長和最短的物件 ID
            const sortedItems = [...itemData].sort((a, b) => b.length - a.length);
            longestItemId = sortedItems[0].id;
            shortestItemId = sortedItems[sortedItems.length - 1].id;
        }

        // 建立可拖曳的物件
        function createDraggableItem(id, width, topPos, colorClass, boardWidth, labelNum) {
            const item = document.createElement('div');
            item.id = id;
            item.className = `draggable absolute rounded-r-xl rounded-l-md shadow-md border-2 border-white flex items-center justify-end px-3 ${colorClass}`;
            
            item.style.width = `${width}px`;
            item.style.height = '60px';
            item.style.top = `${topPos}px`;
            
            // 隨機生成 X 座標 (確保出生在右半邊且不超出邊界)
            const minX = ALIGN_X + 20;
            const maxX = Math.max(minX, boardWidth - width - 10);
            const randomX = Math.floor(minX + Math.random() * (maxX - minX));
            item.style.left = `${randomX}px`;

            // 加上裝飾刻度線與編號
            item.innerHTML = `
                <div class="absolute left-4 text-white font-black text-2xl drop-shadow-md">${labelNum}</div>
                <div class="w-1 h-8 bg-white/50 rounded-full mx-1"></div>
                <div class="w-1 h-8 bg-white/50 rounded-full mx-1"></div>
                <div class="w-1 h-8 bg-white/50 rounded-full mx-1"></div>
            `;

            // 註冊指標事件 (支援滑鼠與觸控)
            item.addEventListener('pointerdown', onPointerDown);
            
            container.appendChild(item);
        }

        // 拖曳開始
        function onPointerDown(e) {
            playSound('pickup');
            draggedItem = e.currentTarget;
            
            // 隱藏進階模式的錯誤提示
            advHint.classList.add('opacity-0', 'translate-y-[-10px]');
            
            // 記錄起始游標位置與物件起始位置
            startX = e.clientX;
            startY = e.clientY;
            initialLeft = parseFloat(draggedItem.style.left) || 0;
            initialTop = parseFloat(draggedItem.style.top) || 0;
            
            // 將事件捕獲到該物件上，即使滑鼠移出元素也能繼續追蹤
            draggedItem.setPointerCapture(e.pointerId);
            
            // 提升層級
            draggedItem.style.zIndex = 50;

            // 移除對齊狀態
            alignedItems.delete(draggedItem.id);

            // 註冊移動與結束事件
            draggedItem.addEventListener('pointermove', onPointerMove);
            draggedItem.addEventListener('pointerup', onPointerUp);
            draggedItem.addEventListener('pointercancel', onPointerUp);
        }

        // 拖曳中
        function onPointerMove(e) {
            if (!draggedItem) return;
            
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            
            let newLeft = initialLeft + dx;
            let newTop = initialTop + dy;

            // 限制邊界
            const boardRect = container.parentElement.getBoundingClientRect();
            const maxLeft = boardRect.width - parseFloat(draggedItem.style.width);
            const maxTop = boardRect.height - parseFloat(draggedItem.style.height);

            newLeft = Math.max(0, Math.min(newLeft, maxLeft));
            newTop = Math.max(0, Math.min(newTop, maxTop));

            draggedItem.style.left = `${newLeft}px`;
            draggedItem.style.top = `${newTop}px`;
        }

        // 拖曳結束
        function onPointerUp(e) {
            if (!draggedItem) return;

            // 判斷是點擊還是拖曳
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            const isClick = Math.abs(dx) < 5 && Math.abs(dy) < 5;

            // 如果是在問答模式中，且為點擊行為
            if (isQuizActive && isClick && !isAdvancedMode) {
                handleBarClick(draggedItem);
                
                // 清理拖曳狀態，不執行後續的吸附邏輯
                draggedItem.style.zIndex = 10;
                draggedItem.releasePointerCapture(e.pointerId);
                draggedItem.removeEventListener('pointermove', onPointerMove);
                draggedItem.removeEventListener('pointerup', onPointerUp);
                draggedItem.removeEventListener('pointercancel', onPointerUp);
                draggedItem = null;
                return;
            }

            // 檢查是否靠近紅線 (吸附邏輯)
            let currentLeft = parseFloat(draggedItem.style.left);
            
            if (Math.abs(currentLeft - ALIGN_X) <= SNAP_THRESHOLD) {
                playSound('snap');
                
                // 尋找最近的 Y 軌道來吸附 (增加操作手感)
                const currentTop = parseFloat(draggedItem.style.top);
                let closestTrackTop = currentYTracks[0];
                let minDiff = Infinity;
                for (let t of currentYTracks) {
                    const diff = Math.abs(currentTop - t);
                    if (diff < minDiff) {
                        minDiff = diff;
                        closestTrackTop = t;
                    }
                }
                
                // 若距離夠近 (40px內)，則一併吸附 Y 軸
                if (minDiff < 40) {
                    draggedItem.style.top = `${closestTrackTop}px`;
                }

                // 吸附到紅線
                draggedItem.style.left = `${ALIGN_X}px`;
                draggedItem.style.transition = 'left 0.2s ease-out, top 0.2s ease-out';
                alignedItems.add(draggedItem.id);
                
                // 動畫結束後移除 transition 避免影響下次拖曳
                setTimeout(() => {
                    if (draggedItem) draggedItem.style.transition = 'transform 0.1s, box-shadow 0.1s';
                }, 200);

                checkWinCondition();
            } else {
                playSound('drop');
            }

            // 清理事件與狀態
            draggedItem.style.zIndex = 10;
            draggedItem.releasePointerCapture(e.pointerId);
            draggedItem.removeEventListener('pointermove', onPointerMove);
            draggedItem.removeEventListener('pointerup', onPointerUp);
            draggedItem.removeEventListener('pointercancel', onPointerUp);
            draggedItem = null;
        }

        // 檢查是否過關 (對齊完成)
        function checkWinCondition() {
            if (alignedItems.size === itemCount) {
                setTimeout(() => {
                    if (isAdvancedMode) {
                        checkAdvancedWin();
                    } else {
                        showQuiz();
                    }
                }, 300); // 稍微延遲讓玩家看到吸附效果
            }
        }

        // 進階模式：檢查是否由長到短排列
        function checkAdvancedWin() {
            // 取得所有已對齊的物件
            let items = Array.from(alignedItems).map(id => {
                let el = document.getElementById(id);
                // 找出對應的長度資料
                let data = itemData.find(d => d.id === id);
                return {
                    id: id,
                    top: parseFloat(el.style.top),
                    length: data.length
                };
            });
            
            // 依照 Y 軸位置排序 (從上到下)
            items.sort((a, b) => a.top - b.top);
            
            // 檢查長度是否為遞減 (由長到短)
            let isCorrect = true;
            for (let i = 0; i < items.length - 1; i++) {
                if (items[i].length < items[i+1].length) {
                    isCorrect = false;
                    break;
                }
            }
            
            if (isCorrect) {
                playSound('win');
                winMessage.innerText = '你已經成功將長條由長至短排列完成了！';
                winModal.classList.remove('hidden');
                winModal.classList.add('flex');
                setTimeout(() => {
                    modalContent.classList.remove('scale-90');
                    modalContent.classList.add('scale-100');
                }, 50);
            } else {
                // 顯示錯誤提示
                advHint.classList.remove('opacity-0', 'translate-y-[-10px]');
            }
        }

        // 顯示問答區
        function showQuiz() {
            if (isQuizActive) return; // 避免重複觸發
            isQuizActive = true;

            quizSection.classList.remove('hidden');
            // Trigger reflow 讓動畫生效
            void quizSection.offsetWidth;
            quizSection.classList.add('opacity-100', 'translate-y-0');
            quizSection.classList.remove('opacity-0', 'translate-y-4');

            // 根據問題模式顯示或隱藏特定的問題
            const q1Container = document.getElementById('q1-container');
            const q2Container = document.getElementById('q2-container');
            
            if (questionMode === 'longest') {
                q1Container.classList.remove('hidden');
                q2Container.classList.add('hidden');
            } else if (questionMode === 'shortest') {
                q1Container.classList.add('hidden');
                q2Container.classList.remove('hidden');
            } else {
                q1Container.classList.remove('hidden');
                q2Container.classList.remove('hidden');
            }

            // 更新問答文字並加上提示動畫狀態
            let textLongest = itemCount === 2 ? "哪條較長？" : "哪條最長？";
            let textShortest = itemCount === 2 ? "哪條較短？" : "哪條最短？";
            
            const pulseText1 = `<span id="q1-status" class="text-blue-500 text-base ml-2 animate-pulse">(👆 請點擊長條)</span>`;
            const pulseText2 = `<span id="q2-status" class="text-blue-500 text-base ml-2 animate-pulse">(👆 請點擊長條)</span>`;
            
            if (questionMode === 'all') {
                q1Text.innerHTML = `1) ${textLongest} ${pulseText1}`;
                q2Text.innerHTML = `2) ${textShortest} ${pulseText2}`;
            } else {
                q1Text.innerHTML = `${textLongest} ${pulseText1}`;
                q2Text.innerHTML = `${textShortest} ${pulseText2}`;
            }
        }

        // 處理玩家點擊長條回答問題
        function handleBarClick(item) {
            const itemId = item.id;
            
            // 檢查這個長條是否已經被標記為正確答案
            const labelDiv = item.querySelector('.absolute.left-4');
            if (labelDiv && labelDiv.innerText === '✅') {
                return; // 已經答對了就不重複觸發
            }

            let isCorrect = false;

            // 檢查是否點到「最長」的答案
            if ((questionMode === 'longest' || questionMode === 'all') && !q1Answered && itemId === longestItemId) {
                isCorrect = true;
                q1Answered = true;
                const statusEl = document.getElementById('q1-status');
                if(statusEl) {
                    statusEl.className = "text-green-500 text-lg ml-2 font-black";
                    statusEl.innerText = "✅ 正確！";
                }
            }
            // 檢查是否點到「最短」的答案
            else if ((questionMode === 'shortest' || questionMode === 'all') && !q2Answered && itemId === shortestItemId) {
                isCorrect = true;
                q2Answered = true;
                const statusEl = document.getElementById('q2-status');
                if(statusEl) {
                    statusEl.className = "text-green-500 text-lg ml-2 font-black";
                    statusEl.innerText = "✅ 正確！";
                }
            }

            if (isCorrect) {
                playSound('correct');
                // 視覺回饋：加上綠色粗框與放大效果
                item.classList.remove('border-white', 'border-2');
                item.classList.add('border-green-400', 'border-4', 'scale-[1.02]');
                item.style.borderWidth = '4px';
                // 換成打勾符號
                if(labelDiv) labelDiv.innerText = '✅';

                checkFinalWin();
            } else {
                playSound('wrong');
                // 答錯視覺回饋：震動特效
                item.animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });
            }
        }

        // 檢查是否達成所有問題的勝利條件
        function checkFinalWin() {
            let isWin = false;
            if (questionMode === 'longest' && q1Answered) isWin = true;
            if (questionMode === 'shortest' && q2Answered) isWin = true;
            if (questionMode === 'all' && q1Answered && q2Answered) isWin = true;

            if (isWin) {
                setTimeout(() => {
                    playSound('win');
                    winMessage.innerText = '你已經成功對齊長條並答對所有問題了！';
                    winModal.classList.remove('hidden');
                    winModal.classList.add('flex');
                    setTimeout(() => {
                        modalContent.classList.remove('scale-90');
                        modalContent.classList.add('scale-100');
                    }, 50);
                }, 800);
            }
        }

        // 關閉彈窗並重新開始
        function closeModalAndRestart() {
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-90');
            setTimeout(() => {
                initGame();
            }, 300);
        }

        // --- 輔助線拖曳邏輯 ---
        movableLine.addEventListener('pointerdown', onLinePointerDown);

        function onLinePointerDown(e) {
            isDraggingLine = true;
            lineStartX = e.clientX;
            lineInitialLeft = parseFloat(movableLine.style.left) || ALIGN_X;
            movableLine.setPointerCapture(e.pointerId);
            
            // 讓輔助線在拖曳時顯得更明顯
            movableLine.classList.add('bg-red-500/50');
            
            movableLine.addEventListener('pointermove', onLinePointerMove);
            movableLine.addEventListener('pointerup', onLinePointerUp);
            movableLine.addEventListener('pointercancel', onLinePointerUp);
        }

        function onLinePointerMove(e) {
            if (!isDraggingLine) return;
            const dx = e.clientX - lineStartX;
            let newLeft = lineInitialLeft + dx;
            
            // 限制在起點(ALIGN_X)與畫布最右側之間
            const boardWidth = container.parentElement.clientWidth;
            newLeft = Math.max(ALIGN_X, Math.min(newLeft, boardWidth - 10));
            
            movableLine.style.left = `${newLeft}px`;
        }

        function onLinePointerUp(e) {
            isDraggingLine = false;
            movableLine.releasePointerCapture(e.pointerId);
            movableLine.classList.remove('bg-red-500/50');
            
            movableLine.removeEventListener('pointermove', onLinePointerMove);
            movableLine.removeEventListener('pointerup', onLinePointerUp);
            movableLine.removeEventListener('pointercancel', onLinePointerUp);
        }

        // 網頁載入完成後啟動遊戲
        window.addEventListener('DOMContentLoaded', initGame);

        // 處理視窗大小改變
        window.addEventListener('resize', () => {
            // 簡單處理：視窗改變時重置遊戲以防物件超出邊界
            initGame();
        });
    </script>
</body>
</html>
